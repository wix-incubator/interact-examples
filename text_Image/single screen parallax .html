<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE WANT REPARATIONS — Wix Interact</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #151515;
      color: #111;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow-x: clip;
    }

    interact-element { display: contents; }

    #boot-error {
      display: none;
      position: fixed;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      z-index: 9999;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      max-width: 640px;
      background: #b00020;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .scroll-section { height: 220vh; }

    .sticky-stage {
      position: sticky;
      top: 0;
      height: 100dvh;
      min-height: 100vh;
      overflow: clip;
      background: #151515;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: #e4fc3a;
      border-bottom: 2px solid #000;
    }

    .header-block {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 6rem;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .header-block--right { justify-content: flex-end; }

    .search-dot {
      width: 0.75rem;
      height: 0.75rem;
      background: #000;
      flex-shrink: 0;
    }

    .site-nav {
      display: none;
      flex: 1;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      font-size: 15px;
    }

    .site-nav a {
      color: #111;
      text-decoration: none;
    }

    .bg-text-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      pointer-events: none;
      user-select: none;
    }

    .bg-text {
      margin: 0;
      padding: 0 4vw;
      font-size: min(50vw, 780px);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      opacity: 0.95;
      letter-spacing: -0.02em;
      white-space: nowrap;
      transform: translateX(0) scaleY(1.4);
      transform-origin: left center;
      will-change: transform;
    }

    .bg-text-sub {
      position: fixed;
      left: 4vw;
      bottom: clamp(2rem, 8vh, 3.5rem);
      z-index: 21;
      max-width: 34rem;
      margin: 0;
      color: rgba(255, 255, 255, 0.55);
      font-size: clamp(0.6875rem, 1.15vw, 0.8125rem);
      line-height: 1.9;
      letter-spacing: 0.22em;
      font-variant: small-caps;
      text-transform: lowercase;
      pointer-events: none;
    }

    .hero-main {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .hero-image-scaler {
      pointer-events: auto;
      transform: scale(1);
      transform-origin: center center;
      will-change: transform;
    }

    .hero-image-wrap {
      width: 96vw;
      max-width: 720px;
      aspect-ratio: 4 / 3;
      overflow: clip;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform;
    }

    .hero-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    @media (min-width: 768px) {
      .header-block { width: 8rem; }
      .site-nav { display: flex; }
      .hero-image-wrap { aspect-ratio: 5 / 4; }
    }

    @media (min-width: 1024px) {
      .bg-text-sub {
        max-width: 62rem;
        bottom: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div id="boot-error" role="alert"></div>

  <interact-element data-interact-key="scroll-section">
    <section class="scroll-section">
      <div class="sticky-stage">
        <header class="site-header">
          <div class="header-block"><span class="search-dot" aria-hidden="true"></span><span>SEARCH</span></div>
          <nav class="site-nav" aria-label="Primary">
            <a href="#">Books</a><a href="#">Audiobooks</a><a href="#">Noname's Book Club</a>
            <a href="#">Home + Apparel</a><a href="#">Gift Cards</a><a href="#">All</a>
          </nav>
          <div class="header-block header-block--right"><span>CART (1)</span></div>
        </header>

        <interact-element data-interact-key="bg-text">
          <div class="bg-text-layer" aria-hidden="true">
            <h1 class="bg-text">WE WANT REPARATIONS</h1>
          </div>
        </interact-element>

        <p class="bg-text-sub">A curated home for print, sound, and culture — independent books, audiobooks, apparel, and community programs rooted in care, resistance, and the work of building what comes next.</p>

        <main class="hero-main">
          <interact-element data-interact-key="hero-image">
            <div class="hero-image-scaler">
              <div class="hero-image-wrap">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=900&q=80"
                  srcset="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=480&q=80 480w, https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=720&q=80 720w, https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=900&q=80 900w"
                  sizes="(max-width: 768px) 96vw, 720px" alt="City at night — Unsplash" width="900" height="1200" loading="eager" decoding="async">
              </div>
            </div>
          </interact-element>
        </main>
      </div>
    </section>
  </interact-element>

  <script type="module">
    import { Interact } from "https://esm.sh/@wix/interact@2.4.0/web";

    const bootError = document.getElementById("boot-error");
    const showError = (msg) => {
      bootError.textContent = msg;
      bootError.style.display = "block";
      console.error(msg);
    };

    if (location.protocol === "file:") {
      showError("Cannot load from file://. Run in Terminal:\npython3 -m http.server 8765\nThen open: http://127.0.0.1:8765/single-screen-parallax-track-reveal.html");
    }

    const pct = (value) => ({ value, unit: "percentage" });
    const cover = (a, b) => ({ rangeStart: { name: "cover", offset: pct(a) }, rangeEnd: { name: "cover", offset: pct(b) } });
    const trackX = (px) => ({
      key: "hero-image", trigger: "pointerMove", params: { hitArea: "self", axis: "x" }, conditions: ["hoverDevice", "motionOk"],
      effects: [{ key: "hero-image", selector: ".hero-image-wrap", keyframeEffect: { name: `image-track-x-${px}`, keyframes: [{ transform: `translate3d(-${px}px,0,0)` }, { transform: `translate3d(${px}px,0,0)` }] }, transitionDuration: 160, transitionEasing: "easeOut", fill: "both" }],
    });
    const trackY = (px) => ({
      key: "hero-image", trigger: "pointerMove", params: { hitArea: "self", axis: "y" }, conditions: ["hoverDevice", "motionOk"],
      effects: [{ key: "hero-image", selector: ".hero-image-wrap", composite: "accumulate", keyframeEffect: { name: `image-track-y-${px}`, keyframes: [{ transform: `translate3d(0,-${px}px,0)` }, { transform: `translate3d(0,${px}px,0)` }] }, transitionDuration: 160, transitionEasing: "easeOut", fill: "both" }],
    });

    const config = {
      conditions: {
        motionOk: { type: "media", predicate: "(prefers-reduced-motion: no-preference)" },
        hoverDevice: { type: "media", predicate: "(hover: hover) and (pointer: fine)" },
      },
      interactions: [
        trackX(180),
        trackY(140),
        {
          key: "scroll-section",
          trigger: "viewProgress",
          effects: [
            { key: "bg-text", selector: ".bg-text", conditions: ["motionOk"], keyframeEffect: { name: "text-parallax", keyframes: [{ transform: "translateX(0) scaleY(1.4)" }, { transform: "translateX(calc(-100% + 100vw)) scaleY(1.4)" }] }, ...cover(0, 100), easing: "linear", fill: "both" },
            { key: "hero-image", selector: ".hero-image-scaler", conditions: ["motionOk"], keyframeEffect: { name: "image-scale-scroll", keyframes: [{ transform: "scale(1)" }, { transform: "scale(0)" }] }, ...cover(0, 100), easing: "linear", fill: "both" },
          ],
        },
      ],
    };

    let instance;
    const mount = () => {
      try {
        instance?.destroy();
        Interact.defineInteractElement?.();
        instance = Interact.create(config);
      } catch (err) {
        showError(`Interact failed: ${err?.message || err}`);
      }
    };

    if (location.protocol !== "file:") mount();
    matchMedia("(prefers-reduced-motion: reduce)").addEventListener("change", () => {
      if (location.protocol !== "file:") mount();
    });
  </script>
</body>
</html>
