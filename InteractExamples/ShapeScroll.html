<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Reveal with @wix/interact</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Base styling */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Set initial clip-path for the containers that need to be revealed */
        #container-2, #container-3, #container-4, #container-5, #container-6 {
            clip-path: circle(0% at center);
        }

        /* Ensure containers are layered correctly. Higher z-index for containers that appear later. */
        #container-1 { z-index: 1; }
        #container-2 { z-index: 2; }
        #container-3 { z-index: 3; }
        #container-4 { z-index: 4; }
        #container-5 { z-index: 5; }
        #container-6 { z-index: 6; }
        
        /* The trigger elements are invisible scroll-based triggers */
        .trigger-area {
            position: absolute;
            left: 0;
            width: 100%;
            opacity: 0;
            pointer-events: none;
        }
        
        /* The main section that contains the entire animation sequence */
        .animation-section {
            position: relative;
            width: 100%;
            height: 700vh; /* Total height for the entire scroll sequence */
        }

        /* Each content panel is sticky and takes up the full viewport */
        .content-panel {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Hide any content that might overflow */
        }
    </style>
</head>
<body>

    <!-- Instructions for the user -->
    <div class="fixed top-5 left-5 bg-black bg-opacity-50 p-3 rounded-lg z-50 text-sm">
        <p>Scroll down to experience the animation.</p>
    </div>

    <!-- The main section containing the animation -->
    <main class="animation-section">
        
        <!-- Invisible trigger elements for @wix/interact -->
        <wix-interact-element data-wix-path="#trigger-2">
            <div id="trigger-2" class="trigger-area" style="top: 200vh; height: 50vh;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-3">
             <div id="trigger-3" class="trigger-area" style="top: 300vh; height: 50vh;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-4">
             <div id="trigger-4" class="trigger-area" style="top: 400vh; height: 50vh;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-5">
            <div id="trigger-5" class="trigger-area" style="top: 500vh; height: 50vh;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-6">
            <div id="trigger-6" class="trigger-area" style="top: 600vh; height: 50vh;"></div>
        </wix-interact-element>

        <!-- The six content containers, wrapped for @wix/interact -->
        <wix-interact-element data-wix-path="#container-1">
            <div id="container-1" class="content-panel bg-gradient-to-br from-gray-900 to-gray-800">
                <div class="text-center">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter">Container 1</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-300">This is the starting point.</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-2">
            <div id="container-2" class="content-panel bg-gradient-to-br from-indigo-900 to-indigo-700">
                 <div class="text-center">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter">Container 2</h1>
                    <p class="mt-2 text-lg md:text-xl text-indigo-200">Revealed by scrolling.</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-3">
            <div id="container-3" class="content-panel bg-gradient-to-br from-teal-900 to-teal-700">
                 <div class="text-center">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter">Container 3</h1>
                    <p class="mt-2 text-lg md:text-xl text-teal-200">And another one.</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-4">
            <div id="container-4" class="content-panel bg-gradient-to-br from-rose-900 to-rose-700">
                 <div class="text-center">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter">Container 4</h1>
                    <p class="mt-2 text-lg md:text-xl text-rose-200">Keep scrolling...</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-5">
            <div id="container-5" class="content-panel bg-gradient-to-br from-amber-900 to-amber-700">
                 <div class="text-center">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter">Container 5</h1>
                    <p class="mt-2 text-lg md:text-xl text-amber-200">Almost there.</p>
                </div>
            </div>
        </wix-interact-element>
            
        <wix-interact-element data-wix-path="#container-6">
            <div id="container-6" class="content-panel bg-gradient-to-br from-lime-900 to-lime-700">
                 <div class="text-center">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter">Container 6</h1>
                    <p class="mt-2 text-lg md:text-xl text-lime-200">The final reveal.</p>
                </div>
            </div>
        </wix-interact-element>
    </main>

    <!-- A final section to show where the animation ends -->
    <footer class="h-screen w-full flex items-center justify-center bg-gray-900">
        <h2 class="text-4xl font-bold">End of animation</h2>
    </footer>

    <!-- Import and configure @wix/interact -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        const interactConfig = {
            interactions: [
                // Interaction to reveal Container 2
                {
                    key: '#trigger-2',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-2',
                        keyframeEffect: {
                            name: 'reveal-circle-2',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 3
                {
                    key: '#trigger-3',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-3',
                        keyframeEffect: {
                            name: 'reveal-circle-3',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 4
                {
                    key: '#trigger-4',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-4',
                        keyframeEffect: {
                            name: 'reveal-circle-4',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 5
                {
                    key: '#trigger-5',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-5',
                        keyframeEffect: {
                            name: 'reveal-circle-5',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 6
                {
                    key: '#trigger-6',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-6',
                        keyframeEffect: {
                            name: 'reveal-circle-6',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                }
            ]
        };

        // Initialize @wix/interact with the configuration
        Interact.create(interactConfig);
    </script>
</body>
</html>
