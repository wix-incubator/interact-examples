    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const images = document.querySelectorAll('.mouse-image');
            const imageContainer = document.getElementById('image-container');
            
            // --- UPDATED: Cache static positions and size of grid/images ---
            let containerWidth, containerHeight, imageWidth, imageHeight;

            function updateDimensions() {
                containerWidth = imageContainer.offsetWidth;
                containerHeight = imageContainer.offsetHeight;
                if (images.length > 0) {
                    // Get the actual rendered size, not just from Tailwind classes
                    const rect = images[0].getBoundingClientRect();
                    imageWidth = rect.width;
                    imageHeight = rect.height;
                }
            }

            // Update dimensions on load and resize
            updateDimensions();
            window.addEventListener('resize', updateDimensions);

            images.forEach(img => {
                // Initial random position (bottom-left area)
                // We want them to start off-screen or just barely on-screen
                img.startOffsetX = -imageWidth + Math.random() * (containerWidth / 2); // Start somewhere left of the screen
                img.startOffsetY = containerHeight - (imageHeight / 2) - Math.random() * (containerHeight / 2); // Start somewhere at the bottom of the screen

                img.velocity = 0.5 + Math.random() * 1.5; // Random speed for each image
                img.currentX = img.startOffsetX;
                img.currentY = img.startOffsetY;
                img.currentScale = 0.1; // Initialize currentScale here
            });
            // ---------------------------------------------------

            // Store mouse position
            let mouse = { x: 0, y: 0 };
            document.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            // This is the "bubble" radius around the cursor. 
            const maxDistance = 200;
            const maxScale = 3.6;
            const smoothing = 0.2; // Controls how fast the image scales (0.1 is smooth, 1 is instant)
            
            // Start the animation loop
            animateImages();

            function animateImages() {
                // Loop through every image on the page
                images.forEach(img => {
                    // --- CONTINUOUS DIAGONAL MOVEMENT ---
                    // Move images diagonally (up and right)
                    img.currentX += img.velocity;
                    img.currentY -= img.velocity; // Subtract to move up

                    // If image moves out of top-right, reset to bottom-left
                    if (img.currentX > containerWidth || img.currentY < -imageHeight) {
                        img.currentX = img.startOffsetX;
                        img.currentY = img.startOffsetY;
                        // Optional: randomize velocity again for a slightly different path next cycle
                        img.velocity = 0.5 + Math.random() * 0.5;
                    }

                    // Calculate the center of the image *after* its diagonal movement
                    const imgCenterX = img.currentX + imageWidth / 2;
                    const imgCenterY = img.currentY + imageHeight / 2;

                    // Calculate the distance between the mouse and the image center
                    const distance = Math.sqrt(
                        Math.pow(mouse.x - imgCenterX, 2) + 
                        Math.pow(mouse.y - imgCenterY, 2)
                    );

                    // --- Calculate Target Scale ---
                    // It's `maxScale` if distance is 0.
                    // It's 0 (invisible) if distance is >= maxDistance.
                    const targetScale = Math.max(0, maxScale * (1 - distance / maxDistance));

                    // --- Smooth the Scale ---
                    img.currentScale += (targetScale - img.currentScale) * smoothing;

                    // --- Apply All Transforms ---
                    // No opacity changes anymore
                    img.style.opacity = 1; 
                    img.style.transform = `translate(${img.currentX}px, ${img.currentY}px) scale(${img.currentScale})`;
                    img.style.position = 'absolute'; // Ensure images can be positioned with translate
                });

                // Request the next frame to continue the loop
                requestAnimationFrame(animateImages);
            }
        });
    </script>
