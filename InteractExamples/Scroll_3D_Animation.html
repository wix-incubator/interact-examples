<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll-Driven 3D Centered Panels with @wix/interact</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

.intro {
  height: 300vh;
  position: relative;
  padding: 20px;
}

.text-block {
  position: fixed;
  top: 50%;
  left: 3%;
  transform: translateY(-50%);
  z-index: 10;
  width: 18%;
  min-width: 200px;
}

.panel-wrapper {
  position: fixed;
  top: 50%;
  left: calc(3% + 18% + 1%);
  transform: translateY(-50%);
  perspective: 2000px;
  transform-style: preserve-3d;
  display: flex;
  justify-content: center;
  align-items: center;
  width: calc(100% - (3% + 18% + 4%));
}

.panel {
  position: absolute;
  left: 50%; /* מרכז אופקי */
  transform-style: preserve-3d;
  transform: translateX(-50%); /* Start centered, interact will override this */
}

.panel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 10px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

wix-interact-element {
    display: contents;
}

@media (max-width: 1280px) {
  .text-block {
    position: static;
    width: 90%;
    margin: 20px auto 10px;
    text-align: center;
    transform: none;
  }

  .panel-wrapper {
    position: static;
    perspective: none;
    transform: none;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .panel {
    position: relative;
    left: auto;
    width: 90%;
    height: auto;
    max-width: 700px;
    transform: none;
  }
}
</style>
</head>
<body>

<section class="intro">
  <div class="text-block">
    <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold mb-2">Title 01</h1>
    <p class="text-base md:text-lg leading-relaxed">
      Scroll-driven 3D animation with horizontal subtle movement.
    </p>
  </div>

  <div class="panel-wrapper">
    <div class="panel"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt=""></div>
    <div class="panel"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" alt=""></div>
    <div class="panel"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&w=800&q=80" alt=""></div>
    <div class="panel"><img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&w=800&q=80" alt=""></div>
    <div class="panel"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&w=800&q=80" alt=""></div>
    <div class="panel"><img src="https://images.unsplash.com/photo-1482192596544-9eb780fc7f66?auto=format&w=800&q=80" alt=""></div>
    <div class="panel"><img src="https://images.unsplash.com/photo-1496483353456-90997957cf99?auto=format&w=800&q=80" alt=""></div>
  </div>
</section>

<script type="module">
  import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

  document.addEventListener('DOMContentLoaded', () => {
    // If it's a mobile view, don't initialize animations. The static CSS handles the layout.
    if (window.innerWidth <= 1280) {
      return;
    }

    // --- Get Elements ---
    const introSection = document.querySelector('.intro');
    const panelWrapper = document.querySelector('.panel-wrapper');
    const panels = Array.from(document.querySelectorAll('.panel'));
    const totalPanels = panels.length;

    // --- Dynamic Element Wrapping ---
    const wrapElement = (el, path) => {
      const wrapper = document.createElement('wix-interact-element');
      wrapper.dataset.wixPath = path;
      el.parentNode.insertBefore(wrapper, el);
      wrapper.appendChild(el);
      return wrapper;
    };
    
    wrapElement(introSection, 'intro-section');
    wrapElement(panelWrapper, 'panel-wrapper');

    const panelEffects = [];

    // --- Set Initial Styles & Generate Panel Effects ---
    panels.forEach((panel, i) => {
      const id = `panel-${i}`;
      panel.id = id;
      wrapElement(panel, `#${id}`);

      const progress = totalPanels > 1 ? i / (totalPanels - 1) : 1;
      
      // Set non-animating dynamic styles directly
      panel.style.width = `${45 + progress * 20}vw`;
      panel.style.height = `${30 + progress * 12}vw`;

      // Define transform values for animation
      const scale = 0.75 + progress * 0.4;
      const zPos = -i * 120;
      const xEnd = (i - (totalPanels - 1) / 2) * 20;
      const baseTransform = `translateZ(${zPos}px) scale(${scale})`;

      panelEffects.push({
        key: `#${id}`,
        keyframeEffect: {
          name: `panel-move-${i}`,
          keyframes: [
            { transform: `translateX(-50%) translateX(0px) ${baseTransform}` },
            { transform: `translateX(-50%) translateX(${xEnd}px) ${baseTransform}` }
          ]
        },
        // These properties are shared across all panel effects
        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
        easing: 'linear',
        fill: 'both'
      });
    });

    // --- @wix/interact Configuration ---
    const config = {
      interactions: [{
        key: 'intro-section',
        trigger: 'viewProgress',
        effects: [
          // Effect for the main wrapper rotation
          {
            key: 'panel-wrapper',
            keyframeEffect: {
              name: 'wrapper-rotation',
              keyframes: [
                { transform: 'translateY(-50%) rotateY(-90deg)' },
                { transform: 'translateY(-50%) rotateY(0deg)' }
              ]
            },
            rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
            rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 50 } },
            easing: 'ease-out',
            fill: 'both'
          },
          // Add all the individual panel movement effects
          ...panelEffects
        ]
      }]
    };

    // Initialize Interact
    Interact.create(config);
  });
</script>

</body>
</html>
