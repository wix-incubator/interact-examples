<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Image Gallery with @wix/interact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://esm.sh/@wix/interact@1.79.0"></script>
  
  <style>
    /* CSS block */
    body {
      font-family: 'Assistant', sans-serif;
      overflow: hidden;
    }
    .snake-image {
      position: absolute;
      border-radius: 0.75rem; /* 12px */
      transition: all 0.6s ease-in-out;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      background-color: #333; /* A fallback bg */
      object-fit: cover;
      cursor: pointer;
    }
    
    /* Main container is hidden initially */
    #main-image-container {
      position: absolute;
      opacity: 0;
      z-index: 100;
      /* Transitions are now handled by @wix/interact */
      cursor: pointer;
    }
    #main-image-container img {
      width: 100%;
      height: 100%;
      border-radius: 0.75rem; /* 12px */
      object-fit: cover;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
    }

    /* Text is hidden initially */
    #text-container {
      opacity: 0;
    }
    
    /* Backdrop for dismissing the main view */
    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      opacity: 0;
      z-index: 50;
      pointer-events: none;
    }

    /* Helper to make wrappers not interfere with layout */
    wix-interact-element {
      display: contents;
    }
    #main-image-wrapper, #backdrop-wrapper {
      display: block; /* These need to be block to hold their absolute children */
      position: absolute;
      inset: 0;
    }

  </style>
</head>
<body class="bg-black w-screen h-screen m-0 p-0 overflow-hidden" dir="ltr">

  <div id="image-snake" class="absolute inset-0 w-full h-full"></div>

  <wix-interact-element data-wix-path="#backdrop" id="backdrop-wrapper">
    <div id="backdrop"></div>
  </wix-interact-element>

  <wix-interact-element data-wix-path="#main-image-container" id="main-image-wrapper">
    <div id="main-image-container">
      </div>
  </wix-interact-element>

  <div class="absolute inset-0 flex items-center justify-start pointer-events-none">
    <wix-interact-element data-wix-path="#text-container">
      <div id="text-container" class="w-full max-w-2xl px-8 md:px-16 text-left flex flex-col justify-center" style="height: 20rem; z-index: 110;">
        <h1 id="main-title" class="text-3xl md:text-5xl font-bold text-white mb-2" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.7);"></h1>
        <h2 id="main-subtitle" class="text-lg md:text-xl font-light text-white" style="text-shadow: 1px 1px 4px rgba(0,0,0,0.7);"></h2>
      </div>
    </wix-interact-element>
  </div>

<script type="module">
  // Import Interact
  import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

  document.addEventListener('DOMContentLoaded', () => {

    // --- @wix/interact CONFIGURATION ---
    // We define all animations as reusable effects.
    // They will be triggered programmatically from our JavaScript logic.
    const interactConfig = {
      effects: {
        'text-fade-in': {
          keyframeEffect: {
            name: 'text-in',
            keyframes: [{ opacity: 0 }, { opacity: 1 }]
          },
          duration: 900,
          easing: 'ease-out',
          fill: 'both'
        },
        'text-fade-out': {
          keyframeEffect: {
            name: 'text-out',
            keyframes: [{ opacity: 1 }, { opacity: 0 }]
          },
          duration: 400,
          easing: 'ease-in-out',
          fill: 'both'
        },
        'image-cycle-out': {
          keyframeEffect: {
            name: 'img-cycle-out',
            keyframes: [
              { opacity: 1, transform: 'translate(-50%, -50%) scale(1)' },
              { opacity: 0, transform: 'translate(-50%, -50%) scale(0.95)' }
            ]
          },
          duration: 400,
          easing: 'ease-in-out',
          fill: 'both'
        },
        'image-cycle-in': {
          keyframeEffect: {
            name: 'img-cycle-in',
            keyframes: [
              { opacity: 0, transform: 'translate(-50%, -50%) scale(0.95)' },
              { opacity: 1, transform: 'translate(-50%, -50%) scale(1)' }
            ]
          },
          duration: 400,
          easing: 'ease-in-out',
          fill: 'both'
        },
        'image-dismiss': {
          keyframeEffect: {
            name: 'img-dismiss',
            keyframes: [
              { opacity: 1, transform: 'translate(-50%, -50%) scale(1)' },
              { opacity: 0, transform: 'translate(-50%, -50%) scale(0.8)' }
            ]
          },
          duration: 600,
          easing: 'ease-out',
          fill: 'both'
        },
        'backdrop-fade-in': {
          keyframeEffect: {
            name: 'backdrop-in',
            keyframes: [{ opacity: 0, pointerEvents: 'none' }, { opacity: 1, pointerEvents: 'auto' }]
          },
          duration: 600,
          easing: 'ease-out',
          fill: 'both'
        },
        'backdrop-fade-out': {
          keyframeEffect: {
            name: 'backdrop-out',
            keyframes: [{ opacity: 1, pointerEvents: 'auto' }, { opacity: 0, pointerEvents: 'none' }]
          },
          duration: 600,
          easing: 'ease-out',
          fill: 'both'
        }
      }
      // No 'interactions' array is needed as we trigger all effects from JS
    };

    // Initialize @wix/interact
    Interact.create(interactConfig);


    // --- DATA SOURCE ---
    const imageData = Array.from({length: 12}, (_, i) => ({
      src: `https://picsum.photos/seed/${i + 1}/800/600`,
      title: `Abstract View ${i + 1}`,
      subtitle: `A unique perspective captured from a different angle.`
    }));

    // --- DOM ELEMENT REFERENCES ---
    const snakeContainer = document.getElementById('image-snake');
    const mainImageContainer = document.getElementById('main-image-container');
    const textContainer = document.getElementById('text-container');
    const mainTitle = document.getElementById('main-title');
    const mainSubtitle = document.getElementById('main-subtitle');
    const backdrop = document.getElementById('backdrop');

    // --- STATE MANAGEMENT ---
    let currentImageIndex = 0;
    let isAnimating = false;
    let isEnlarged = false; // Track if we are in the main view

    /**
     * Builds the initial "snake" of images.
     * This logic is kept from the original as it dynamically creates
     * and positions elements based on viewport size.
     */
    function buildSnake() {
      if (isAnimating) return;
      isAnimating = true;
      isEnlarged = false;
      snakeContainer.innerHTML = ''; // Clear previous images
      snakeContainer.style.display = 'block';
      snakeContainer.style.opacity = '1';
      const delay = 1000 / imageData.length; // Stagger delay

      imageData.forEach((imgData, index) => {
        setTimeout(() => {
          // NOTE: We do not wrap these dynamic images in <wix-interact-element>
          // because the convergence animation is also dynamic (based on viewport).
          // We will keep the original JS/CSS transition for this part.
          const img = document.createElement('img');
          img.src = imgData.src;
          img.alt = imgData.title;
          img.className = 'snake-image';

          const w = window.innerWidth, h = window.innerHeight;
          const x = (w / (imageData.length + 1)) * (index + 1) - Math.random() * 50;
          const y = h / 2 + Math.sin(index * 0.5) * 100 - 75 + (Math.random() * 40 - 20);
          const size = 140 + Math.random() * 100;

          img.style.width = `${size}px`;
          img.style.height = `${size * 0.75}px`;
          img.style.left = `${x - size/2}px`;
          img.style.top = `${y - (size * 0.75)/2}px`;
          img.style.transform = 'scale(0.9)';
          img.style.opacity = '0'; // Start invisible

          snakeContainer.appendChild(img);
          
          void img.offsetWidth; // Force reflow
          
          // Animate into view
          img.style.transform = 'scale(1)';
          img.style.opacity = '1';

          img.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isAnimating && !isEnlarged) enlargeImage(index);
          });
        }, index * delay);
      });

      // Automatically enlarge the last image
      setTimeout(() => {
        isAnimating = false;
        if (!isEnlarged) {
          enlargeImage(imageData.length - 1);
        }
      }, imageData.length * delay + 600);
    }

    /**
     * Converges all snake images. This part remains JS/CSS driven
     * due to its dynamic positioning.
     * CONVERTED: Fades in text and backdrop using @wix/interact.
     */
    function enlargeImage(index) {
      if (isAnimating || isEnlarged) return;
      isAnimating = true;
      isEnlarged = true;
      
      const imgs = snakeContainer.querySelectorAll('.snake-image');
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      const finalW = Math.min(window.innerWidth * 0.8, 1200);
      const finalH = finalW * 0.75;
      
      const finalLeft = `${centerX}px`;
      const finalTop = `${centerY}px`;
      const finalWidth = `${finalW}px`;
      const finalHeight = `${finalH}px`;

      imgs.forEach((img, i) => {
        img.style.zIndex = (i === index) ? imgs.length + 1 : i;
        setTimeout(() => {
          img.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
          img.style.left = finalLeft;
          img.style.top = finalTop;
          img.style.width = finalWidth;
          img.style.height = finalHeight;
          img.style.transform = 'translate(-50%, -50%)';
          if (i !== index) img.style.opacity = '0';
        }, 50);
      });

      // After convergence animation
      setTimeout(() => {
        currentImageIndex = index;
        let mainImg = mainImageContainer.querySelector('img');
        if (!mainImg) {
          mainImg = document.createElement('img');
          mainImageContainer.appendChild(mainImg);
        }
        mainImg.src = imageData[index].src;
        mainImg.alt = imageData[index].title;
        mainTitle.textContent = imageData[index].title;
        mainSubtitle.textContent = imageData[index].subtitle;

        mainImageContainer.style.transition = 'none';
        mainImageContainer.style.left = '50%';
        mainImageContainer.style.top = '50%';
        mainImageContainer.style.width = finalWidth;
        mainImageContainer.style.height = finalHeight;
        mainImageContainer.style.transform = 'translate(-50%, -50%)';
        mainImageContainer.style.opacity = '1';

        snakeContainer.style.opacity = '0';
        snakeContainer.style.display = 'none';
        
        // --- CONVERTED TO @wix/interact ---
        // Get the wrapped elements and trigger effects
        const textWrapper = document.querySelector('[data-wix-path="#text-container"]');
        const backdropWrapper = document.querySelector('[data-wix-path="#backdrop"]');
        
        if (textWrapper) textWrapper.toggleEffect('text-fade-in', 'add');
        if (backdropWrapper) backdropWrapper.toggleEffect('backdrop-fade-in', 'add');
        // --- END CONVERSION ---

        // Add event listeners for interaction
        mainImageContainer.addEventListener('click', cycleImage);
        backdrop.addEventListener('click', handleBackgroundClick);
        isAnimating = false;
      }, 850);
    }

    /**
     * Cycles to the next image in the gallery.
     * CONVERTED: Uses @wix/interact for fade-out/fade-in.
     */
    function cycleImage(e) {
      e.stopPropagation(); // Prevent background click
      if (isAnimating) return;
      isAnimating = true;
      currentImageIndex = (currentImageIndex + 1) % imageData.length;
      const data = imageData[currentImageIndex];
      const img = mainImageContainer.querySelector('img');

      // --- CONVERTED TO @wix/interact ---
      const imageWrapper = document.querySelector('[data-wix-path="#main-image-container"]');
      const textWrapper = document.querySelector('[data-wix-path="#text-container"]');

      if (imageWrapper) imageWrapper.toggleEffect('image-cycle-out', 'add');
      if (textWrapper) textWrapper.toggleEffect('text-fade-out', 'add');
      // --- END CONVERSION ---

      setTimeout(() => {
        img.src = data.src;
        mainTitle.textContent = data.title;
        mainSubtitle.textContent = data.subtitle;

        // --- CONVERTED TO @wix/interact ---
        if (imageWrapper) imageWrapper.toggleEffect('image-cycle-in', 'add');
        if (textWrapper) textWrapper.toggleEffect('text-fade-in', 'add');
        // --- END CONVERSION ---
        
        isAnimating = false;
      }, 400); // Matches CSS transition duration
    }

    /**
     * Resets the gallery if the background is clicked.
     */
    function handleBackgroundClick(e) {
      // Check if the click is directly on the backdrop
      if (e.target.id !== 'backdrop') return;
      returnToStartState();
    }

    /**
     * Returns the gallery to the initial snake layout.
     * CONVERTED: Uses @wix/interact to dismiss main image and text.
     */
    function returnToStartState() {
      if (isAnimating || !isEnlarged) return;
      isAnimating = true;
      isEnlarged = false; // We are no longer in the main view
      
      // --- CONVERTED TO @wix/interact ---
      const imageWrapper = document.querySelector('[data-wix-path="#main-image-container"]');
      const textWrapper = document.querySelector('[data-wix-path="#text-container"]');
      const backdropWrapper = document.querySelector('[data-wix-path="#backdrop"]');

      if (imageWrapper) imageWrapper.toggleEffect('image-dismiss', 'add');
      if (textWrapper) textWrapper.toggleEffect('text-fade-out', 'add');
      if (backdropWrapper) backdropWrapper.toggleEffect('backdrop-fade-out', 'add');
      // --- END CONVERSION ---

      // Clean up event listeners
      mainImageContainer.removeEventListener('click', cycleImage);
      backdrop.removeEventListener('click', handleBackgroundClick);

      setTimeout(() => {
        // Reset main container's inline styles for next time
        mainImageContainer.style.transition = 'none';
        mainImageContainer.style.left = '';
        mainImageContainer.style.top = '';
        mainImageContainer.style.width = '';
        mainImageContainer.style.height = '';
        mainImageContainer.style.transform = '';
        mainImageContainer.style.opacity = '0'; // Ensure it's hidden
        isAnimating = false;
        
        // Rebuild the snake
        buildSnake();
      }, 600); // Matches CSS transition
    }

    // --- INITIALIZATION ---
    buildSnake();

    // --- RESIZE HANDLING ---
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        // Simple resize handling: just restart the whole animation
        document.body.removeEventListener('click', handleBackgroundClick);
        mainImageContainer.removeEventListener('click', cycleImage);
        
        // Force-hide @wix/interact elements
        const imageWrapper = document.querySelector('[data-wix-path="#main-image-container"]');
        const textWrapper = document.querySelector('[data-wix-path="#text-container"]');
        const backdropWrapper = document.querySelector('[data-wix-path="#backdrop"]');
        if (imageWrapper) imageWrapper.toggleEffect('image-dismiss', 'add');
        if (textWrapper) textWrapper.toggleEffect('text-fade-out', 'add');
        if (backdropWrapper) backdropWrapper.toggleEffect('backdrop-fade-out', 'add');

        isAnimating = false; // Force stop any animation
        isEnlarged = false;
        buildSnake();
      }, 250);
    });
  });
</script>
</body>
</html>
