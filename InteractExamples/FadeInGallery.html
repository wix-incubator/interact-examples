<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Collage (@wix/interact Version)</title>
    <!-- Import Google Font 'Inter' -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Import @wix/interact library -->
    <script src="https://esm.sh/@wix/interact@1.79.0" type="module"></script>

    <style>
        /* Base styles for fullscreen, no margin/padding */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Hide scrollbars */
            background-color: #000; /* Fallback background */
            font-family: 'Inter', sans-serif;
        }

        /* Main container for the collage */
        #collage-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer; /* Indicate interactivity */
        }

        /* Wrapper for the custom element */
        wix-interact-element {
            display: contents; /* Makes the wrapper layout-neutral */
        }

        /* Each image layer is a 'fragment' */
        .fragment {
            position: absolute;
            overflow: hidden;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background-color: #111;
            /* Initial state (e.g., scale(0)) is handled by the animation effect */
        }

        /* The image itself, styled as a background */
        .fragment .content-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* STATIC Text overlay, now positioned relative to the main container */
        .text-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: max(20px, 4vw);
            box-sizing: border-box;
            color: #fff;
            opacity: 0; /* Initial state for @wix/interact fadeIn */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 5; /* Above fragments but below hotspot */
        }

        /* The hotspot that triggers text fade and pauses the animation */
        #hover-hotspot {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%; /* Activates when mouse is in bottom 50% */
            z-index: 10; /* On top of everything */
        }

        .text-overlay h1 {
            margin: 0 0 5px 0;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
        }

        .text-overlay p {
            margin: 0;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div id="collage-container">
        <!-- Fragments will be dynamically added here by JavaScript -->

        <!-- Static Text Overlay, wrapped for @wix/interact -->
        <wix-interact-element data-wix-path="#text-overlay">
            <div class="text-overlay">
                <h1>Explore the View</h1>
                <p>Hover to pause and discover more about this moment.</p>
            </div>
        </wix-interact-element>
        
        <!-- Hover Hotspot, wrapped for @wix/interact -->
        <wix-interact-element data-wix-path="#hover-hotspot">
            <div id="hover-hotspot"></div>
        </wix-interact-element>
    </div>

    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';
        
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. @wix/interact Configuration ---
            const interactConfig = {
                effects: {
                    'fragment-scale-in': {
                        keyframeEffect: {
                            name: 'fragment-scale-in',
                            keyframes: [
                                { transform: 'scale(0)' },
                                { transform: 'scale(1)' }
                            ]
                        },
                        duration: 1000,
                        easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                        fill: 'backwards' 
                    },
                    'text-fade': {
                        namedEffect: { type: 'FadeIn' },
                        duration: 400,
                        easing: 'ease-in-out',
                        fill: 'both'
                    }
                },
                interactions: [
                    {
                        key: '.collage-fragment-wrapper',
                        trigger: 'viewEnter',
                        params: { type: 'once' },
                        effects: [{ effectId: 'fragment-scale-in' }]
                    },
                    {
                        key: '#hover-hotspot',
                        trigger: 'hover',
                        params: { type: 'alternate' },
                        effects: [{ key: '#text-overlay', effectId: 'text-fade' }]
                    }
                ]
            };

            // --- 2. Initialize @wix/interact ---
            Interact.create(interactConfig);

            // --- 3. Application Logic ---
            const container = document.getElementById('collage-container');
            const hotspot = document.getElementById('hover-hotspot');
            let animationIntervalId = null;
            const intervalTime = 2000;

            const getRealImageUrl = () => `https://picsum.photos/1200/800?random=${Math.random()}`;

            function createFragment(imageUrl) {
                const wixElement = document.createElement('wix-interact-element');
                wixElement.className = 'collage-fragment-wrapper';
                wixElement.dataset.wixPath = `fragment-${Date.now()}`;

                const fragment = document.createElement('div');
                fragment.className = 'fragment';

                const content = document.createElement('div');
                content.className = 'content-image';
                content.style.backgroundImage = `url(${imageUrl})`;
                fragment.appendChild(content);

                wixElement.appendChild(fragment);
                return wixElement;
            }

            function animateCollage() {
                const imageUrl = getRealImageUrl();
                const preloader = new Image();

                preloader.onload = () => {
                    const oldFragments = container.querySelectorAll('.collage-fragment-wrapper');
                    if (oldFragments.length > 0) {
                        setTimeout(() => oldFragments.forEach(node => node.remove()), 1500);
                    }

                    const fragmentWrapper = createFragment(imageUrl);
                    container.appendChild(fragmentWrapper);
                };
                preloader.onerror = () => console.error("Failed to load image:", imageUrl);
                preloader.src = imageUrl;
            }

            // --- 4. Interval and Hover-to-Pause Logic ---
            function startAnimation() {
                if (animationIntervalId === null) {
                    animateCollage(); // Start immediately
                    animationIntervalId = setInterval(animateCollage, intervalTime);
                }
            }

            function stopAnimation() {
                clearInterval(animationIntervalId);
                animationIntervalId = null;
            }

            hotspot.addEventListener('mouseenter', stopAnimation);
            hotspot.addEventListener('mouseleave', startAnimation);

            startAnimation(); // Initial start
        });
    </script>
</body>
</html>
