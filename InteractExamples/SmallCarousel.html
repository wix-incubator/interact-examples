<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Nebula Carousel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Fonts */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #110f1a;
            color: #f0eefc;
            overflow: hidden; /* Prevents scrollbars from interfering with the layout */
        }


        .font-cinzel {
            font-family: 'Cinzel', serif;
        }


        /* 3D Carousel Container */
        .carousel-container {
            perspective: 1500px;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }


        .carousel {
            position: relative;
            width: 300px; /* Adjust based on card width */
            height: 500px; /* Adjust based on card height */
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }


        /* Base Card Styling */
        .card {
            position: absolute;
            width: 300px;
            height: 500px;
            background: #2a2a3e;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Align content to the bottom */
            padding: 0;
            transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1), filter 0.4s ease;
            cursor: pointer;
            user-select: none;
            border: 2px solid #5a5a8a;
            will-change: transform, filter; /* Helps browser optimize animations */
        }


        .card-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }


        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
            padding: 1.5rem 1rem;
            color: white;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.2) 33%, transparent);
            opacity: 0;
        }


        /* Card Positioning */
        .card.active { transform: translateX(0) translateZ(0) rotateY(0deg) scale(1); filter: brightness(1); z-index: 10; }
        .card.left-1 { transform: translateX(-60%) translateZ(-200px) rotateY(35deg) scale(0.9); filter: brightness(0.8); z-index: 5; }
        .card.right-1 { transform: translateX(60%) translateZ(-200px) rotateY(-35deg) scale(0.9); filter: brightness(0.8); z-index: 5; }
        .card.left-2 { transform: translateX(-110%) translateZ(-400px) rotateY(45deg) scale(0.8); filter: brightness(0.6); z-index: 2; }
        .card.right-2 { transform: translateX(110%) translateZ(-400px) rotateY(-45deg) scale(0.8); filter: brightness(0.6); z-index: 2; }
        .card.left-3 { transform: translateX(-150%) translateZ(-600px) rotateY(55deg) scale(0.7); filter: brightness(0.4); z-index: 1; }
        .card.right-3 { transform: translateX(150%) translateZ(-600px) rotateY(-55deg) scale(0.7); filter: brightness(0.4); z-index: 1; }
        .card.hidden { transform: translateX(0) translateZ(-800px) scale(0.5); opacity: 0; z-index: 0; }


        /* Fly out state class (animation is now handled by @wix/interact) */
        .card.fly-out {
            position: fixed;
            top: 50%;
            left: 50%;
            /* transform will be applied by interact */
            z-index: 1001;
            cursor: default;
            filter: brightness(1);
        }
        .card.fly-out .card-content {
            opacity: 1;
        }


        /* Backdrop */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }
        .backdrop.visible {
            pointer-events: auto;
        }
    </style>
</head>
<body>


    <div class="carousel-container" id="carousel-container">
        <div class="carousel" id="carousel">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </div>
    <div class="backdrop" id="backdrop"></div>


    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';


        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA ---
            const cardData = [
                { artist: 'Orion Nebula', keywords: 'Stellar Nursery • Cosmic Clouds • New Stars', imageUrl: 'https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=2050&auto=format&fit=crop' },
                { artist: 'Carina Nebula', keywords: 'Cosmic Reef • Massive Stars • Destruction', imageUrl: 'https://images.unsplash.com/photo-1504333638930-c8787321eee0?q=80&w=2070&auto=format&fit=crop' },
                { artist: 'Eagle Nebula', keywords: 'Creation • Destruction • Pillars of Gas', imageUrl: 'https://images.unsplash.com/photo-1614726365909-6353d39b4b72?q=80&w=1974&auto=format&fit=crop' },
                { artist: 'Veil Nebula', keywords: 'Supernova Remnant • Wisps • Ethereal', imageUrl: 'https://images.unsplash.com/photo-1543722530-0923b816416a?q=80&w=1964&auto=format&fit=crop' },
                { artist: 'Rosette Nebula', keywords: 'Stellar Cluster • Rose • Ionized Hydrogen', imageUrl: 'https://images.unsplash.com/photo-1610989569835-c5a98a14a9a2?q=80&w=1974&auto=format&fit=crop' },
                { artist: 'Horsehead Nebula', keywords: 'Dark Nebula • Cosmic Dust • Silhouette', imageUrl: 'https://images.unsplash.com/photo-1598154922343-5287f6525202?q=80&w=1915&auto=format&fit=crop' },
                { artist: 'Helix Nebula', keywords: 'Planetary Nebula • Dying Star • The Eye', imageUrl: 'https://images.unsplash.com/photo-1622737133809-d95047b9e673?q=80&w=1932&auto=format&fit=crop' },
                { artist: 'Lagoon Nebula', keywords: 'Emission Nebula • Star Formation • H II Region', imageUrl: 'https://images.unsplash.com/photo-1506703190230-378b5954495a?q=80&w=1974&auto=format&fit=crop' }
            ];


            // --- ELEMENTS ---
            const carousel = document.getElementById('carousel');
            const carouselContainer = document.getElementById('carousel-container');
            const backdrop = document.getElementById('backdrop');


            // --- STATE ---
            let currentIndex = 0;
            let isCardFlownOut = false;
            let isAnimating = false; // Flag to prevent clicks during animation


            // --- @wix/interact CONFIGURATION ---
            const interactConfig = { interactions: [] };
            
            const FLY_OUT_DURATION = 500;


            // --- FUNCTIONS ---
            function createCards() {
                cardData.forEach((data, index) => {
                    const wixWrapper = document.createElement('wix-interact-element');
                    wixWrapper.dataset.wixPath = `#card-${index}`;


                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.id = `card-${index}`;
                    card.dataset.index = index;
                    card.innerHTML = `
                        <img src="${data.imageUrl}" alt="${data.artist}" class="card-image" draggable="false" onerror="this.onerror=null;this.src='https://placehold.co/300x500/333/fff?text=Image+Not+Found';">
                        <div class="card-content">
                            <div class="card-artist font-cinzel">${data.artist}</div>
                            <div class="card-keywords">${data.keywords}</div>
                        </div>
                    `;
                    card.addEventListener('click', () => handleCardClick(card));
                    
                    wixWrapper.appendChild(card);
                    carousel.appendChild(wixWrapper);


                    // Add hover interactions for each card
                    interactConfig.interactions.push(
                        // MOUSE ENTER
                        {
                            trigger: 'mouseenter',
                            key: `#card-${index}`,
                            effects: [{
                                key: `#card-${index} .card-image`,
                                keyframeEffect: { name: 'scale-up', keyframes: [{ transform: 'scale(1.0)' }, { transform: 'scale(1.05)' }], duration: 5000, easing: 'ease-out', fill: 'forwards' }
                            }, {
                                key: `#card-${index} .card-content`,
                                keyframeEffect: { name: 'fade-in', keyframes: [{ opacity: 0 }, { opacity: 1 }], duration: 400, easing: 'ease-in-out', fill: 'forwards' }
                            }]
                        },
                        // MOUSE LEAVE
                        {
                            trigger: 'mouseleave',
                            key: `#card-${index}`,
                            effects: [{
                                key: `#card-${index} .card-image`,
                                keyframeEffect: { name: 'scale-down', keyframes: [{ transform: 'scale(1.05)' }, { transform: 'scale(1.0)' }], duration: 1000, easing: 'ease-out', fill: 'forwards' }
                            }, {
                                key: `#card-${index} .card-content`,
                                keyframeEffect: { name: 'fade-out', keyframes: [{ opacity: 1 }, { opacity: 0 }], duration: 400, easing: 'ease-in-out', fill: 'forwards' }
                            }]
                        }
                    );
                });


                // Add fly-out and backdrop interactions
                interactConfig.interactions.push(
                    { // Fly out active card on click
                        trigger: 'click',
                        key: '.card.active',
                        effects: [
                            { keyframeEffect: { name: 'fly-out', keyframes: [ { transform: 'translate(-50%, -50%) scale(1)' }, { transform: 'translate(-50%, -50%) scale(1.2)' } ], duration: FLY_OUT_DURATION, easing: 'ease-out', fill: 'forwards' }, key: '.card.fly-out'},
                            { keyframeEffect: { name: 'backdrop-in', keyframes: [ { opacity: 0 }, { opacity: 1 } ], duration: FLY_OUT_DURATION, easing: 'ease-out', fill: 'forwards' }, key: '#backdrop'}
                        ]
                    },
                    { // Fly in card on backdrop click
                        trigger: 'click',
                        key: '#backdrop',
                        effects: [
                             { keyframeEffect: { name: 'fly-in', keyframes: [ { transform: 'translate(-50%, -50%) scale(1.2)' }, { transform: 'translate(-50%, -50%) scale(1)' } ], duration: FLY_OUT_DURATION, easing: 'ease-out', fill: 'forwards' }, key: '.card.fly-out'},
                             { keyframeEffect: { name: 'backdrop-out', keyframes: [ { opacity: 1 }, { opacity: 0 } ], duration: FLY_OUT_DURATION, easing: 'ease-out', fill: 'forwards' }, key: '#backdrop'}
                        ]
                    }
                );


                Interact.create(interactConfig);
            }


            function updateCarousel() {
                if (isCardFlownOut) return;
                const cards = document.querySelectorAll('.card');
                cards.forEach((card, index) => {
                    let diff = index - currentIndex;
                    if (Math.abs(diff) > cardData.length / 2) {
                        diff = diff > 0 ? diff - cardData.length : diff + cardData.length;
                    }
                    card.className = 'card'; // Reset classes
                    switch (diff) {
                        case 0: card.classList.add('active'); break;
                        case 1: card.classList.add('right-1'); break;
                        case -1: card.classList.add('left-1'); break;
                        case 2: card.classList.add('right-2'); break;
                        case -2: card.classList.add('left-2'); break;
                        case 3: card.classList.add('right-3'); break;
                        case -3: card.classList.add('left-3'); break;
                        default: card.classList.add('hidden'); break;
                    }
                });
            }
            
            function navigateNext() {
                if (isCardFlownOut || isAnimating) return;
                currentIndex = (currentIndex + 1) % cardData.length;
                updateCarousel();
            }


            function navigatePrev() {
                if (isCardFlownOut || isAnimating) return;
                currentIndex = (currentIndex - 1 + cardData.length) % cardData.length;
                updateCarousel();
            }


            function handleCardClick(card) {
                if (isCardFlownOut || isAnimating) return;


                if (card.classList.contains('active')) {
                    isCardFlownOut = true;
                    card.classList.add('fly-out');
                    backdrop.classList.add('visible');
                    // The @wix/interact 'click' trigger on '.card.active' will handle the animation.
                } else {
                    const newIndex = parseInt(card.dataset.index, 10);
                    let diff = newIndex - currentIndex;
                    const numCards = cardData.length;


                    if (Math.abs(diff) > numCards / 2) {
                        diff = diff > 0 ? diff - numCards : diff + numCards;
                    }


                    isAnimating = true;
                    const stepDuration = 150;
                    const direction = diff > 0 ? navigateNext : navigatePrev;
                    const steps = Math.abs(diff);


                    for (let i = 0; i < steps; i++) {
                        setTimeout(() => direction(), i * stepDuration);
                    }


                    setTimeout(() => { isAnimating = false; }, steps * stepDuration);
                }
            }


            function closeFlownOutCard() {
                if (!isCardFlownOut) return;
                 // The @wix/interact 'click' trigger on '#backdrop' will handle the animation.
                
                // Wait for animation to finish before resetting state
                setTimeout(() => {
                    const flownCard = document.querySelector('.card.fly-out');
                    if (flownCard) {
                        flownCard.classList.remove('fly-out');
                    }
                    backdrop.classList.remove('visible');
                    isCardFlownOut = false;
                    setTimeout(updateCarousel, 50);
                }, FLY_OUT_DURATION);
            }


            // --- EVENT LISTENERS ---
            backdrop.addEventListener('click', closeFlownOutCard);


            document.body.addEventListener('mousemove', (e) => {
                if (isCardFlownOut || isAnimating) {
                    document.body.style.cursor = 'default';
                    return;
                }
                const hoverZone = window.innerWidth * 0.4;
                if (e.clientX < hoverZone) {
                    document.body.style.cursor = 'w-resize';
                } else if (e.clientX > window.innerWidth - hoverZone) {
                    document.body.style.cursor = 'e-resize';
                } else {
                    document.body.style.cursor = 'default';
                }
            });


            document.body.addEventListener('click', (e) => {
                if (isCardFlownOut || isAnimating) return;
                if (e.target.closest('.card') || e.target.closest('wix-interact-element')) return;


                const clickZone = window.innerWidth * 0.4;
                if (e.clientX < clickZone) {
                    navigatePrev();
                } else if (e.clientX > window.innerWidth - clickZone) {
                    navigateNext();
                }
            });


            let touchStartX = 0;
            carouselContainer.addEventListener('touchstart', (e) => {
                if (isCardFlownOut || isAnimating) return;
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            carouselContainer.addEventListener('touchend', (e) => {
                if (isCardFlownOut || isAnimating) return;
                const touchEndX = e.changedTouches[0].screenX;
                const swipeThreshold = 50;
                if (touchStartX - touchEndX > swipeThreshold) {
                    navigateNext();
                } else if (touchEndX - startX > swipeThreshold) {
                    navigatePrev();
                }
            }, { passive: true });


            // --- INITIALIZATION ---
            createCards();
            updateCarousel();
        });
    </script>


</body>
</html>
