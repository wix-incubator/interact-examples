<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Expanding Gallery with @wix/interact</title>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevent horizontal scroll */
        html {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        
        /* Basic body setup */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
            overscroll-behavior-y: contain;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Vertical container for rows (Mobile-first) */
        .feature-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100vw;
            padding: 1rem;
            margin: 0;
            box-sizing: border-box;
        }

        /* Each row styling (Mobile-first) */
        .feature-column {
            width: 100%;
            max-height: 20vh;
            overflow: hidden;
            position: relative;
            z-index: 1;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
        }

        /* Image styling */
        .feature-column .feature-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text group - initial state for animation */
        .feature-text-group {
            position: absolute;
            bottom: 1.25rem;
            left: 1.25rem;
            opacity: 0;
            transform: translateY(20px);
            z-index: 10;
            text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.6);
            line-height: 1.2;
            user-select: none;
            pointer-events: none;
        }

        /* Subtitle styling */
        .feature-bottom-subtitle {
            font-size: 0.875rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        /* Title styling */
        .feature-bottom-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
        }

        /* Media query for mobile responsiveness */
        @media (max-width: 768px) {
            .feature-container {
                padding: 1rem;
                gap: 1rem;
            }

            .feature-column {
                max-height: 25vh;
            }

            .feature-bottom-title {
                font-size: 1.5rem;
            }

            .feature-bottom-subtitle {
                font-size: 0.8rem;
            }
        }

        /* --- DESKTOP STYLES --- */
        @media (min-width: 769px) {
            body.desktop-layout {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                overflow: hidden;
                padding: 0;
                background-color: #ffffff;
            }

            .desktop-layout .feature-container {
                flex-direction: row;
                overflow-x: auto;
                scrollbar-width: none;
                width: 100vw;
                height: 100vh;
                max-width: none;
                margin: 0;
                padding: 0.5rem;
                gap: 0.5rem;
                box-sizing: border-box;
            }

            .desktop-layout .feature-container::-webkit-scrollbar {
                display: none;
            }

            .desktop-layout .feature-column {
                width: 200px;
                max-height: none;
                height: 100%;
                flex-shrink: 0;
                border-radius: 1rem;
            }
        }
    </style>
</head>
<body class="p-0">

    <div style="width: 100vw; margin: 0; padding: 0;">
        <div id="feature-container" class="feature-container">
            <div id="column-1" class="feature-column">
                <div id="text-1" class="feature-text-group">
                    <p class="feature-bottom-subtitle">Italian Alps</p>
                    <h2 class="feature-bottom-title">Serene Lakes</h2>
                </div>
                <img src="https://images.unsplash.com/photo-1439853949127-fa647821eba0?q=80&w=1974&auto=format&fit=crop"
                     onerror="this.onerror=null;this.src='https://placehold.co/1200x800/cccccc/ffffff?text=Image+Not+Found';"
                     alt="A serene lake with mountains in the background" class="feature-image">
            </div>
            <div id="column-2" class="feature-column">
                <div id="text-2" class="feature-text-group">
                    <p class="feature-bottom-subtitle">Arid Climate</p>
                    <h2 class="feature-bottom-title">Vast Deserts</h2>
                </div>
                <img src="https://images.unsplash.com/photo-1488197047962-b48492212cda?q=80&w=2070&auto=format&fit=crop"
                     onerror="this.onerror=null;this.src='https://placehold.co/1200x800/cccccc/ffffff?text=Image+Not+Found';"
                     alt="Sand dunes in a vast desert under a clear sky" class="feature-image">
            </div>
            <div id="column-3" class="feature-column">
                <div id="text-3" class="feature-text-group">
                    <p class="feature-bottom-subtitle">Tropical Paradise</p>
                    <h2 class="feature-bottom-title">Lush Rainforests</h2>
                </div>
                <img src="https://images.unsplash.com/photo-1425913397330-cf8af2ff40a1?q=80&w=1974&auto=format&fit=crop"
                     onerror="this.onerror=null;this.src='https://placehold.co/1200x800/cccccc/ffffff?text=Image+Not+Found';"
                     alt="A dense rainforest with sunlight filtering through the canopy" class="feature-image">
            </div>
            <div id="column-4" class="feature-column">
                <div id="text-4" class="feature-text-group">
                    <p class="feature-bottom-subtitle">Coastal Views</p>
                    <h2 class="feature-bottom-title">Ocean Cliffs</h2>
                </div>
                <img src="https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?q=80&w=1974&auto=format&fit=crop"
                     onerror="this.onerror=null;this.src='https://placehold.co/1200x800/cccccc/ffffff?text=Image+Not+Found';"
                     alt="Dramatic ocean cliffs with waves crashing below" class="feature-image">
            </div>
            <div id="column-5" class="feature-column">
                <div id="text-5" class="feature-text-group">
                    <p class="feature-bottom-subtitle">Metropolitan Area</p>
                    <h2 class="feature-bottom-title">Urban Landscapes</h2>
                </div>
                <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=2070&auto=format&fit=crop"
                     onerror="this.onerror=null;this.src='https://placehold.co/1200x800/cccccc/ffffff?text=Image+Not+Found';"
                     alt="A sprawling city skyline at dusk" class="feature-image">
            </div>
            <div id="column-6" class="feature-column">
                <div id="text-6" class="feature-text-group">
                    <p class="feature-bottom-subtitle">Night Sky</p>
                    <h2 class="feature-bottom-title">The Aurora</h2>
                </div>
                <img src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?q=80&w=2070&auto=format&fit=crop"
                     onerror="this.onerror=null;this.src='https://placehold.co/1200x800/cccccc/ffffff?text=Image+Not+Found';"
                     alt="The aurora borealis over a forest of pine trees" class="feature-image">
            </div>
        </div>
    </div>

    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        document.addEventListener("DOMContentLoaded", () => {
            const columns = document.querySelectorAll('.feature-column');
            const columnIds = Array.from(columns).map(col => `#${col.id}`);
            const textGroups = document.querySelectorAll('.feature-text-group');

            columns.forEach(column => {
                const wrapper = document.createElement('wix-interact-element');
                wrapper.dataset.wixPath = `#${column.id}`;
                column.parentNode.insertBefore(wrapper, column);
                wrapper.appendChild(column);
            });

            textGroups.forEach(textGroup => {
                if (textGroup.id) {
                    const wrapper = document.createElement('wix-interact-element');
                    wrapper.dataset.wixPath = `#${textGroup.id}`;
                    textGroup.parentNode.insertBefore(wrapper, textGroup);
                    wrapper.appendChild(textGroup);
                }
            });

            const mobileInitialHeight = '25vh';
            const mobileExpandedHeight = '80vh';
            const desktopInitialWidth = '200px';
            const desktopExpandedWidth = '600px';

            let interactInstance = null;
            let currentLayout = null;

            function initializeInteract() {
                const isDesktop = window.innerWidth >= 769;
                const newLayout = isDesktop ? 'desktop' : 'mobile';

                if (currentLayout === newLayout && interactInstance) {
                    return;
                }

                currentLayout = newLayout;

                if (interactInstance) {
                    interactInstance.destroy();
                }

                columns.forEach(column => {
                    column.style.maxHeight = '';
                    column.style.width = '';
                    column.style.marginBottom = '';
                    column.style.zIndex = '';
                });

                textGroups.forEach(textGroup => {
                    textGroup.style.opacity = '';
                    textGroup.style.transform = '';
                });

                if (isDesktop) {
                    document.body.classList.add('desktop-layout');
                } else {
                    document.body.classList.remove('desktop-layout');
                }

                const config = {
                    effects: {
                        'expand-column-vertical': {
                            keyframeEffect: {
                                name: 'expand-collapse-vertical',
                                keyframes: [
                                    { maxHeight: mobileInitialHeight, marginBottom: '0rem', zIndex: 1 },
                                    { maxHeight: mobileExpandedHeight, marginBottom: '0rem', zIndex: 10 }
                                ],
                            },
                            duration: 500,
                            easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                            fill: 'both'
                        },
                        'expand-column-horizontal': {
                            keyframeEffect: {
                                name: 'expand-collapse-horizontal',
                                keyframes: [
                                    { width: desktopInitialWidth, zIndex: 1 },
                                    { width: desktopExpandedWidth, zIndex: 10 }
                                ],
                            },
                            duration: 500,
                            easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                            fill: 'both'
                        },
                        'show-text': {
                            keyframeEffect: {
                                name: 'show-hide-text',
                                keyframes: [
                                    { opacity: 0, transform: 'translateY(20px)' },
                                    { opacity: 1, transform: 'translateY(0)' }
                                ],
                            },
                            duration: 400,
                            delay: 200,
                            easing: 'ease-out',
                            fill: 'both'
                        }
                    },
                    conditions: {
                        'mobile': {
                            type: 'media',
                            predicate: '(max-width: 768px)'
                        },
                        'desktop': {
                            type: 'media',
                            predicate: '(min-width: 769px)'
                        }
                    },
                    interactions: []
                };

                const interactions = [];
                columnIds.forEach(currentId => {
                    const textId = currentId.replace('column', 'text');

                    interactions.push({
                        key: currentId,
                        trigger: 'hover',
                        params: { type: 'alternate' },
                        conditions: ['mobile'],
                        effects: [
                            { key: currentId, effectId: 'expand-column-vertical' },
                            { key: textId, effectId: 'show-text' }
                        ]
                    });

                    interactions.push({
                        key: currentId,
                        trigger: 'hover',
                        params: { type: 'alternate' },
                        conditions: ['desktop'],
                        effects: [
                            { key: currentId, effectId: 'expand-column-horizontal' },
                            { key: textId, effectId: 'show-text' }
                        ]
                    });
                });

                config.interactions = interactions;
                interactInstance = Interact.create(config);
            }

            initializeInteract();

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    initializeInteract();
                }, 150);
            });

            const container = document.querySelector('.feature-container');
            if (container) {
                container.addEventListener('wheel', (evt) => {
                    if (window.innerWidth >= 769) {
                        container.scrollLeft += evt.deltaY;
                    }
                });
            }
        });
    </script>
</body>
</html>
