<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Expanding Gallery with @wix/interact</title>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base styles (Mobile-First) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            /* Added for smoother vertical scrolling on mobile */
            overscroll-behavior-y: contain;
            padding: 1.5rem; /* p-6 */
        }

        /* Container: Mobile-first (vertical column) */
        .feature-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* 24px */
            width: 100%;
            max-w: 7xl; /* 1280px */
            margin: 0 auto;
        }

        /* Column: Mobile-first (vertical rows) */
        .feature-column {
            width: 100%;
            /* Use max-height for vertical animation */
            max-height: 25vh; /* Initial height for mobile */
            overflow: hidden;
            position: relative; /* Required for z-index stacking */
            z-index: 1; /* Default stacking context */
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
        }

        /* Image styling */
        .feature-column .feature-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text group - initial state for animation */
        .feature-text-group {
            position: absolute;
            bottom: 1.25rem;
            left: 1.25rem;
            opacity: 0;
            transform: translateY(20px);
            z-index: 10;
            text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.6);
            line-height: 1.2;
            /* Prevents text from being selected during interaction */
            user-select: none;
            /* FIX: Prevents this element from capturing mouse events, stopping the hover glitch */
            pointer-events: none;
        }

        /* Subtitle styling */
        .feature-bottom-subtitle {
            font-size: 0.875rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        /* Title styling */
        .feature-bottom-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
        }

        /* --- Desktop Styles (min-width: 769px) --- */
        @media (min-width: 769px) {
            /* Center the component on the desktop screen */
            body.desktop-layout {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                /* Prevent vertical scroll on desktop */
                overflow: hidden;
            }

            /* Container: Desktop (horizontal row) */
            .feature-container {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 1rem;
                /* Hide the default scrollbar */
                scrollbar-width: none; /* For Firefox */
            }

            .feature-container::-webkit-scrollbar {
                display: none; /* For Chrome, Safari, and Opera */
            }

            /* Column: Desktop (horizontal columns) */
            .feature-column {
                /* Initial width set here. Animation is handled by @wix/interact */
                width: 200px;
                max-height: none; /* Override mobile max-height */
                height: 70vh; /* Set desktop height */
                flex-shrink: 0; /* Important: Prevents columns from shrinking */
            }

            .feature-bottom-title {
                font-size: 1.875rem; /* Ensure consistent title size */
            }
    
            .feature-bottom-subtitle {
                font-size: 0.875rem; /* Ensure consistent subtitle size */
            }
        }

        /* Smaller mobile tweaks */
         @media (max-width: 480px) {
            .feature-bottom-title {
                font-size: 1.5rem; /* Slightly smaller title on small mobile */
            }
        }
    </style>
</head>
<body class=""> <!-- JS will add 'desktop-layout' if needed -->

    <!-- @wix/interact configuration -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        document.addEventListener("DOMContentLoaded", () => {
            // Check viewport width to determine layout
            const isMobile = window.innerWidth <= 768;

            const columns = document.querySelectorAll('.feature-column');
            const textGroups = document.querySelectorAll('.feature-text-group');

            // --- Programmatically wrap elements ---
            // This is required for @wix/interact to target elements
            columns.forEach(column => {
                if (column.parentElement.tagName !== 'WIX-INTERACT-ELEMENT') {
                    const wrapper = document.createElement('wix-interact-element');
                    wrapper.dataset.wixPath = `#${column.id}`;
                    column.parentNode.insertBefore(wrapper, column);
                    wrapper.appendChild(column);
                }
            });

            textGroups.forEach(textGroup => {
                if (textGroup.id && textGroup.parentElement.tagName !== 'WIX-INTERACT-ELEMENT') {
                    const wrapper = document.createElement('wix-interact-element');
                    wrapper.dataset.wixPath = `#${textGroup.id}`;
                    textGroup.parentNode.insertBefore(wrapper, textGroup);
                    wrapper.appendChild(textGroup);
                }
            });

            // --- Define Animation Values ---
            // Mobile (Vertical)
            const mobileInitialHeight = '25vh';
            const mobileExpandedHeight = '45vh';
            const verticalGap = '1.5rem';
            const mobileHeightDiff = `calc(${mobileExpandedHeight} - ${mobileInitialHeight})`;
            const mobileNegativeMargin = `calc(-(${mobileHeightDiff}) - ${verticalGap})`;

            // Desktop (Horizontal)
            const desktopInitialWidth = '200px';
            const desktopExpandedWidth = '600px';

            // --- Define Reusable Effects ---
            const config = {
                effects: {
                    // Mobile vertical expansion
                    'expand-column-vertical': {
                        keyframeEffect: {
                            name: 'expand-collapse-vertical',
                            keyframes: [
                                { maxHeight: mobileInitialHeight, marginBottom: '0rem', zIndex: 1 },
                                { maxHeight: mobileExpandedHeight, marginBottom: mobileNegativeMargin, zIndex: 10 }
                            ],
                        },
                        duration: 500,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                        fill: 'both'
                    },
                    // Desktop horizontal expansion
                    'expand-column-horizontal': {
                        keyframeEffect: {
                            name: 'expand-collapse-horizontal',
                            keyframes: [
                                { width: desktopInitialWidth },
                                { width: desktopExpandedWidth }
                            ],
                        },
                        duration: 500,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                        fill: 'both'
                    },
                    // Shared text fade-in
                    'show-text': {
                        keyframeEffect: {
                            name: 'show-hide-text',
                            keyframes: [
                                { opacity: 0, transform: 'translateY(20px)' },
                                { opacity: 1, transform: 'translateY(0)' }
                            ],
                        },
                        duration: 400,
                        delay: 200, // This delay will apply on 'add'
                        easing: 'ease-out',
                        fill: 'both'
                    }
                },
                interactions: [] // To be populated based on device
            };


            if (isMobile) {
                // --- Mobile "Accordion" Logic (Click-based) ---
                
                // Initialize interact with just the effects
                Interact.create(config);

                let openColumnWrapper = null;

                columns.forEach(column => {
                    const columnWrapper = column.parentElement; // The <wix-interact-element> for the column
                    const textWrapper = column.querySelector('wix-interact-element'); // The <wix-interact-element> for the text

                    if (!columnWrapper || !textWrapper) return;

                    columnWrapper.addEventListener('click', () => {
                        if (openColumnWrapper && openColumnWrapper === columnWrapper) {
                            // Case 1: Clicked the *open* item. Collapse it.
                            columnWrapper.toggleEffect('expand-column-vertical', 'remove');
                            textWrapper.toggleEffect('show-text', 'remove');
                            openColumnWrapper = null;
                        } else if (openColumnWrapper && openColumnWrapper !== columnWrapper) {
                            // Case 2: Clicked a *new* item while another is open.
                            // 1. Collapse the old one.
                            openColumnWrapper.toggleEffect('expand-column-vertical', 'remove');
                            openColumnWrapper.querySelector('wix-interact-element').toggleEffect('show-text', 'remove');
                            
                            // 2. Expand the new one.
                            columnWrapper.toggleEffect('expand-column-vertical', 'add');
                            textWrapper.toggleEffect('show-text', 'add');
                            openColumnWrapper = columnWrapper;
                        } else {
                            // Case 3: No item is open. Expand this one.
                            columnWrapper.toggleEffect('expand-column-vertical', 'add');
                            textWrapper.toggleEffect('show-text', 'add');
                            openColumnWrapper = columnWrapper;
                        }
                    });
                });

            } else {
                // --- Desktop "Hover" Logic (Horizontal) ---
                
                document.body.classList.add('desktop-layout');

                // 1. Add interactions to the config
                config.interactions = Array.from(columns).map(column => ({
                    key: `#${column.id}`,
                    trigger: 'hover',
                    params: { type: 'alternate' },
                    effects: [
                        {
                            key: `#${column.id}`,
                            effectId: 'expand-column-horizontal'
                        },
                        {
                            key: `#${column.id.replace('column', 'text')}`,
                            effectId: 'show-text'
                        }
                    ]
                }));

                // 2. Initialize interact with effects AND interactions
                Interact.create(config);

                // 3. Add custom horizontal scrolling logic
                const container = document.querySelector('.feature-container');
                if (container) {
                    container.addEventListener('wheel', (evt) => {
                        // Prevent the default vertical scroll behavior
                        evt.preventDefault();
                        // Apply the scroll amount to the container's horizontal scroll
                        container.scrollLeft += evt.deltaY;
                    });
                }
            }
        });
    </script>

</body>
</html>
