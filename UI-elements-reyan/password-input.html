<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Pill Input Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .pill-container {
            position: relative;
            display: flex;
            align-items: center;
            width: fit-content;
            min-width: 140px; 
            height: 60px;
            background-color: white;
            border-radius: 9999px;
            padding: 0 clamp(1.25rem, 3vw, 1.75rem);
            /* Soft ambient shadow instead of a border */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: none;
            outline: none;
        }

        /* Accessibility: Focused state uses elevation (shadow + scale) instead of a border/ring */
        .pill-container:focus-within {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            background-color: #fafafa;
        }

        .input-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .real-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-weight: 500;
            color: #1f2937;
            letter-spacing: 0.02em;
            padding: 0;
            font-size: clamp(14px, 1.5vw + 10px, 16px);
        }

        .real-input::placeholder {
            color: #D1D5DB;
        }

        .is-hidden .real-input {
            color: transparent;
            caret-color: #1f2937;
        }

        .mask-layer {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            pointer-events: none;
            user-select: none;
            font-size: clamp(14px, 1.5vw + 10px, 16px);
        }

        .is-hidden .mask-layer {
            display: flex;
        }

        .mask-circle {
            width: 0.5em;
            height: 0.5em;
            border-radius: 9999px;
            display: inline-block;
            margin: 0 1.5px;
            vertical-align: middle;
            transition: background-color 0.3s;
        }

        .circle-black { background-color: black; }
        .circle-placeholder { background-color: #F3F4F6; }

        .mask-space {
            display: inline-block;
            width: 0.6em;
        }

        .eye-button {
            margin-left: 1.25rem; 
            padding: 0;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            cursor: pointer;
            outline: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }

        /* Accessible button focus: background color shift only */
        .eye-button:focus-visible {
            background-color: #f3f4f6;
        }

        .eye-button:hover {
            transform: scale(1.05);
        }

        .eye-button:active {
            transform: scale(0.9);
        }

        .eye-button svg {
            width: 100%;
            height: 100%;
        }

        #eye-lid {
            transform-origin: 18px 20px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s;
        }

        #eyelashes-group {
            transform-origin: 18px 20px;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #eye-curve {
            transition: opacity 0.15s ease-out;
        }

        #pupil {
            transition: opacity 0.08s ease-in-out;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>

    <div class="pill-container" id="container">
        <label for="mainInput" class="sr-only">Credit Card Number or Secure ID</label>
        
        <div class="input-wrapper">
            <div id="maskLayer" class="mask-layer" aria-hidden="true"></div>
            
            <input 
                type="text" 
                id="mainInput" 
                class="real-input" 
                placeholder="4452 2312 8843 2231" 
                maxlength="19"
                spellcheck="false"
                inputmode="numeric"
                autocomplete="cc-number"
            >
        </div>

        <button id="toggleBtn" class="eye-button" aria-label="Hide password" aria-controls="mainInput">
            <svg viewBox="0 0 36 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <clipPath id="eye-clip">
                        <path d="M6 20C6 20 11 13 18 13C25 13 30 20 30 20C30 20 25 27 18 27C11 27 6 20 6 20Z" />
                    </clipPath>
                </defs>

                <path id="eye-lid" d="M6 20C6 20 11 13 18 13C25 13 30 20 30 20C30 20 25 27 18 27C11 27 6 20 6 20Z" fill="black" />

                <path id="eye-curve" d="M6 20C6 20 11 27 18 27C25 27 30 20 30 20" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0;" />

                <g clip-path="url(#eye-clip)">
                    <circle id="pupil" cx="18" cy="20" r="4.2" fill="#FFD882" stroke="black" stroke-width="2" stroke-linejoin="round" />
                </g>

                <g id="eyelashes-group">
                    <path d="M10 9.5L11 11" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M26 9.5L25 11" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18 7V10" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
            </svg>
        </button>
    </div>

    <script>
        const input = document.getElementById('mainInput');
        const container = document.getElementById('container');
        const maskLayer = document.getElementById('maskLayer');
        const toggleBtn = document.getElementById('toggleBtn');
        const eyeLid = document.getElementById('eye-lid');
        const eyeCurve = document.getElementById('eye-curve');
        const pupil = document.getElementById('pupil');
        const eyelashes = document.getElementById('eyelashes-group');

        let isHidden = false;
        const placeholderText = "4452 2312 8843 2231";

        let targetX = 0, targetY = 0;
        let smoothX = 0, smoothY = 0;

        function toggle() {
            isHidden = !isHidden;
            container.classList.toggle('is-hidden', isHidden);
            
            if (isHidden) {
                eyeLid.style.opacity = '0';
                eyeLid.style.transform = 'scaleY(0.15)';
                eyeCurve.style.opacity = '1';
                pupil.style.opacity = '0';
                eyelashes.style.transform = 'translateY(1px) scaleY(-1)';
                
                input.type = "password";
                input.placeholder = "";
                toggleBtn.setAttribute('aria-label', 'Show password');
            } else {
                eyeLid.style.opacity = '1';
                eyeLid.style.transform = 'scaleY(1)';
                eyeCurve.style.opacity = '0';
                pupil.style.opacity = '1';
                eyelashes.style.transform = 'scaleY(1)';
                
                input.type = "text";
                input.placeholder = placeholderText;
                toggleBtn.setAttribute('aria-label', 'Hide password');
            }
            updateMask();
        }

        function updateMask() {
            const val = input.value || placeholderText;
            const isPlaceholder = !input.value;
            let html = '';
            for (let char of val) {
                if (char === ' ') {
                    html += '<span class="mask-space"></span>';
                } else {
                    html += `<span class="mask-circle ${isPlaceholder ? 'circle-placeholder' : 'circle-black'}"></span>`;
                }
            }
            maskLayer.innerHTML = html;
        }

        input.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 16) val = val.substring(0, 16);
            const matches = val.match(/.{1,4}/g);
            const formatted = matches ? matches.join(' ') : '';
            input.value = formatted;
            updateMask();
        });

        toggleBtn.addEventListener('click', toggle);

        window.addEventListener('mousemove', (e) => {
            const rect = toggleBtn.getBoundingClientRect();
            const eyeCenterX = rect.left + rect.width / 2;
            const eyeCenterY = rect.top + rect.height / 2;
            const dx = e.clientX - eyeCenterX;
            const dy = e.clientY - eyeCenterY;
            const angle = Math.atan2(dy, dx);
            const distance = Math.min(Math.sqrt(dx * dx + dy * dy) / 120, 1.2);
            targetX = Math.cos(angle) * distance;
            targetY = Math.sin(angle) * distance;
        });

        function animate() {
            smoothX += (targetX - smoothX) * 0.12;
            smoothY += (targetY - smoothY) * 0.12;
            const offsetX = smoothX * 3.5;
            const offsetY = smoothY * 2.2;
            pupil.setAttribute('cx', 18 + offsetX);
            pupil.setAttribute('cy', 20 + offsetY);
            requestAnimationFrame(animate);
        }

        function blink() {
            if (isHidden) {
                setTimeout(blink, 3000);
                return;
            }
            eyeLid.style.transform = 'scaleY(0.15)';
            pupil.style.opacity = '0';
            setTimeout(() => {
                if (!isHidden) {
                    eyeLid.style.transform = 'scaleY(1)';
                    pupil.style.opacity = '1';
                }
            }, 100);
            const nextBlink = Math.random() < 0.22 ? 200 : (Math.random() * 5000 + 2000);
            setTimeout(blink, nextBlink);
        }

        updateMask();
        animate();
        setTimeout(blink, 2000);
    </script>
</body>
</html>
