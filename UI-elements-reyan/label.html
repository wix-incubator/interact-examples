<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Pill List</title>
    <!-- Import Inter Font with 400 weight -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <!-- Tailwind for utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none !important;
            text-decoration: none;
        }

        body {
            /* Force regular weight globally */
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Container for the flex-wrap grid */
        .pill-container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 24px 16px; 
            justify-content: center;
            position: relative;
            perspective: 1000px;
        }

        @media (min-width: 640px) {
            .pill-container {
                gap: 16px;
                padding: 40px;
            }
        }

        /* Hidden Checkbox */
        .hidden-checkbox {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* The Pill Item Base */
        .list-item {
            display: flex;
            flex: 0 0 auto; 
            flex-direction: row;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 52px; 
            padding: 0 32px; 
            margin: 0; 
            z-index: 1; 
            user-select: none;
            background-color: transparent; 
            border-radius: 9999px; 
            position: relative;
            max-width: 100%;
            outline: none;
            
            transform-style: preserve-3d;
            will-change: transform, padding;
            transition: 
                padding 0.5s cubic-bezier(0.68, -0.6, 0.32, 1.6), 
                transform 0.2s cubic-bezier(0.2, 0, 0.2, 1),
                background-color 0.3s ease;
        }

        /* Keyboard Focus State */
        .list-item:focus-visible {
            box-shadow: 0 0 0 3px #ffffff;
        }

        @media (min-width: 640px) {
            .list-item {
                height: 64px;
                padding: 0 44px;
            }
        }

        /* Visual Pill Layer */
        .list-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: #1a1a1a;
            border: 2px solid transparent;
            border-radius: 9999px;
            z-index: -1;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            pointer-events: none;
        }

        @media (hover: hover) {
            .list-item:hover::before {
                background-color: #252525;
            }
        }

        /* Selected State - Growing width symmetrically */
        .hidden-checkbox:checked + .list-item {
            padding: 0 48px; 
        }

        @media (min-width: 640px) {
            .hidden-checkbox:checked + .list-item {
                padding: 0 64px;
            }
        }

        .hidden-checkbox:checked + .list-item::before {
            border-color: #ffdf99; 
            background-color: transparent;
        }

        /* Text Container */
        .label-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 14px; 
            color: #a3a3a3; 
            transition: color 0.3s ease;
            /* Explicit regular weight */
            font-weight: 400;
            white-space: nowrap;
            position: relative; 
            z-index: 2;
            pointer-events: none;
        }

        @media (min-width: 640px) {
            .label-text {
                font-size: 16px;
            }
        }

        /* Icon Styling - Pure Fade-in */
        .close-icon {
            position: absolute;
            right: calc(100% + 10px); 
            top: 50%;
            transform: translateY(-50%); 
            width: 18px;
            height: 18px;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease-in-out;
            background-color: #ffdf99;
            border-radius: 50%;
            color: #000;
            padding: 4px;
            pointer-events: none;
        }

        @media (min-width: 640px) {
            .close-icon {
                right: calc(100% + 14px);
                width: 22px;
                height: 22px;
                padding: 5px;
            }
        }

        .hidden-checkbox:checked + .list-item .close-icon {
            opacity: 1;
            transition-delay: 0.15s;
        }

        /* Color States - Keep regular weight */
        .hidden-checkbox:checked + .list-item .label-text {
            color: #ffdf99; 
            font-weight: 400;
        }

        .list-item:hover .label-text {
            color: #ffffff;
        }

        /* Accessibility: Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            .list-item, .list-item::before, .close-icon, .label-text {
                transition: none !important;
                transform: none !important;
            }
            .list-item:active {
                transform: none !important;
            }
        }
    </style>
</head>
<body>

    <nav aria-label="Skill selection" class="pill-container" id="pill-container">
        <!-- Generated Items -->
        <script>
            const skills = [
                "Web Design", "App Development", "UI/UX", "Branding & Logo", 
                "Illustration", "Motion Graphics", "Photography", "3D Modeling", 
                "Copywriting", "Digital Marketing", "SEO Optimization", "Cyber Security"
            ];
            
            const container = document.getElementById('pill-container');
            
            skills.forEach((skill, i) => {
                const isChecked = i === 0 || i === 4 || i === 7;
                const html = `
                    <div class="pill-wrapper">
                        <input type="checkbox" id="pill-${i}" class="hidden-checkbox" ${isChecked ? 'checked' : ''} aria-hidden="true">
                        <label 
                            for="pill-${i}" 
                            class="list-item" 
                            tabindex="0" 
                            role="button" 
                            aria-pressed="${isChecked}"
                            aria-label="Toggle ${skill}"
                        >
                            <span class="label-text">
                                <span class="close-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </span>
                                ${skill}
                            </span>
                        </label>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            // Keyboard and Accessibility Logic
            const items = document.querySelectorAll('.list-item');
            
            items.forEach(item => {
                const checkbox = document.getElementById(item.getAttribute('for'));

                item.addEventListener('keydown', (e) => {
                    if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        checkbox.checked = !checkbox.checked;
                        item.setAttribute('aria-pressed', checkbox.checked);
                    }
                });

                item.addEventListener('click', () => {
                    setTimeout(() => {
                        item.setAttribute('aria-pressed', checkbox.checked);
                    }, 0);
                });

                item.addEventListener('mousemove', (e) => {
                    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                    
                    const rect = item.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    const moveX = x * 0.12;
                    const moveY = y * 0.12;
                    const rotateX = y * -0.08;
                    const rotateY = x * 0.08;
                    item.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                });

                item.addEventListener('mouseleave', () => {
                    item.style.transform = `translate3d(0, 0, 0) rotateX(0) rotateY(0) scale(1)`;
                });
            });
        </script>
    </nav>

</body>
</html>
