<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox Interaction Prototype - Permanent Ring</title>
    <!-- Importing Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
        }

        .checkbox-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            height: 60px;
            padding: 0 20px;
            user-select: none;
            width: 100%;
            position: relative;
            background: #09090b; /* Zinc 950 */
            border: 2px solid #3f3f46; /* Zinc 700 */
            border-radius: 12px;
            text-align: left;
            isolation: isolate;
            outline: none;
            transition: background-color 0.4s ease, border-color 0.4s ease;
            overflow: hidden;
        }

        /* Border Wave Effect Layer */
        .checkbox-btn::before {
            content: '';
            position: absolute;
            inset: -2px; 
            background: radial-gradient(
                120px circle at var(--mouse-x, 0) var(--mouse-y, 0),
                #FFD882 0%,
                rgba(255, 216, 130, 0.3) 45%,
                transparent 80%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 5;
        }

        .checkbox-btn:hover::before {
            opacity: 1;
        }

        .checkbox-btn:hover {
            background-color: #111113;
            border-color: #52525b;
        }

        .checkbox-wrapper {
            position: relative;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            z-index: 2;
        }

        /* The grey circle ring - Always visible, never scales to 0 */
        .checkbox-circle {
            width: 18px;
            height: 18px;
            border: 2.5px solid #71717a; /* Zinc 500 */
            border-radius: 50%;
            display: grid;
            place-content: center;
            background-color: transparent;
            transition: background-color 0s, border-color 0s, transform 0s;
            transform: scale(1);
        }

        /* Selection bouncy animation */
        @keyframes bullet-bounce-elastic {
            0% { transform: scale(1); }
            30% { transform: scale(1.5); }
            50% { transform: scale(0.85); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Inner Dot */
        .checkbox-circle::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #FFD882;
            transform: scale(0);
            transition: transform 0s;
        }

        /* Checked State */
        .is-checked:not(.suppress-hover) .checkbox-circle {
            background-color: #272115;
            border-color: #FFD882;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            animation: bullet-bounce-elastic 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .is-checked:not(.suppress-hover) .checkbox-circle::before {
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1.4);
        }

        .checkbox-svg {
            position: absolute;
            inset: -3px; 
            width: 24px;
            height: 24px;
            pointer-events: none;
            fill: none;
            z-index: 1;
            transform: rotate(-90deg); 
        }

        .checkbox-path {
            stroke: #FFD882;
            stroke-width: 2.5px;
            stroke-linecap: round;
            transition: stroke-dashoffset 0s !important;
        }

        .checkbox-btn:not(.suppress-hover):hover .checkbox-path,
        .checkbox-btn.is-checked:not(.suppress-hover) .checkbox-path {
            transition: stroke-dashoffset 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            stroke-dashoffset: 0 !important;
        }

        /* Suppression logic: Grey ring stays visible at scale 1 */
        .suppress-hover .checkbox-path {
            stroke-dashoffset: var(--path-length, 60) !important;
            transition: none !important;
        }

        .suppress-hover .checkbox-circle {
            background-color: transparent !important;
            border-color: #71717a !important; /* Back to original grey */
            transform: scale(1) !important; /* Keep the ring visible */
            transition: none !important;
            animation: none !important;
        }

        .suppress-hover .checkbox-circle::before {
            transform: scale(0) !important; /* Only hide the dot */
            transition: none !important;
        }

        .label-text {
            position: relative;
            font-size: 15px;
            font-weight: 400;
            color: #d4d4d8;
            margin-left: 16px;
            transition: color 0s; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }

        .checkbox-btn:not(.suppress-hover):hover .label-text,
        .checkbox-btn.is-checked:not(.suppress-hover) .label-text {
            color: #FFD882 !important;
        }

        .suppress-hover .label-text {
            color: #d4d4d8 !important;
            transition: none !important;
        }

        .checkbox-btn:focus-visible {
            border-color: #FFD882;
            outline: 3px solid #FFD882;
            outline-offset: 4px;
            z-index: 10;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="flex flex-col space-y-4 w-full max-w-[320px]" role="radiogroup" aria-label="Selection Group">
        
        <button type="button" 
                class="checkbox-btn is-checked" 
                role="radio" 
                aria-checked="true"
                onmousemove="handleMouseMove(event, this)"
                onmouseleave="resetSuppress(this)"
                onclick="toggleBtn(this)">
            <div class="checkbox-wrapper">
                <svg class="checkbox-svg" viewBox="0 0 24 24">
                    <circle class="checkbox-path" cx="12" cy="12" r="9" />
                </svg>
                <div class="checkbox-circle"></div>
            </div>
            <span class="label-text">Complete prototype</span>
        </button>

        <button type="button" 
                class="checkbox-btn" 
                role="radio" 
                aria-checked="false"
                onmousemove="handleMouseMove(event, this)"
                onmouseleave="resetSuppress(this)"
                onclick="toggleBtn(this)">
            <div class="checkbox-wrapper">
                <svg class="checkbox-svg" viewBox="0 0 24 24">
                    <circle class="checkbox-path" cx="12" cy="12" r="9" />
                </svg>
                <div class="checkbox-circle"></div>
            </div>
            <span class="label-text">Review design</span>
        </button>

        <button type="button" 
                class="checkbox-btn" 
                role="radio" 
                aria-checked="false"
                onmousemove="handleMouseMove(event, this)"
                onmouseleave="resetSuppress(this)"
                onclick="toggleBtn(this)">
            <div class="checkbox-wrapper">
                <svg class="checkbox-svg" viewBox="0 0 24 24">
                    <circle class="checkbox-path" cx="12" cy="12" r="9" />
                </svg>
                <div class="checkbox-circle"></div>
            </div>
            <span class="label-text">Export assets</span>
        </button>

    </div>

    <script>
        function handleMouseMove(e, btn) {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            btn.style.setProperty('--mouse-x', `${x}px`);
            btn.style.setProperty('--mouse-y', `${y}px`);
        }

        const initializePaths = () => {
            document.querySelectorAll('.checkbox-path').forEach(path => {
                const length = path.getTotalLength();
                path.style.setProperty('--path-length', length);
                path.style.strokeDasharray = length;
                
                const btn = path.closest('.checkbox-btn');
                const isChecked = btn.classList.contains('is-checked');
                
                path.style.transition = 'none';
                path.style.strokeDashoffset = isChecked ? 0 : length;
                path.getBoundingClientRect(); 
                path.style.transition = '';
            });
        };

        function toggleBtn(btn) {
            const isChecked = btn.classList.contains('is-checked');
            const allBtns = document.querySelectorAll('.checkbox-btn');
            
            allBtns.forEach(otherBtn => {
                if (otherBtn !== btn) {
                    otherBtn.classList.remove('is-checked');
                    otherBtn.setAttribute('aria-checked', 'false');
                    const path = otherBtn.querySelector('.checkbox-path');
                    const length = path.style.getPropertyValue('--path-length');
                    path.style.strokeDashoffset = length;
                    
                    if (otherBtn.matches(':hover')) {
                        otherBtn.classList.add('suppress-hover');
                    }
                }
            });

            const path = btn.querySelector('.checkbox-path');
            const length = path.style.getPropertyValue('--path-length');

            if (isChecked) {
                btn.classList.remove('is-checked');
                btn.setAttribute('aria-checked', 'false');
                btn.classList.add('suppress-hover');
                path.style.strokeDashoffset = length;
            } else {
                btn.classList.add('is-checked');
                btn.setAttribute('aria-checked', 'true');
                btn.classList.remove('suppress-hover');
                path.style.strokeDashoffset = 0;
            }
        }

        function resetSuppress(btn) {
            btn.classList.remove('suppress-hover');
        }

        window.addEventListener('load', initializePaths);
        window.addEventListener('resize', initializePaths);
    </script>
</body>
</html>
