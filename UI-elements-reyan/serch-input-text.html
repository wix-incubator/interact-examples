<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Search Capsule</title>
    <!-- Importing Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent-color: #FFD882;
            --bg-zinc-950: #09090b;
            --border-white: #ffffff;
            --text-white: #ffffff;
            --text-zinc-400: #a1a1aa;
            /* Premium easing curve for smoother expansion */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 24px;
        }

        .anchor-wrapper {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            max-width: 400px;
        }

        .search-container {
            display: flex;
            align-items: center;
            justify-content: center; 
            padding: 0; 
            height: 60px;
            background-color: var(--bg-zinc-950);
            border-radius: 9999px;
            width: 60px; 
            position: relative;
            /* Synchronized smooth transitions */
            transition: 
                width 0.6s var(--ease-out-expo), 
                background-color 0.4s ease, 
                transform 0.2s ease, 
                padding 0.6s var(--ease-out-expo);
            isolation: isolate;
            overflow: hidden; 
            cursor: pointer;
            border: none;
            outline: none;
        }

        /* Hover state: Border glow */
        .search-container:hover {
            background-color: #0c0c0e; 
        }

        /* Focus state: Smoother expansion flow */
        .search-container:focus-within {
            width: 320px;
            background-color: #0c0c0e !important;
            padding: 0 22px;
            justify-content: flex-start; 
        }

        /* SEARCHING STATE: Fills with YELLOW and pulses */
        .search-container.submitting {
            width: 320px;
            padding: 0 22px;
            justify-content: flex-start;
            background-color: var(--accent-color) !important;
            animation: containerPulse 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes containerPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .base-border {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 0 2px var(--border-white);
            border-radius: 9999px;
            pointer-events: none;
            z-index: -1;
            transition: box-shadow 0.4s var(--ease-out-expo);
        }

        .search-container:hover .base-border,
        .search-container:focus-within .base-border {
            box-shadow: inset 0 0 0 2px var(--accent-color);
        }

        .search-container.submitting .base-border {
            box-shadow: inset 0 0 0 2px transparent;
        }

        .search-icon-btn {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            color: var(--text-white);
            flex-shrink: 0;
            z-index: 2;
            transition: 
                color 0.3s ease, 
                transform 0.5s var(--ease-out-expo);
            order: 1;
            cursor: pointer;
            outline: none;
        }

        .search-icon-btn svg circle, .search-icon-btn svg line {
            vector-effect: non-scaling-stroke;
        }

        /* Smooth 90 degrees rotation on hover/focus */
        .search-container:hover .search-icon-btn,
        .search-container:focus-within .search-icon-btn {
            color: var(--accent-color);
            transform: rotate(90deg) scale(1.1);
        }

        /* SEARCHING ICON: Satisfying Spin */
        @keyframes iconSpin {
            0% { transform: rotate(90deg) scale(1.2); }
            100% { transform: rotate(450deg) scale(1.2); }
        }

        .search-container.submitting .search-icon-btn {
            color: #000000 !important;
            animation: iconSpin 0.7s var(--ease-out-expo) forwards;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 0;
            flex-grow: 0;
            order: 2;
            margin-left: 0;
            overflow: hidden;
            opacity: 0; /* Fade in effect */
            transition: 
                width 0.6s var(--ease-out-expo), 
                margin-left 0.6s var(--ease-out-expo),
                opacity 0.4s ease;
        }

        .search-container:focus-within .input-wrapper,
        .search-container.submitting .input-wrapper {
            width: auto;
            flex-grow: 1;
            margin-left: 14px;
            opacity: 1;
        }

        .typewriter-cursor {
            width: 2px;
            height: 20px;
            background-color: var(--accent-color);
            margin-right: 4px;
            animation: blink 1s step-end infinite;
            flex-shrink: 0;
            z-index: 3;
            transition: background-color 0.3s ease;
        }

        .search-container.submitting .typewriter-cursor {
            background-color: #000000 !important;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .explore-input {
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--text-white);
            width: 100%;
            z-index: 2;
            caret-color: transparent;
            white-space: nowrap;
            transition: color 0.3s ease;
        }

        .search-container:focus-within .explore-input {
            color: var(--accent-color);
        }

        .search-container.submitting .explore-input {
            color: #000000 !important;
        }

        .explore-input::placeholder {
            color: rgba(255, 216, 130, 0.4);
            transition: color 0.3s ease;
        }

        .search-container.submitting .explore-input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="anchor-wrapper">
            <div class="search-container" id="main-container" role="search" aria-label="Explore content">
                <div class="base-border"></div>
                
                <button type="submit" id="submit-btn" class="search-icon-btn" aria-label="Submit search">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>

                <div class="input-wrapper">
                    <div class="typewriter-cursor" aria-hidden="true"></div>
                    <label for="search-input" class="sr-only">Search</label>
                    <input 
                        type="text" 
                        class="explore-input" 
                        placeholder="Search"
                        spellcheck="false"
                        id="search-input"
                        autocomplete="off"
                    />
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const cursor = document.querySelector('.typewriter-cursor');
        const container = document.getElementById('main-container');
        const submitBtn = document.getElementById('submit-btn');

        input.addEventListener('input', () => {
            if (input.value.length > 0) {
                cursor.style.display = 'none';
                input.style.caretColor = 'currentColor'; 
            } else {
                cursor.style.display = 'block';
                input.style.caretColor = 'transparent';
            }
        });

        const handleSearchSubmission = () => {
            const val = input.value.trim();
            container.classList.add('submitting');
            
            setTimeout(() => {
                container.classList.remove('submitting');
                if (val) console.log("Searching for:", val);
            }, 1200);
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleSearchSubmission();
            }
        });

        submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleSearchSubmission();
        });

        container.addEventListener('click', (e) => {
            if (document.activeElement !== input) {
                input.focus();
            }
        });
    </script>
</body>
</html>
