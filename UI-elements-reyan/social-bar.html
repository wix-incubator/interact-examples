<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Console v3.15 - Accessible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --active-color: #FFD882;
            --idle-color: #ffffff;
            --analog-easing: cubic-bezier(0.7, 0, 0.2, 1);
            --anim-duration: 0.6s; 
            /* Dimensions */
            --ring-radius: 30px;
            --ring-stroke: 2px;
            --ring-size: 64px; 
            --expansion-dist: 100px;
            --expanded-width: 264px; 
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .menu-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px; 
        }

        .menu-item {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin: 0;
            outline: none;
        }

        .menu-item.active {
            z-index: 50;
        }

        .split-ring-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--ring-size); 
            height: var(--ring-size);
            transition: width var(--anim-duration) var(--analog-easing) 0s, opacity 0.4s ease, box-shadow 0.2s ease;
            opacity: 1;
            border-radius: 999px;
        }

        /* Keyboard Focus Indicator for Accessibility */
        .menu-item:focus-visible .split-ring-btn {
            box-shadow: 0 0 0 3px black, 0 0 0 6px var(--active-color);
        }

        .split-ring-btn.active {
            width: var(--expanded-width); 
            transition-delay: var(--anim-duration);
        }

        /* Support for users who prefer reduced motion */
        @media (prefers-reduced-motion: reduce) {
            :root {
                --anim-duration: 0.1s;
            }
            .split-ring-btn.active {
                transition-delay: 0s;
            }
        }

        /* SVG Global Stroke Enforcement */
        svg * {
            vector-effect: non-scaling-stroke !important;
            stroke-width: 2px !important;
        }

        .svg-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: var(--ring-size);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .main-svg {
            transition: transform 0s var(--anim-duration);
            transform: rotate(0deg);
        }

        .split-ring-btn.active .main-svg {
            transition: transform var(--anim-duration) var(--analog-easing) 0s;
            transform: rotate(180deg);
        }

        .left-arc-group, .right-arc-group {
            transition: transform var(--anim-duration) var(--analog-easing) 0s;
        }

        .split-ring-btn.active .left-arc-group {
            transform: translateX(calc(var(--expansion-dist) * -1)); 
            transition-delay: var(--anim-duration);
        }

        .split-ring-btn.active .right-arc-group {
            transform: translateX(var(--expansion-dist)); 
            transition-delay: var(--anim-duration);
        }

        .arc-path {
            fill: none;
            stroke: var(--idle-color);
            stroke-linecap: round;
            transition: stroke 0.4s ease;
        }

        .split-ring-btn.active .arc-path {
            stroke: var(--active-color);
            filter: drop-shadow(0 0 8px rgba(255, 216, 130, 0.4));
        }

        .center-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .icon-wrapper {
            position: absolute;
            transition: all 0.3s ease;
            transition-delay: 0.3s;
            opacity: 1;
            transform: scale(0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .split-ring-btn.active .icon-wrapper {
            opacity: 0;
            transform: scale(0.35);
            transition-delay: 0s;
        }

        .typewriter-text {
            color: var(--active-color);
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: 400; 
            letter-spacing: -0.01em;
            white-space: nowrap;
            font-feature-settings: 'tnum' on, 'lnum' on;
        }

        /* Visually hide helper text but keep for screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <nav aria-label="Contact Connections">
        <div class="menu-container" id="menu-container">
            <!-- Buttons injected by JS -->
        </div>
    </nav>

    <div class="fixed bottom-8 right-8 text-[10px] tracking-widest uppercase opacity-20 pointer-events-none">
        Connection Console v3.15
    </div>

    <script>
        const menuItemsData = [
            { 
                label: "Instagram",
                info: "@alex.motion", 
                icon: `<svg width="40" height="40" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>`
            },
            { 
                label: "Facebook",
                info: "Alex Johnson", 
                icon: `<svg width="40" height="40" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>`
            },
            { 
                label: "Email",
                info: "hello@alex.design", 
                icon: `<svg width="40" height="40" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`
            }
        ];

        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        function generateArcPath(center, radius, startAngle, endAngle) {
            const start = polarToCartesian(center, center, radius, endAngle);
            const end = polarToCartesian(center, center, radius, startAngle);
            return ["M", start.x, start.y, "A", radius, radius, 0, 0, 0, end.x, end.y].join(" ");
        }

        const container = document.getElementById('menu-container');
        const radius = 30; 
        const strokeWidth = 2;
        const size = (radius * 2) + strokeWidth;
        const center = size / 2;
        const gap = 12;

        const leftPath = generateArcPath(center, radius, 180 + gap, 360 - gap);
        const rightPath = generateArcPath(center, radius, gap, 180 - gap);

        menuItemsData.forEach((itemData) => {
            const itemEl = document.createElement('div');
            itemEl.className = 'menu-item';
            itemEl.tabIndex = 0;
            itemEl.role = "button";
            itemEl.ariaExpanded = "false";
            itemEl.ariaLabel = `Show contact info for ${itemData.label}`;
            
            itemEl.innerHTML = `
                <div class="split-ring-btn">
                    <div class="svg-container">
                        <svg class="main-svg" width="100%" height="100%" viewBox="0 0 ${size} ${size}" style="overflow: visible;">
                            <g class="left-arc-group">
                                <path class="arc-path" d="${leftPath}" />
                            </g>
                            <g class="right-arc-group">
                                <path class="arc-path" d="${rightPath}" />
                            </g>
                        </svg>
                    </div>
                    <div class="center-content">
                        <div class="icon-wrapper">
                            ${itemData.icon}
                        </div>
                        <span class="sr-only">Contact detail: </span>
                        <h1 class="typewriter-text" aria-live="polite"></h1>
                    </div>
                </div>
            `;

            const btn = itemEl.querySelector('.split-ring-btn');
            const h1 = itemEl.querySelector('.typewriter-text');
            let typingTimeout = null;
            let currentText = "";
            let isActive = false;

            const activate = () => {
                if (isActive) return;
                isActive = true;
                itemEl.classList.add('active');
                btn.classList.add('active');
                itemEl.ariaExpanded = "true";
                
                if (typingTimeout) clearTimeout(typingTimeout);
                
                typingTimeout = setTimeout(() => {
                    let i = currentText.length;
                    const type = () => {
                        if (i < itemData.info.length) {
                            currentText = itemData.info.substring(0, i + 1);
                            h1.textContent = currentText;
                            i++;
                            typingTimeout = setTimeout(type, 30);
                        }
                    };
                    type();
                }, 800);
            };

            const deactivate = () => {
                if (!isActive) return;
                isActive = false;
                itemEl.classList.remove('active');
                btn.classList.remove('active');
                itemEl.ariaExpanded = "false";
                
                if (typingTimeout) clearTimeout(typingTimeout);
                
                let i = currentText.length;
                const backspace = () => {
                    if (i > 0) {
                        currentText = itemData.info.substring(0, i - 1);
                        h1.textContent = currentText;
                        i--;
                        typingTimeout = setTimeout(backspace, 15);
                    }
                };
                backspace();
            };

            // Mouse Events
            itemEl.addEventListener('mouseenter', activate);
            itemEl.addEventListener('mouseleave', deactivate);

            // Keyboard Events
            itemEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (isActive) deactivate();
                    else activate();
                }
                if (e.key === 'Escape' && isActive) {
                    deactivate();
                }
            });

            // Focus/Blur for Screen Readers
            itemEl.addEventListener('focus', activate);
            itemEl.addEventListener('blur', deactivate);

            container.appendChild(itemEl);
        });
    </script>
</body>
</html>
