<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Carousel — @wix/interact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --perspective: 1200px;
            --card-radius: 20px;
        }

        * { margin: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #08080c;
            color: #eeeef2;
            overflow-x: hidden;
        }

        interact-element { display: contents; }

        .scroll-section {
            height: 400vh;
            position: relative;
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: clip;
        }

        .bg-glow {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 45%, rgba(99, 102, 241, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 30% 60%, rgba(168, 85, 247, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 70% 55%, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .carousel-viewport {
            perspective: var(--perspective);
            perspective-origin: 50% 45%;
        }

        .carousel {
            position: relative;
            width: 280px;
            height: 420px;
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: 280px;
            height: 420px;
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(255, 255, 255, 0.06);
            user-select: none;
        }

        .card-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 5s ease-out;
        }

        .card:hover .card-image {
            transform: scale(1.06);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.65) 0%,
                rgba(0, 0, 0, 0.15) 35%,
                transparent 100%
            );
            z-index: 1;
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 1.5rem 1.25rem;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .card:hover .card-content {
            opacity: 1;
            transform: translateY(0);
        }

        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 0.65rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .scroll-hint {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            transition: opacity 0.6s ease;
            z-index: 2;
            text-align: center;
        }

        .scroll-hint::after {
            content: '';
            display: block;
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0.6rem auto 0;
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.15; transform: scaleY(0.5); }
            50% { opacity: 0.5; transform: scaleY(1); }
        }

        #slider-panel {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            background: rgba(10, 10, 18, 0.92);
            color: #ccc;
            padding: 18px 20px;
            border-radius: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11.5px;
            min-width: 200px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        #slider-panel .panel-title {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 14px;
            color: #fff;
            letter-spacing: 0.04em;
        }

        #slider-panel label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.6);
        }

        #slider-panel input[type="range"] {
            width: 100%;
            margin-top: 3px;
            accent-color: #818cf8;
            height: 4px;
        }

        #slider-panel .val {
            color: rgba(255, 255, 255, 0.85);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <interact-element data-interact-key="scroll-section">
        <div class="scroll-section">
            <div class="sticky-wrapper">
                <div class="bg-glow"></div>
                <div class="carousel-viewport">
                    <interact-element data-interact-key="carousel">
                        <div class="carousel" id="carousel"></div>
                    </interact-element>
                </div>
                <div class="scroll-hint" id="scroll-hint">Scroll to explore</div>
            </div>
        </div>
    </interact-element>

    <div id="slider-panel">
        <div class="panel-title">Controls</div>
        <label>
            Perspective: <span class="val" id="v-persp">1200</span>px
            <input type="range" min="400" max="3000" step="50" value="1200"
                oninput="document.documentElement.style.setProperty('--perspective', this.value + 'px'); document.getElementById('v-persp').textContent = this.value">
        </label>
        <label>
            Border Radius: <span class="val" id="v-radius">20</span>px
            <input type="range" min="0" max="40" step="1" value="20"
                oninput="document.documentElement.style.setProperty('--card-radius', this.value + 'px'); document.getElementById('v-radius').textContent = this.value">
        </label>
        <label>
            Rotation Loops: <span class="val" id="v-loops">2</span>
            <input type="range" min="1" max="5" step="1" value="2"
                oninput="window.__cfg.loops = +this.value; document.getElementById('v-loops').textContent = this.value">
        </label>
        <label>
            Min Brightness: <span class="val" id="v-dim">35</span>%
            <input type="range" min="10" max="80" step="5" value="35"
                oninput="window.__cfg.minB = +this.value / 100; document.getElementById('v-dim').textContent = this.value">
        </label>
        <label>
            Ring Radius: <span class="val" id="v-ring">380</span>px
            <input type="range" min="250" max="550" step="10" value="380"
                oninput="window.__cfg.radius = +this.value; document.getElementById('v-ring').textContent = this.value; window.__updateRadius()">
        </label>
    </div>

    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@2.0.3/web?bundle';

        window.__cfg = { loops: 2, minB: 0.35, radius: 380 };

        const cardData = [
            { title: 'Yosemite Valley',  subtitle: 'California \u2022 Dawn \u2022 Granite',     image: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&h=900&fit=crop' },
            { title: 'Alpine Sunrise',   subtitle: 'Mountains \u2022 Light \u2022 Silence',     image: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&h=900&fit=crop' },
            { title: 'Mirror Lake',      subtitle: 'Reflection \u2022 Sunset \u2022 Stillness', image: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=900&fit=crop' },
            { title: 'Forest Mist',      subtitle: 'Fog \u2022 Evergreen \u2022 Mystery',       image: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=900&fit=crop' },
            { title: 'Starry Peaks',     subtitle: 'Night Sky \u2022 Snow \u2022 Wonder',       image: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&h=900&fit=crop' },
            { title: 'Hidden Falls',     subtitle: 'Water \u2022 Moss \u2022 Tranquility',      image: 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=600&h=900&fit=crop' },
            { title: 'Golden Hour',      subtitle: 'Fields \u2022 Warmth \u2022 Horizon',       image: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600&h=900&fit=crop' },
            { title: 'Coastal Dusk',     subtitle: 'Ocean \u2022 Sand \u2022 Serenity',         image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=900&fit=crop' }
        ];

        const NUM_CARDS = cardData.length;
        const ANGLE_INC = 360 / NUM_CARDS;
        const carousel = document.getElementById('carousel');

        function buildCards() {
            carousel.innerHTML = '';
            cardData.forEach((data, i) => {
                const angle = ANGLE_INC * i;
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;
                card.style.transform = `rotateY(${angle}deg) translateZ(${window.__cfg.radius}px)`;
                card.innerHTML =
                    `<img class="card-image" src="${data.image}" alt="${data.title}" draggable="false"` +
                    ` onerror="this.onerror=null;this.src='https://placehold.co/600x900/1a1a2e/555?text=${encodeURIComponent(data.title)}'">` +
                    `<div class="card-overlay"></div>` +
                    `<div class="card-content">` +
                        `<div class="card-title">${data.title}</div>` +
                        `<div class="card-subtitle">${data.subtitle}</div>` +
                    `</div>`;
                carousel.appendChild(card);
            });
        }

        window.__updateRadius = () => {
            const r = window.__cfg.radius;
            carousel.querySelectorAll('.card').forEach((card, i) => {
                const angle = ANGLE_INC * i;
                card.style.transform = `rotateY(${angle}deg) translateZ(${r}px)`;
            });
        };

        buildCards();

        Interact.create({
            interactions: [{
                key: 'scroll-section',
                trigger: 'viewProgress',
                effects: [{
                    key: 'carousel',
                    customEffect: (el, progress) => {
                        const totalDeg = window.__cfg.loops * 360;
                        const rotation = progress * totalDeg;
                        el.style.transform = `rotateY(${rotation}deg)`;

                        const norm = ((rotation % 360) + 360) % 360;
                        const minB = window.__cfg.minB;

                        el.querySelectorAll('.card').forEach((card, i) => {
                            const cardAngle = ANGLE_INC * i;
                            const worldAngle = (norm + cardAngle) % 360;
                            const diff = Math.min(worldAngle, 360 - worldAngle);
                            const proximity = (Math.cos(diff * Math.PI / 180) + 1) / 2;
                            const b = 0.3 + 0.8 * proximity;
                            card.style.filter = b > 1.05 ? 'none' : `brightness(${b.toFixed(3)})`;
                        });

                        const hint = document.getElementById('scroll-hint');
                        if (hint) hint.style.opacity = progress > 0.015 ? '0' : '1';
                    },
                    rangeStart: { name: 'cover', offset: { value: 0, unit: 'percentage' } },
                    rangeEnd:   { name: 'cover', offset: { value: 100, unit: 'percentage' } },
                    fill: 'both'
                }]
            }]
        });
    </script>

</body>
</html>
