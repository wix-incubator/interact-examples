<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Scrolling Cards with @wix/interact</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Custom styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa; /* Off-white background */
            color: #1a202c; /* Dark text color for contrast */
        }
        /* Prevents scroll-jumping on some browsers */
        html {
            scroll-behavior: smooth;
        }
        .card {
            /* All cards will start off-screen at the bottom */
            transform: translateY(80vh);
            will-change: transform;
            /* Added for a subtle separation on a light background */
            border: 1px solid #e2e8f0;
        }
        /* Style for the image inside the card to make it fill the container */
        .card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Gradient overlay for text readability */
        .card .card-content {
            position: relative;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Main Scrolling Animation Section -->
    <wix-interact-element data-wix-path="#scroll-section">
        <!-- 
          The height of this section drives the entire scroll animation.
          425vh gives enough room for:
          - Cards sliding up (approx 100vh)
          - Horizontal scroll (approx 200vh)
          - Cards sliding out (approx 100vh)
          - Buffers
        -->
        <section id="scroll-section" class="relative" style="height: 900vh;">
            
            <!-- Sticky Container: This holds the animation "window" -->
            <div class="sticky top-[12.5vh] h-[75vh] w-full overflow-hidden">

                <!-- The stack of cards -->
                <!-- We wrap the stack as it's a target for horizontal animation -->
                <wix-interact-element data-wix-path="#stack">
                    <!-- 
                      Responsive gaps:
                      - gap-2 (0.5rem) on mobile
                      - md:gap-[0.2vw] on desktop 
                    -->
                    <div id="stack" class="flex w-max gap-2 md:gap-[0.2vw]">
                        
                        <!-- We wrap each card as they are individual animation targets -->
                        <wix-interact-element data-wix-path="#card-1">
                            <!-- 
                              Responsive card width:
                              - w-[80vw] on mobile (shows 1 card + 20vw of next card, i.e., "a card and a quarter")
                              - md:w-[33.3vw] on desktop (shows 3 cards)
                            -->
                            <div id="card-1" class="card relative h-[75vh] w-[80vw] md:w-[33.3vw] rounded-2xl flex flex-col justify-end text-white overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1554941829-202a0b2403b8?q=80&w=2940&auto=format&fit=crop" alt="Abstract architectural design" class="rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/800x1200/cccccc/333333?text=Image+1';">
                                <div class="card-content p-6 md:p-8">
                                    <h2 class="text-3xl md:text-4xl font-bold">Discovery</h2>
                                    <p class="text-base md:text-lg">Every scroll reveals something new.</p>
                                </div>
                            </div>
                        </wix-interact-element>

                        <wix-interact-element data-wix-path="#card-2">
                            <div id="card-2" class="card relative h-[75vh] w-[80vw] md:w-[33.3vw] rounded-2xl flex flex-col justify-end text-white overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=2787&auto=format&fit=crop" alt="Smooth, flowing abstract shapes" class="rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/800x1200/cccccc/333333?text=Image+2';">
                                <div class="card-content p-6 md:p-8">
                                    <h2 class="text-3xl md:text-4xl font-bold">Progression</h2>
                                    <p class="text-base md:text-lg">Building momentum with each frame.</p>
                                </div>
                            </div>
                        </wix-interact-element>

                        <wix-interact-element data-wix-path="#card-3">
                            <div id="card-3" class="card relative h-[75vh] w-[80vw] md:w-[33.3vw] rounded-2xl flex flex-col justify-end text-white overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1579546929662-711aa81148cf?q=80&w=2940&auto=format&fit=crop" alt="Colorful pastel abstract background" class="rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/800x1200/cccccc/333333?text=Image+3';">
                                <div class="card-content p-6 md:p-8">
                                    <h2 class="text-3xl md:text-4xl font-bold">Harmony</h2>
                                    <p class="text-base md:text-lg">Where design and motion align.</p>
                                </div>
                            </div>
                        </wix-interact-element>

                        <wix-interact-element data-wix-path="#card-4">
                            <div id="card-4" class="card relative h-[75vh] w-[80vw] md:w-[33.3vw] rounded-2xl flex flex-col justify-end text-white overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=2940&auto=format&fit=crop" alt="Vibrant liquid paint mixing" class="rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/800x1200/cccccc/333333?text=Image+4';">
                                <div class="card-content p-6 md:p-8">
                                    <h2 class="text-3xl md:text-4xl font-bold">Energy</h2>
                                    <p class="text-base md:text-lg">A dynamic visual experience.</p>
                                </div>
                            </div>
                        </wix-interact-element>

                        <wix-interact-element data-wix-path="#card-5">
                            <div id="card-5" class="card relative h-[75vh] w-[80vw] md:w-[33.3vw] rounded-2xl flex flex-col justify-end text-white overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?q=80&w=2854&auto=format&fit=crop" alt="Subtle watercolor texture" class="rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/800x1200/cccccc/333333?text=Image+5';">
                                <div class="card-content p-6 md:p-8">
                                    <h2 class="text-3xl md:text-4xl font-bold">Clarity</h2>
                                    <p class="text-base md:text-lg">The story becomes clear.</p>
                                </div>
                            </div>
                        </wix-interact-element>
                        
                        <wix-interact-element data-wix-path="#card-6">
                            <div id="card-6" class="card relative h-[75vh] w-[80vw] md:w-[33.3vw] rounded-2xl flex flex-col justify-end text-white overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2940&auto=format&fit=crop" alt="Bright blend of abstract colors" class="rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/800x1200/cccccc/333333?text=Image+6';">
                                <div class="card-content p-6 md:p-8">
                                    <h2 class="text-3xl md:text-4xl font-bold">Finale</h2>
                                    <p class="text-base md:text-lg">The final view unfolds.</p>
                                </div>
                            </div>
                        </wix-interact-element>
                    </div>
                </wix-interact-element>
            </div>

        </section>
    </wix-interact-element>

    <!-- 
      The intro and outro sections that were here have been removed
      as requested. The page now ends after the scroll animation.
    -->

    <script type="module">
        // Import the Interact library
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        document.addEventListener('DOMContentLoaded', () => {

            // --- Responsive Animation Logic ---
            // Check if we're on a mobile-sized screen (Tailwind's 'md' breakpoint is 768px)
            const isMobile = window.innerWidth < 768;

            // Define the horizontal scroll distance based on screen size.
            // Desktop: Scrolls 3 card-widths (3 * 33.3vw) + gaps
            const desktopScroll = 'translateX(-101vw)'; 
            // Mobile: Scroll (Total Width - Viewport Width) to align last card to the right
            // Total Width = (6 cards * 80vw) + (5 gaps * 0.5rem) = 480vw + 2.5rem
            // Viewport Width = 100vw
            // Scroll Distance = (480vw + 2.5rem) - 100vw = 380vw + 2.5rem
            const mobileScroll = 'translateX(calc(-380vw - 2.5rem))'; // Corrected distance
            
            const horizontalScrollEnd = isMobile ? mobileScroll : desktopScroll;
            // --- End Responsive Logic ---

            // Define the scroll ranges for each card's entrance animation.
            // This logic remains unchanged as it controls the vertical "pop up"
            // UPDATED: Added a 10% buffer. Animations now run from 10% to 90%.
            const cardAnimationRanges = [
                [10, 40],  // Card 1
                [10, 50],  // Card 2
                [10, 60],  // Card 3
                [40, 70], // Card 4
                [50, 80], // Card 5
                [60, 90]  // Card 6
            ];

            // Programmatically create the keyframe effect configuration for each card.
            const cardEffects = cardAnimationRanges.map((range, index) => {
                const cardId = `#card-${index + 1}`;
                return {
                    key: cardId,
                    keyframeEffect: {
                        name: `card-${index + 1}-scroll-effect`,
                        keyframes: [
                            { transform: 'translateY(80vh)' }, // Start position (from CSS)
                            { transform: 'translateY(0vh)' }   // End position
                        ],
                    },
                    rangeStart: { name: 'cover', offset: { value: range[0], type: 'percentage' } },
                    rangeEnd: { name: 'cover', offset: { value: range[1], type: 'percentage' } },
                    easing: 'linear', // Syncs the animation directly to scroll progress
                    fill: 'both' // Ensures the element stays at its end state
                };
            });

            // The main configuration for @wix/interact
            const config = {
                interactions: [
                    {
                        key: '#scroll-section',
                        trigger: 'viewProgress',
                        effects: [
                            // Effect 1: Animate the horizontal scroll of the #stack container
                            {
                                key: '#stack',
                                keyframeEffect: {
                                    name: 'stack-scroll-effect',
                                    keyframes: [
                                        { transform: 'translateX(0vw)' },
                                        // Use the dynamically calculated scroll distance
                                        { transform: horizontalScrollEnd } 
                                    ],
                                },
                                // This animation occurs between 50% and 90% of the scroll duration
                                rangeStart: { name: 'cover', offset: { value: 50, type: 'percentage' } },
                                rangeEnd: { name: 'cover', offset: { value: 90, type: 'percentage' } },
                                easing: 'linear',
                                fill: 'both'
                            },
                            // Spread the generated card effects into the array
                            ...cardEffects
                        ]
                    }
                ]
            };

            // Initialize @wix/interact with the configuration
            Interact.create(config);
        });
    </script>

</body>
</html>
