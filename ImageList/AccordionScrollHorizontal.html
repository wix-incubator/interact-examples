<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Expanding Gallery - Wix Interact v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevent horizontal scroll */
        html {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Container settings */
        .feature-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
            padding: 1.25rem;
            box-sizing: border-box;
        }

        /* Column/Card styling */
        .feature-column {
            width: 100%;
            max-height: 25vh; 
            overflow: hidden;
            position: relative;
            z-index: 1;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-radius: 1.5rem;
            background: #eee;
        }

        .feature-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none; 
        }

        .feature-column:hover .feature-image {
            transform: scale(1.08);
        }

        /* Titles and text groups */
        .feature-text-group {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            line-height: 1.2;
            pointer-events: none;
        }

        .feature-bottom-subtitle {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        .feature-bottom-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
        }

        /* Text readability gradient overlay */
        .feature-column::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .feature-column:hover::after {
            opacity: 1;
        }

        /* Desktop specific styles */
        @media (min-width: 769px) {
            body.desktop-layout {
                height: 100vh;
                display: flex;
                align-items: center;
                overflow: hidden;
            }

            .desktop-layout .feature-container {
                flex-direction: row;
                height: 80vh;
                width: auto;
                margin: 0 auto;
                padding: 1rem 5vw;
                gap: 1rem;
                overflow-x: auto;
                scrollbar-width: none;
            }

            .desktop-layout .feature-container::-webkit-scrollbar {
                display: none;
            }

            .desktop-layout .feature-column {
                width: 220px; 
                max-height: none;
                height: 100%;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

    <main id="feature-container" class="feature-container">
        
        <!-- Card 1 -->
        <interact-element data-interact-key="col-1">
            <div id="column-1" class="feature-column" tabindex="0">
                <interact-element data-interact-key="txt-1">
                    <div class="feature-text-group">
                        <p class="feature-bottom-subtitle">Italian Alps</p>
                        <h2 class="feature-bottom-title">Serene Lakes</h2>
                    </div>
                </interact-element>
                <img src="https://images.unsplash.com/photo-1439853949127-fa647821eba0?auto=format&fit=crop&w=1200&q=80" alt="Lake" class="feature-image">
            </div>
        </interact-element>

        <!-- Card 2 -->
        <interact-element data-interact-key="col-2">
            <div id="column-2" class="feature-column" tabindex="0">
                <interact-element data-interact-key="txt-2">
                    <div class="feature-text-group">
                        <p class="feature-bottom-subtitle">Arid Climate</p>
                        <h2 class="feature-bottom-title">Vast Deserts</h2>
                    </div>
                </interact-element>
                <img src="https://images.unsplash.com/photo-1488197047962-b48492212cda?auto=format&fit=crop&w=1200&q=80" alt="Desert" class="feature-image">
            </div>
        </interact-element>

        <!-- Card 3 -->
        <interact-element data-interact-key="col-3">
            <div id="column-3" class="feature-column" tabindex="0">
                <interact-element data-interact-key="txt-3">
                    <div class="feature-text-group">
                        <p class="feature-bottom-subtitle">Tropical Paradise</p>
                        <h2 class="feature-bottom-title">Lush Rainforests</h2>
                    </div>
                </interact-element>
                <img src="https://images.unsplash.com/photo-1425913397330-cf8af2ff40a1?auto=format&fit=crop&w=1200&q=80" alt="Rainforest" class="feature-image">
            </div>
        </interact-element>

        <!-- Card 4 -->
        <interact-element data-interact-key="col-4">
            <div id="column-4" class="feature-column" tabindex="0">
                <interact-element data-interact-key="txt-4">
                    <div class="feature-text-group">
                        <p class="feature-bottom-subtitle">Coastal Views</p>
                        <h2 class="feature-bottom-title">Ocean Cliffs</h2>
                    </div>
                </interact-element>
                <img src="https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?auto=format&fit=crop&w=1200&q=80" alt="Cliffs" class="feature-image">
            </div>
        </interact-element>

        <!-- Card 5 -->
        <interact-element data-interact-key="col-5">
            <div id="column-5" class="feature-column" tabindex="0">
                <interact-element data-interact-key="txt-5">
                    <div class="feature-text-group">
                        <p class="feature-bottom-subtitle">Metropolitan Area</p>
                        <h2 class="feature-bottom-title">Urban Landscapes</h2>
                    </div>
                </interact-element>
                <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=1200&q=80" alt="City" class="feature-image">
            </div>
        </interact-element>

        <!-- Card 6 -->
        <interact-element data-interact-key="col-6">
            <div id="column-6" class="feature-column" tabindex="0">
                <interact-element data-interact-key="txt-6">
                    <div class="feature-text-group">
                        <p class="feature-bottom-subtitle">Night Sky</p>
                        <h2 class="feature-bottom-title">The Aurora</h2>
                    </div>
                </interact-element>
                <img src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?auto=format&fit=crop&w=1200&q=80" alt="Aurora" class="feature-image">
            </div>
        </interact-element>
    </main>

    <script type="module">
        // Import web package from Wix Interact v2
        import { Interact } from 'https://esm.sh/@wix/interact@2.0.0-rc.6/web';

        document.addEventListener("DOMContentLoaded", () => {
            
            const config = {
                effects: {
                    'v-expand': {
                        keyframeEffect: {
                            name: 'v-exp',
                            keyframes: [
                                { maxHeight: '25vh' },
                                { maxHeight: '75vh', zIndex: 10 }
                            ]
                        },
                        duration: 600,
                        easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
                        fill: 'both'
                    },
                    'h-expand': {
                        keyframeEffect: {
                            name: 'h-exp',
                            keyframes: [
                                { width: '220px' },
                                { width: '600px', zIndex: 10 }
                            ]
                        },
                        duration: 600,
                        easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
                        fill: 'both'
                    },
                    'reveal': {
                        keyframeEffect: {
                            name: 't-rev',
                            keyframes: [
                                { opacity: 0, transform: 'translateY(20px)' },
                                { opacity: 1, transform: 'translateY(0)' }
                            ]
                        },
                        duration: 400,
                        delay: 150,
                        easing: 'ease-out',
                        fill: 'both'
                    }
                },
                conditions: {
                    'mobile': { type: 'media', predicate: '(max-width: 768px)' },
                    'desktop': { type: 'media', predicate: '(min-width: 769px)' }
                },
                interactions: []
            };

            // Setup interactions for 6 items
            for (let i = 1; i <= 6; i++) {
                const colKey = `col-${i}`;
                const txtKey = `txt-${i}`;

                // Mobile triggers
                config.interactions.push({
                    key: colKey,
                    trigger: 'hover',
                    params: { type: 'alternate' },
                    conditions: ['mobile'],
                    effects: [
                        { key: colKey, effectId: 'v-expand' },
                        { key: txtKey, effectId: 'reveal' }
                    ]
                });

                // Desktop triggers
                config.interactions.push({
                    key: colKey,
                    trigger: 'hover',
                    params: { type: 'alternate' },
                    conditions: ['desktop'],
                    effects: [
                        { key: colKey, effectId: 'h-expand' },
                        { key: txtKey, effectId: 'reveal' }
                    ]
                });
            }

            // Initialize Wix Interact
            Interact.create(config);

            // Layout management and smooth scroll
            const container = document.getElementById('feature-container');
            const toggleLayout = () => {
                const isDesktop = window.innerWidth >= 769;
                document.body.classList.toggle('desktop-layout', isDesktop);
            };

            window.addEventListener('resize', toggleLayout);
            toggleLayout();

            // Horizontal mouse-wheel scroll for desktop
            container.addEventListener('wheel', (e) => {
                if (window.innerWidth >= 769) {
                    e.preventDefault();
                    container.scrollLeft += e.deltaY;
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
