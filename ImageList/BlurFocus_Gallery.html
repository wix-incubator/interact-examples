<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Nature Gallery Hover Blur with @wix/interact</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module" src="https://esm.sh/@wix/interact@1.79.0"></script>
<style>
body {
  margin:0;
  padding:40px;
  background:#111;
  font-family:'Inter', sans-serif;
  color:white;
  overflow-x:hidden;
}

/* GRID */
.grid-container {
  display:grid;
  grid-template-columns: repeat(8, 1fr);
  grid-auto-rows:180px;
  gap:40px;
  width:100%;
}

/* CARD BASE */
wix-interact-element {
  display:block;
  position:relative;
  overflow:hidden;
  width:100%;
  height:100%;
  border-radius:2px;
  cursor:pointer;
  z-index: 1; /* Set a default z-index */
}

/* inner wrapper */
.card-inner {
  width:100%;
  height:100%;
  position:relative;
  border-radius:2px;
}

/* card background */
.card-bg {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  will-change: filter; /* Performance hint */
}

/* overlay */
.card-overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.2);
  z-index:1;
  border-radius:2px;
}

/* text */
.card-content {
  position:absolute;
  bottom:12px;
  left:12px;
  right:12px;
  opacity:0;
  transform:translateY(10px);
  z-index:2;
  line-height:1.2;
  text-shadow:0 2px 6px rgba(0,0,0,0.5);
  will-change: opacity, transform; /* Performance hint */
}

.card-content h3 {margin:0 0 3px 0; font-size:1rem;}
.card-content p {margin:0; font-size:0.85rem;}

@media(max-width:1200px){.grid-container{grid-template-columns: repeat(4,1fr);}}
@media(max-width:800px){.grid-container{grid-template-columns: repeat(2,1fr);}}
</style>
</head>
<body>

<section class="grid-container">
</section>

<script type="module">
  import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

  const container = document.querySelector('.grid-container');
  const ROWS = 4;
  const COLS = 8;
  const CARD_COUNT = ROWS*COLS;
  const wildNatureSeeds = [
    'forest', 'mountain', 'river', 'jungle', 'desert', 'waterfall', 'canyon', 'prairie',
    'volcano', 'ice', 'valley', 'rainforest', 'beach', 'cliff', 'glacier', 'savanna',
    'woods', 'stream', 'sunset', 'meadow', 'ocean', 'hills', 'swamp', 'rocks', 
    'pond', 'flowers', 'trees', 'fog', 'autumn', 'spring', 'winter', 'summer'
  ];

  // Create cards dynamically
  for(let i=0;i<CARD_COUNT;i++){
    const cardId = i + 1;
    const card=document.createElement('wix-interact-element');
    card.setAttribute('data-wix-path','card-'+cardId);

    const inner=document.createElement('div');
    inner.classList.add('card-inner');

    const bg=document.createElement('div');
    bg.classList.add('card-bg');
    bg.style.backgroundImage=`url('https://picsum.photos/seed/${wildNatureSeeds[i % wildNatureSeeds.length]}/600/400')`;

    const overlay=document.createElement('div');
    overlay.classList.add('card-overlay');

    const content=document.createElement('div');
    content.classList.add('card-content');
    content.innerHTML=`<h3>Card ${cardId}</h3><p>Hover to see info</p>`;

    inner.appendChild(bg);
    inner.appendChild(overlay);
    inner.appendChild(content);
    card.appendChild(inner);
    container.appendChild(card);
  }

  // --- @wix/interact Configuration ---
  const interactions = [];
  const DURATION = 300;
  const EASING = 'ease';

  for (let i = 1; i <= CARD_COUNT; i++) {
    const effects = [];

    // --- Effects for the HOVERED card ---
    // 1. Scale up the inner container
    effects.push({
      key: `card-${i}`,
      selector: '.card-inner',
      transition: {
        duration: DURATION,
        easing: EASING,
        styleProperties: [{ name: 'transform', value: 'scale(1.05)' }]
      }
    });

    // 2. Darken the overlay
    effects.push({
      key: `card-${i}`,
      selector: '.card-overlay',
      transition: {
        duration: DURATION,
        easing: EASING,
        styleProperties: [{ name: 'background', value: 'rgba(0,0,0,0.35)' }]
      }
    });
    
    // 3. Reveal the content
    effects.push({
      key: `card-${i}`,
      selector: '.card-content',
      transition: {
        duration: DURATION,
        easing: EASING,
        styleProperties: [
            { name: 'opacity', value: '1' },
            { name: 'transform', value: 'translateY(0)' }
        ]
      }
    });

    // 4. Bring the card to the front
    effects.push({
        key: `card-${i}`,
        transition: {
            duration: 0, // z-index should be instant
            styleProperties: [{ name: 'z-index', value: '999' }]
        }
    });

    // --- Effects for ALL OTHER cards ---
    for (let j = 1; j <= CARD_COUNT; j++) {
      if (i === j) continue; // Skip the hovered card
      
      // 5. Blur the background of other cards
      effects.push({
        key: `card-${j}`,
        selector: '.card-bg',
        transition: {
          duration: DURATION,
          easing: EASING,
          styleProperties: [{ name: 'filter', value: 'blur(12px)' }]
        }
      });
    }

    // --- Create the interaction object for the current card ---
    interactions.push({
      key: `card-${i}`,
      trigger: 'hover',
      params: { type: 'alternate' },
      effects: effects
    });
  }

  // Initialize Interact with the generated configuration
  Interact.create({ interactions });

</script>

</body>
</html>
