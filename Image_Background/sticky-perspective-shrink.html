<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective Scroll - Fixed Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    interact-element { display: block; }

    body {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      background: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .sticky-track {
      height: 500vh;
      position: relative;
    }

    .sticky-frame {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: clip;
      background: #000;
    }

    .sticky-frame img {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    .hero-copy {
      position: sticky;
      top: 0;
      height: 0;
      z-index: 10;
      pointer-events: none;
    }

    .hero-copy-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      text-align: center;
      padding: 0 24px;
    }

    .hero-copy h1 {
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 4px 60px rgba(0, 0, 0, 0.9);
    }

    .hero-copy p {
      font-size: clamp(1.125rem, 2.2vw, 1.5rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.12em;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      text-shadow: 0 2px 30px rgba(0, 0, 0, 0.9);
    }
  </style>
</head>
<body>

  <interact-element data-interact-key="track">
    <section class="sticky-track">
      <div class="hero-copy">
        <div class="hero-copy-inner">
          <h1>Structure</h1>
          <p>Where light meets form</p>
        </div>
      </div>
      <div class="sticky-frame">
        <img
          src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop"
          alt="Modern Architecture"
        />
      </div>
    </section>
  </interact-element>

  <script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact/web';

    Interact.create({
      interactions: [
        {
          key: 'track',
          trigger: 'viewProgress',
          effects: [
            {
              selector: 'img',
              keyframeEffect: {
                name: 'shrink-tilt-fade',
                keyframes: [
                  {
                    transform: 'scale(1) perspective(1200px) rotateX(0deg)',
                    borderRadius: '0px',
                    filter: 'brightness(0.7) grayscale(0)',
                    offset: 0,
                  },
                  {
                    transform: 'scale(0.55) perspective(1200px) rotateX(30deg)',
                    borderRadius: '24px',
                    filter: 'brightness(0.7) grayscale(0)',
                    offset: 0.35,
                  },
                  {
                    transform: 'scale(0.4) perspective(1200px) rotateX(0deg)',
                    borderRadius: '32px',
                    filter: 'brightness(0.7) grayscale(0)',
                    offset: 0.6,
                  },
                  {
                    transform: 'scale(0.4) perspective(1200px) rotateX(0deg)',
                    borderRadius: '32px',
                    filter: 'brightness(0.7) grayscale(1)',
                    offset: 1,
                  },
                ],
              },
              rangeStart: { name: 'contain', offset: { value: 0, unit: 'percentage' } },
              rangeEnd:   { name: 'contain', offset: { value: 100, unit: 'percentage' } },
              fill: 'both',
            },
          ],
        },
      ],
    });
  </script>

</body>
</html>
