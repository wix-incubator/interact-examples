<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structure & Light — Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    interact-element {
      display: block;
    }

    html, body {
      height: 100%;
      overflow-x: clip;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .scroll-driver {
      height: 300vh;
    }

    .sticky-stage {
      position: sticky;
      top: 1.5rem;
      width: calc(100vw - 3rem);
      height: calc(100vh - 3rem);
      margin-left: 1.5rem;
      border-radius: 6px;
      overflow: hidden;
    }

    /* =============================================
       LEFT COLUMN
       ============================================= */
    .left-col {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 2;
      overflow: clip;
      padding-right: 12px;
      background: #0a0a0a;
    }

    .left-inner {
      width: 22vw;
      height: 100%;
      background: #0a0a0a;
      position: relative;
      overflow: clip;
    }

    .elegant-blurb {
      position: absolute;
      top: 2.8rem;
      left: 0.5rem;
      max-width: 18rem;
      z-index: 3;
    }

    .elegant-blurb p {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: clamp(0.62rem, 0.78vw, 0.75rem);
      font-weight: 300;
      line-height: 1.8;
      color: #fff;
      letter-spacing: 0.01em;
      text-wrap: pretty;
    }

    /* --- Hero typography --- */
    .hero-text-wrap {
      position: absolute;
      inset: 0;
      overflow: clip;
    }

    .hero-text-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: left bottom;
    }

    .hero-word {
      position: absolute;
      bottom: 0;
      font-family: 'Anton', sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 0.88;
      letter-spacing: -0.01em;
      color: #fff;
      transform-origin: left bottom;
    }

    .hero-w1 {
      font-size: 11vw;
      left: 0;
      transform: translateX(calc(11vw * 0.88)) rotate(-90deg);
    }

    .hero-w2 {
      font-size: 11vw;
      left: calc(11vw * 0.88 + 0.5vw);
      transform: translateX(calc(11vw * 0.88)) rotate(-90deg);
    }

    /* =============================================
       RIGHT COLUMN
       ============================================= */
    .right-col {
      position: absolute;
      inset: 0;
      overflow: clip;
      z-index: 1;
    }

    .bg-image-el {
      position: absolute;
      inset: 0;
    }

    .bg-image {
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center top;
      position: relative;
    }

    .bg-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.1);
      pointer-events: none;
    }


    /* =============================================
       SCROLL CUE
       ============================================= */
    .scroll-cue {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      position: absolute;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    .scroll-cue-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.3);
    }

    .scroll-cue-arrow {
      width: 1px;
      height: 2rem;
      background: linear-gradient(to bottom, rgba(201, 169, 110, 0.5), transparent);
      animation: scroll-pulse 2.2s ease-in-out infinite;
    }

    @keyframes scroll-pulse {
      0%, 100% { opacity: 0.2; transform: scaleY(0.6); }
      50% { opacity: 0.7; transform: scaleY(1); }
    }

    /* =============================================
       MOBILE (< 750px)
       ============================================= */
    @media (max-width: 750px) {
      .sticky-stage {
        top: 0.75rem;
        width: calc(100vw - 1.5rem);
        height: calc(100vh - 1.5rem);
        margin-left: 0.75rem;
        border-radius: 4px;
      }

      .left-col {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        padding-right: 0;
        background: transparent;
        pointer-events: none;
      }

      .left-inner {
        width: 100% !important;
        height: 100%;
        background: transparent;
      }

      .elegant-blurb {
        top: 1.6rem;
        left: 1.4rem;
        right: 1.4rem;
        max-width: none;
      }

      .elegant-blurb p {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
      }

      .hero-word {
        transform: none !important;
        position: relative;
        display: block;
        bottom: auto;
        left: auto !important;
      }

      .hero-text-wrap {
        position: absolute;
        inset: auto 0 0 0;
        top: auto;
        padding: 1.4rem;
      }

      .hero-text-inner {
        transform: none !important;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-end;
        height: auto;
      }

      .hero-w1,
      .hero-w2 {
        font-size: 16vw;
        line-height: 0.92;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }

      .bg-image::after {
        background: rgba(0, 0, 0, 0.35);
      }

      .scroll-cue {
        bottom: 1.2rem;
      }
    }

  </style>
</head>
<body>

  <interact-element data-interact-key="scroll-driver" class="scroll-driver">
    <div class="sticky-stage">

      <div class="right-col">
        <interact-element data-interact-key="bg-image" class="bg-image-el">
          <div class="bg-image"></div>
        </interact-element>
      </div>

      <interact-element data-interact-key="left-col" class="left-col">
        <div class="left-inner">
          <div class="elegant-blurb">
            <p>Every wall holds a quiet conversation between shadow and intention. Spaces designed not to be filled, but to breathe, to let the light in and shape the silence around us.</p>
          </div>
          <interact-element data-interact-key="hero-text" class="hero-text-wrap">
            <div class="hero-text-inner">
              <span class="hero-word hero-w1">Built</span>
              <span class="hero-word hero-w2">Space</span>
            </div>
          </interact-element>
        </div>
      </interact-element>

      <div class="scroll-cue">
        <span class="scroll-cue-label">Explore</span>
        <div class="scroll-cue-arrow"></div>
      </div>

    </div>
  </interact-element>


  <script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact/web';

    const config = {
      interactions: [
        {
          key: 'scroll-driver',
          trigger: 'viewProgress',
          effects: [
            {
              key: 'left-col',
              selector: '.left-inner',
              keyframeEffect: {
                name: 'squeeze-left',
                keyframes: [
                  { width: '22vw' },
                  { width: '9vw' }
                ]
              },
              rangeStart: { name: 'entry', offset: { value: 100, unit: 'percentage' } },
              rangeEnd:   { name: 'exit',  offset: { value: 0,   unit: 'percentage' } },
              fill: 'both',
              easing: 'ease-in-out'
            },
            {
              key: 'hero-text',
              selector: '.hero-text-inner',
              keyframeEffect: {
                name: 'scale-text',
                keyframes: [
                  { transform: 'scale(1)' },
                  { transform: 'scale(0.41)' }
                ]
              },
              rangeStart: { name: 'entry', offset: { value: 100, unit: 'percentage' } },
              rangeEnd:   { name: 'exit',  offset: { value: 0,   unit: 'percentage' } },
              fill: 'both',
              easing: 'ease-in-out'
            },
            {
              key: 'bg-image',
              selector: '.bg-image',
              keyframeEffect: {
                name: 'zoom-image',
                keyframes: [
                  { transform: 'scale(1)' },
                  { transform: 'scale(1.4)' }
                ]
              },
              rangeStart: { name: 'entry', offset: { value: 100, unit: 'percentage' } },
              rangeEnd:   { name: 'exit',  offset: { value: 0,   unit: 'percentage' } },
              fill: 'both',
              easing: 'ease-in-out'
            }
          ]
        }
      ]
    };

    Interact.create(config);
  </script>

</body>
</html>
