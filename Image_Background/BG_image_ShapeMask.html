<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Green Horizons (Scroll v2)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Lora:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Tall scroll container — 3x viewport ── */
    .scroll-section {
      height: 225vh;
      position: relative;
    }

    /* ── Sticky viewport (100vh) ── */
    .sticky-container {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: clip;
      display: flex;
      align-items: center;
    }

    /* ── Background layers ── */
    .bg-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }

    .bg-image {
      z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=80');
    }

    .bg-black {
      z-index: 1;
      background: #0a0a0a;
      clip-path: circle(0% at 50% 50%);
    }

    /* ── Dark overlay for text legibility ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 5;
    }

    /* ── Content ── */
    .content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: 2.5rem 3rem;
      padding-left: 8vw;
    }

    @media (min-width: 768px) {
      .content { padding-left: 5vw; }
    }

    /* ── Top label + full-width divider ── */
    .label {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: -8vw;
      margin-right: -3rem;
      padding-left: 8vw;
      padding-right: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
    }

    @media (min-width: 768px) {
      .label {
        margin-left: -5vw;
        margin-right: -3rem;
        padding-left: 5vw;
        padding-right: 3rem;
      }
    }
    .label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
    }

    /* ── Paragraph — vertically centered ── */
    .text-wrap {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .about-text {
      font-size: clamp(2.07rem, 4vw, 2.62rem);
      font-weight: 300;
      line-height: 1.14;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.85);
      max-width: 1200px;
    }

    /* ── Highlighted words — static Lora italic ── */
    .highlight {
      display: inline;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #fff;
    }

    /* ── Footer line ── */
    .org-name {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      padding-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <interact-element data-interact-key="scroll-section">
    <section class="scroll-section" role="region" aria-labelledby="about-heading">
      <div class="sticky-container">

        <!-- Background image with zoom out -->
        <interact-element data-interact-key="bg-image" aria-hidden="true">
          <div class="bg-layer bg-image"></div>
        </interact-element>

        <!-- Black layer that circle-reveals over the image -->
        <interact-element data-interact-key="bg-black" aria-hidden="true">
          <div class="bg-layer bg-black"></div>
        </interact-element>

        <div class="overlay" aria-hidden="true"></div>

        <!-- Text content -->
        <div class="content">
          <h2 id="about-heading" class="label">About Us</h2>
          <div class="text-wrap">
            <p class="about-text">
              We build resilient communities<br>
              through <span class="highlight">education</span>, environmental<br>
              <span class="highlight">conservation</span>, and sustainable<br>
              <span class="highlight">agriculture</span> — working alongside<br>
              local leaders across 34 countries.
            </p>
          </div>
          <p class="org-name">Green Horizons Foundation</p>
        </div>

      </div>
    </section>
  </interact-element>

  <script type="module">
    let Interact;
    try {
      const mod = await import('https://esm.sh/@wix/interact@2.0.0-rc.4/web');
      Interact = mod.Interact;
    } catch (e) {
      console.warn('Wix Interact failed to load:', e);
    }

    if (Interact) {
      Interact.create({
        conditions: {
          motionAllowed: { type: 'media', predicate: '(prefers-reduced-motion: no-preference)' },
        },
        interactions: [

          {
            key: 'scroll-section',
            trigger: 'viewProgress',
            conditions: ['motionAllowed'],
            effects: [
              /* ── Image: continuous zoom out ── */
              {
                key: 'bg-image',
                fill: 'both',
                easing: 'linear',
                transitionDuration: 1500,
                transitionEasing: 'ease-out',
                keyframeEffect: {
                  name: 'zoom-out-image',
                  keyframes: [
                    { transform: 'scale(1.8)',  offset: 0 },
                    { transform: 'scale(1.0)',  offset: 1 },
                  ],
                },
                rangeStart: { name: 'entry', offset: { value: 0, unit: 'percentage' } },
                rangeEnd:   { name: 'exit',  offset: { value: 0, unit: 'percentage' } },
              },

              /* ── Black: circle reveal over the image ── */
              {
                key: 'bg-black',
                fill: 'both',
                easing: 'cubic-bezier(0.37, 0, 0.63, 1)',
                transitionDuration: 1500,
                transitionEasing: 'ease-out',
                keyframeEffect: {
                  name: 'reveal-black',
                  keyframes: [
                    { clipPath: 'circle(0% at 50% 50%)',   offset: 0 },
                    { clipPath: 'circle(0% at 50% 50%)',   offset: 0.25 },
                    { clipPath: 'circle(150% at 50% 50%)', offset: 0.75 },
                    { clipPath: 'circle(150% at 50% 50%)', offset: 1 },
                  ],
                },
                rangeStart: { name: 'entry', offset: { value: 0, unit: 'percentage' } },
                rangeEnd:   { name: 'exit',  offset: { value: 0, unit: 'percentage' } },
              },
            ],
          },

        ],
      });
    }
  </script>

</body>
</html>
