<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripple Text Animation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

    body {
      background-color: #0f0f11;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    .ripple-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      padding: 50px 0;
      
      /* RESPONSIVE FONT SIZING */
      font-size: clamp(3rem, 13vw, 8rem);
    }

    .h1-base {
      font-size: 1em;
      line-height: 0.75;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin: 0;
      padding: 0;
      color: white;
      cursor: default;
      display: block;
      transform: translateY(-0.02em); 
    }

    /* STATIC MASKS */
    .static-mask {
      position: relative;
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center; 
    }

    /* ALIGNMENT OVERRIDES */
    .mask-top { align-items: flex-start; }
    .mask-bottom { align-items: flex-end; }

    .mask-full {
      height: 0.75em; 
      overflow: visible; 
      align-items: center;
      z-index: 10;
    }

    .h1-copy {
      font-size: 1em; 
      line-height: 0.75;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: block;
      will-change: transform;
      /* Default initial state (can be overridden by styles) */
      transform: translateY(105%); 
    }

    /* VARIABLE HEIGHTS */
    .mask-tiny  { height: 0.06em; } 
    .mask-small { height: 0.175em; }
    .mask-med   { height: 0.3125em; }
    .mask-large { height: 0.45em; }

    .content-block {
      max-width: 600px;
      margin-top: 3rem;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center">

  <div class="relative text-center w-full">
    
    <div class="ripple-container">
      
      <!-- U4 -->
      <div class="static-mask mask-tiny mask-top">
        <interact-element data-interact-key="h1-u4">
          <div class="h1-copy" style="transform: translateY(105%)">LIQUIDITY</div>
        </interact-element>
      </div>

      <!-- U3 -->
      <div class="static-mask mask-small mask-top">
        <interact-element data-interact-key="h1-u3">
          <div class="h1-copy" style="transform: translateY(105%)">LIQUIDITY</div>
        </interact-element>
      </div>

      <!-- U2 -->
      <div class="static-mask mask-med mask-top">
        <interact-element data-interact-key="h1-u2">
          <div class="h1-copy" style="transform: translateY(105%)">LIQUIDITY</div>
        </interact-element>
      </div>
      
      <!-- U1 -->
      <div class="static-mask mask-large mask-top">
        <interact-element data-interact-key="h1-u1">
          <div class="h1-copy" style="transform: translateY(105%)">LIQUIDITY</div>
        </interact-element>
      </div>

      <!-- MAIN -->
      <div class="static-mask mask-full relative">
        <interact-element data-interact-key="h1-trigger">
          <h1 class="h1-base">LIQUIDITY</h1>
        </interact-element>
      </div>

      <!-- D1 -->
      <div class="static-mask mask-large mask-bottom">
        <interact-element data-interact-key="h1-d1">
          <div class="h1-copy" style="transform: translateY(-105%)">LIQUIDITY</div>
        </interact-element>
      </div>

      <!-- D2 -->
      <div class="static-mask mask-med mask-bottom">
        <interact-element data-interact-key="h1-d2">
          <div class="h1-copy" style="transform: translateY(-105%)">LIQUIDITY</div>
        </interact-element>
      </div>

      <!-- D3 -->
      <div class="static-mask mask-small mask-bottom">
        <interact-element data-interact-key="h1-d3">
          <div class="h1-copy" style="transform: translateY(-105%)">LIQUIDITY</div>
        </interact-element>
      </div>

      <!-- D4 -->
      <div class="static-mask mask-tiny mask-bottom">
        <interact-element data-interact-key="h1-d4">
          <div class="h1-copy" style="transform: translateY(-105%)">LIQUIDITY</div>
        </interact-element>
      </div>

    </div>

    <interact-element data-interact-key="hero-text">
      <div class="content-block mx-auto px-6">
        <p class="text-gray-400 text-lg leading-relaxed">
          Hover over the word to reveal the echoes.
        </p>
      </div>
    </interact-element>

  </div>

  <script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact@1.86.0';

    const revealBase = {
      duration: 900,
      easing: 'cubic-bezier(0.05, 1, 0.15, 1)', 
      fill: 'both',
      composite: 'replace'
    };
    
    const revealUpKeyframes = [
      { transform: 'translateY(105%)' }, 
      { transform: 'translateY(-0.02em)' }
    ];

    const revealDownKeyframes = [
      { transform: 'translateY(-105%)' }, 
      { transform: 'translateY(-0.02em)' }
    ];

    // Shared list of effects to avoid duplication
    const rippleEffects = [
      // Upper
      { key: 'h1-u1', effectId: 'reveal-up', delay: 0 },
      { key: 'h1-u2', effectId: 'reveal-up', delay: 54 },
      { key: 'h1-u3', effectId: 'reveal-up', delay: 108 },
      { key: 'h1-u4', effectId: 'reveal-up', delay: 162 }, 
      // Lower
      { key: 'h1-d1', effectId: 'reveal-down', delay: 0 },
      { key: 'h1-d2', effectId: 'reveal-down', delay: 54 },
      { key: 'h1-d3', effectId: 'reveal-down', delay: 108 },
      { key: 'h1-d4', effectId: 'reveal-down', delay: 162 } 
    ];

    const effectsConfig = {
      'reveal-up': {
        keyframeEffect: { name: 'reveal-up', keyframes: revealUpKeyframes },
        ...revealBase
      },
      'reveal-down': {
        keyframeEffect: { name: 'reveal-down', keyframes: revealDownKeyframes },
        ...revealBase
      },
      'fade-up': {
          namedEffect: { type: 'SlideIn', direction: 'bottom', distance: '30px', duration: 1000, easing: 'ease-out' },
          fill: 'both'
      }
    };

    // --- LOGIC: STRICT SEPARATION ---
    // We determine the config mode in JS to prevent any library-level overlap.

    function getInteractions(isMobile) {
      if (isMobile) {
        // MOBILE MODE: Trigger on ViewEnter (Auto play once)
        return [
          {
            key: 'h1-trigger',
            trigger: 'viewEnter',
            params: { type: 'once', threshold: 0.5 },
            effects: rippleEffects
          },
          {
            key: 'hero-text',
            trigger: 'viewEnter',
            effects: [{ effectId: 'fade-up', delay: 400 }]
          }
        ];
      } else {
        // DESKTOP MODE: Trigger on Hover (Interactive)
        return [
          {
            key: 'h1-trigger',
            trigger: 'hover',
            effects: rippleEffects
          },
          {
            key: 'hero-text',
            trigger: 'viewEnter',
            effects: [{ effectId: 'fade-up', delay: 400 }]
          }
        ];
      }
    }

    function initInteract() {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      
      const config = {
        effects: effectsConfig,
        interactions: getInteractions(isMobile)
      };

      Interact.create(config);
    }

    // Initialize on load
    initInteract();

    // Re-initialize if user resizes across the breakpoint
    let wasMobile = window.matchMedia('(max-width: 768px)').matches;
    window.addEventListener('resize', () => {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (isMobile !== wasMobile) {
        wasMobile = isMobile;
        initInteract();
      }
    });

  </script>
</body>
</html>
