<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mouse Tracking with Wix Interact</title>
    
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f11;
            color: #ffffff;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
        }

        .perspective-scene {
            perspective: 1200px;
        }

        /* * Container for the Interact Element 
         * This applies the visual styles (border, glass effect).
         * It is separate from the interact-element to allow cleaner transform stacking.
         */
        .track-card {
            background: transparent;
            border: none;
            will-change: transform; 
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- MOBILE TRACK WRAPPER -->
    <interact-element data-interact-key="mobile-track" class="block w-full">
        <div class="relative min-h-[400vh] md:min-h-0 md:h-screen md:flex md:items-center md:justify-center p-8">
            
            <!-- STICKY CONTAINER -->
            <!-- FIX: Changed overflow-hidden to overflow-clip to prevent ViewTimeline freezing -->
            <div class="sticky top-0 h-screen md:h-auto md:static flex items-center justify-center w-full overflow-clip md:overflow-visible">
                
                <!-- Main Grid Section -->
                <div class="perspective-scene max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-16 items-center">

                    <!-- Column 1: H1 Container (Standard) -->
                    <interact-element data-interact-key="header-zone" class="block h-full">
                        <div class="track-card h-full p-4 md:p-12 flex items-center justify-center cursor-crosshair">
                            <h1 class="text-6xl md:text-8xl italic leading-tight text-center">
                                Motion <br>
                                <span class="text-neutral-500 not-italic">Depth</span>
                            </h1>
                        </div>
                    </interact-element>

                    <!-- Column 2: Paragraph Container (Mirrored) -->
                    <div class="block h-full md:scale-x-[-1]">
                        <interact-element data-interact-key="text-zone" class="block h-full">
                            <div class="track-card h-full p-4 md:p-12 flex items-center justify-center cursor-crosshair">
                                <div class="text-center md:scale-x-[-1]">
                                    <p class="text-lg md:text-xl text-neutral-300 leading-relaxed max-w-md">
                                        Interact allows for complex event orchestration without manual observers. 
                                        This card reacts to the pointer's position relative to its own center, 
                                        creating a unique localized 3D perspective for each element.
                                    </p>
                                </div>
                            </div>
                        </interact-element>
                    </div>

                </div>
            </div>
        </div>
    </interact-element>

    <!-- Wix Interact Setup -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.86.0';

        const config = {
            conditions: {
                mobile: { type: 'media', predicate: '(max-width: 767px)' },
                desktop: { type: 'media', predicate: '(min-width: 768px)' }
            },
            interactions: [
                // --- DESKTOP INTERACTIONS ---
                {
                    key: 'header-zone', 
                    trigger: 'pointerMove',
                    params: { hitArea: 'root' },
                    effects: [
                        {
                            namedEffect: { type: 'Tilt3DMouse', power: 'medium' },
                            fill: 'both', 
                            composite: 'add',
                            conditions: ['desktop']
                        }
                    ]
                },
                {
                    key: 'text-zone',
                    trigger: 'pointerMove',
                    params: { hitArea: 'root' },
                    effects: [
                        {
                            namedEffect: { type: 'Tilt3DMouse', power: 'medium' },
                            fill: 'both',
                            composite: 'add',
                            conditions: ['desktop']
                        }
                    ]
                },

                // --- MOBILE INTERACTIONS ---
                {
                    key: 'mobile-track',
                    trigger: 'viewProgress', 
                    effects: [
                        {
                            // Header: Horizontal Turn (Y-axis) + Slight Vertical Tilt (X-axis)
                            key: 'header-zone',
                            keyframeEffect: {
                                name: 'horizontal-tilt-header',
                                keyframes: [
                                    { transform: 'perspective(1000px) rotateY(-85deg) rotateX(20deg)' }, // Start: Turned sideways + slight tilt
                                    { transform: 'perspective(1000px) rotateY(0deg) rotateX(0deg)' }    // End: Flat facing forward
                                ]
                            },
                            rangeStart: { name: 'cover', offset: { value: 0, type: 'percentage' } },
                            rangeEnd: { name: 'cover', offset: { value: 100, type: 'percentage' } },
                            fill: 'both',
                            composite: 'add',
                            conditions: ['mobile']
                        },
                        {
                            // Paragraph: Horizontal Turn (Y-axis) + Slight Vertical Tilt (X-axis) - Opposite direction
                            key: 'text-zone',
                            keyframeEffect: {
                                name: 'horizontal-tilt-paragraph',
                                keyframes: [
                                    { transform: 'perspective(1000px) rotateY(85deg) rotateX(-20deg)' }, // Start: Turned sideways (opposite) + opposite tilt
                                    { transform: 'perspective(1000px) rotateY(0deg) rotateX(0deg)' }   // End: Flat facing forward
                                ]
                            },
                            rangeStart: { name: 'cover', offset: { value: 0, type: 'percentage' } },
                            rangeEnd: { name: 'cover', offset: { value: 100, type: 'percentage' } },
                            fill: 'both',
                            composite: 'add',
                            conditions: ['mobile']
                        }
                    ]
                }
            ]
        };

        Interact.create(config);
    </script>

</body>
</html>
