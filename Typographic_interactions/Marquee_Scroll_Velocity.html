<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Marquee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #1a1a1a; 
            color: #eee;
            /* Height for scrolling */
            min-height: 400vh;
            margin: 0;
            overflow-x: hidden;
        }

        .spacer {
            height: 150vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Marquee Container */
        .marquee-wrapper {
            overflow: clip; 
            width: 100%;
            padding: 4rem 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
        }

        /* Keep this fix: 
           Ensure the wrapper is exactly as wide as the text content 
           so the loop math (translateX -50%) works perfectly.
        */
        [data-interact-key^="row-"] {
            width: max-content;
        }

        .marquee-line {
            display: flex;
            width: fit-content;
            will-change: transform; 
        }

        .marquee-item {
            font-size: 8vw;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            padding-right: 2vw;
            text-transform: uppercase;
            transform-style: preserve-3d;
            user-select: text; 
            cursor: text;
        }

        .row-1 .marquee-item {
            color: transparent;
            -webkit-text-stroke: 2px #fff;
        }
        
        .row-2 .marquee-item {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="spacer"></div>

    <interact-element data-interact-key="main-container">
        <section class="marquee-wrapper" aria-label="Animated Text Showcase">
            
            <!-- Row 1: Moves Left -->
            <interact-element data-interact-key="row-left">
                <div class="marquee-line row-1">
                    <div class="marquee-item">Creative Animation • Velocity Scroll • Interact Lib •</div>
                    <div class="marquee-item" aria-hidden="true">Creative Animation • Velocity Scroll • Interact Lib •</div>
                </div>
            </interact-element>

            <!-- Row 2: Moves Right -->
            <interact-element data-interact-key="row-right">
                <div class="marquee-line row-2">
                    <div class="marquee-item">Seamless Motion • Infinite Loop • Web Design •</div>
                    <div class="marquee-item" aria-hidden="true">Seamless Motion • Infinite Loop • Web Design •</div>
                </div>
            </interact-element>

        </section>
    </interact-element>

    <div class="spacer"></div>

    <!-- Import Wix Interact -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.86.0';

        // ------------------------------------------------------------------
        // Helper: Physics-Based Velocity Controller
        // ------------------------------------------------------------------
        let currentSpeed = 1;
        let lastScrollY = window.scrollY;
        let baseSpeed = 1; 

        // This loop runs every frame to calculate momentum
        const physicsLoop = () => {
            const currentScrollY = window.scrollY;
            const delta = currentScrollY - lastScrollY;
            lastScrollY = currentScrollY;

            // Update Base Direction
            if (delta > 0.5) {
                baseSpeed = 1;
            } else if (delta < -0.5) {
                baseSpeed = -1;
            }

            // Determine Target Speed
            const sensitivity = 0.4; 
            let targetSpeed = baseSpeed + (delta * sensitivity);

            // Clamp the target speed
            targetSpeed = Math.max(Math.min(targetSpeed, 15), -15);

            // Liquid Interpolation
            const lerpFactor = 0.1; 
            currentSpeed += (targetSpeed - currentSpeed) * lerpFactor;

            // Optimization
            if (Math.abs(delta) < 0.1 && Math.abs(currentSpeed - baseSpeed) < 0.01) {
                currentSpeed = baseSpeed;
            }

            applySpeed(currentSpeed);
            requestAnimationFrame(physicsLoop);
        };

        const applySpeed = (speed) => {
            // FIXED: Reverted to targeting the inner DIVs where the animation lives
            const rows = [
                document.querySelector('[data-interact-key="row-left"] > div'),
                document.querySelector('[data-interact-key="row-right"] > div')
            ];

            rows.forEach(row => {
                if(!row) return;
                const animations = row.getAnimations();
                
                // FIXED: Use a dataset attribute on the element itself to track initialization.
                // This ensures EACH row gets initialized, not just the first one.
                if (!row.dataset.hasInitialized && animations.length > 0) {
                     animations.forEach(anim => {
                        // Jump forward so we can reverse immediately
                        anim.currentTime = 20000000; 
                     });
                     row.dataset.hasInitialized = "true";
                }

                animations.forEach(anim => {
                    anim.updatePlaybackRate(speed);
                });
            });
        };

        // Start the physics loop immediately
        physicsLoop();

        // ------------------------------------------------------------------
        // Configuration
        // ------------------------------------------------------------------
        const config = {
            effects: {
                'marquee-left-fx': {
                    duration: 40000, 
                    iterations: 1e6, 
                    easing: 'linear',
                    fill: 'both',
                    keyframeEffect: {
                        name: 'slide-left',
                        keyframes: [
                            { transform: 'translateX(0%)' },
                            { transform: 'translateX(-50%)' }
                        ]
                    }
                },
                'marquee-right-fx': {
                    duration: 40000,
                    iterations: 1e6,
                    easing: 'linear',
                    fill: 'both',
                    keyframeEffect: {
                        name: 'slide-right',
                        keyframes: [
                            { transform: 'translateX(-50%)' },
                            { transform: 'translateX(0%)' }
                        ]
                    }
                }
            },

            interactions: [
                {
                    key: 'row-left',
                    trigger: 'pageVisible',
                    effects: [{ effectId: 'marquee-left-fx' }]
                },
                {
                    key: 'row-right',
                    trigger: 'pageVisible',
                    effects: [{ effectId: 'marquee-right-fx' }]
                }
            ]
        };

        Interact.create(config);
    </script>
</body>
</html>
