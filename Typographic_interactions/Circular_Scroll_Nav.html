<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Navigation Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Reset & Fonts */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            background-color: #ffffff; 
        }

        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- LANDING PAGE --- */
        #main-content {
            min-height: 100vh;
            background-color: #ffffff;
            color: #000;
            padding: 2rem;
            transition: filter 0.3s ease;
        }

        /* --- MENU BUTTON WRAPPER --- */
        /* Holds both the visual button and the invisible trigger */
        .menu-wrapper {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            /* Reduced by 30% (was 40px) */
            width: 28px;
            height: 28px;
        }

        /* The Visual Button (Morphs to X) */
        .menu-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* Reduced gap by 30% (was 6px) */
            gap: 4px;
            padding: 0;
        }
        
        .menu-btn span {
            display: block;
            width: 100%;
            /* Reduced height (was 3px) */
            height: 2px;
            background-color: #000000; 
            transition: transform 0.3s, opacity 0.3s, background-color 0.3s;
        }

        /* Menu Open State (X Icon) */
        body.menu-open .menu-btn span {
            background-color: #ffffff; 
        }
        body.menu-open .menu-btn span:nth-child(1) {
            /* Adjusted translation for smaller size (was 9px) */
            transform: translateY(6px) rotate(45deg);
        }
        body.menu-open .menu-btn span:nth-child(2) {
            opacity: 0;
        }
        body.menu-open .menu-btn span:nth-child(3) {
            /* Adjusted translation for smaller size (was -9px) */
            transform: translateY(-6px) rotate(-45deg);
        }

        /* --- INVISIBLE TRIGGER OVERLAY --- */
        /* Sits on top of the button ONLY when menu is closed */
        .trigger-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 20; /* Higher than button */
            background: transparent;
        }

        /* Hide the trigger when menu is open, allowing clicks to hit the underlying Close button */
        body.menu-open .trigger-overlay {
            display: none; 
        }

        /* --- LIGHTBOX OVERLAY --- */
        #nav-overlay {
            position: fixed;
            inset: 0;
            background-color: #0f0f11;
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0s 0.5s; 
            overflow-y: auto; 
            overflow-x: hidden;
        }

        body.menu-open #nav-overlay {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0s 0s; 
        }

        /* --- SCROLL ELEMENTS --- */
        #scroll-track {
            height: 600vh;
            width: 100%;
            position: relative;
        }

        #sticky-stage {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: clip; 
            pointer-events: none; 
        }

        .headline {
            position: absolute;
            left: 5vw;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2vh; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a4a4a; 
            z-index: 10;
            display: flex;
            flex-direction: row;
            gap: 0.4em; 
        }

        @media (max-width: 768px) {
            .headline {
                flex-direction: column; 
                gap: 0.2em;
                font-size: 1.6vh; 
                left: 6vw; 
            }
        }

        #wheel-mount {
            position: absolute;
            top: 50%;
            left: calc(50vw - 92vh); 
            width: 0;
            height: 0;
        }

        #wheel {
            position: absolute;
            top: -92vh; 
            left: -92vh; 
            width: 184vh;
            height: 184vh;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
            pointer-events: auto; 
        }

        @media (max-width: 768px) {
            #wheel-mount {
                left: calc(-20vw - 58.88vh);
            }
            #wheel {
                top: -58.88vh; 
                left: -58.88vh; 
                width: 117.76vh; 
                height: 117.76vh;
            }
        }

        .wheel-item-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 650px; 
            height: 60px;
            margin-top: -30px;
            transform-origin: left center;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .wheel-item-link {
            display: block;
            font-size: calc(3vh + 3px); 
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            cursor: pointer;
            pointer-events: auto;
            padding: 0.5rem 1rem;
            white-space: nowrap;
            text-decoration: none;
            will-change: transform, opacity;
            outline: none;
        }

        @media (max-width: 768px) {
            .wheel-item-link {
                font-size: calc((3vh + 3px) * 0.85);
            }
        }
        
        .wheel-item-link:focus-visible {
            outline: 2px solid #4ade80;
            border-radius: 4px;
        }

    </style>
</head>
<body>

    <!-- MENU TOGGLE WRAPPER -->
    <div class="menu-wrapper">
        <!-- 1. VISUAL BUTTON (Handles Close Click) -->
        <button id="visual-btn" class="menu-btn" aria-label="Toggle Menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- 2. INVISIBLE OVERLAY (Handles Open Click & Animation) -->
        <!-- Only visible when menu is CLOSED -->
        <interact-element data-interact-key="menu-open-trigger">
            <div id="open-trigger" class="trigger-overlay"></div>
        </interact-element>
    </div>

    <!-- MAIN PAGE -->
    <main id="main-content">
        <div class="max-w-4xl mx-auto mt-32">
            <h1 class="text-6xl font-bold mb-6 tracking-tighter">The Agency.</h1>
            <p class="text-xl text-gray-500 max-w-lg leading-relaxed">
                We craft digital experiences that redefine brands. <br>
                Click the menu in the top left to explore our services.
            </p>
        </div>
    </main>

    <!-- NAVIGATION LIGHTBOX -->
    <nav id="nav-overlay" role="dialog" aria-modal="true" aria-label="Main Navigation">
        <interact-element data-interact-key="scroll-source">
            <div id="scroll-track">
                <div id="sticky-stage">
                    <div class="headline">
                        <span>services</span>
                        <span>we provide</span>
                    </div>

                    <div id="wheel-mount">
                        <interact-element data-interact-key="wheel">
                            <div id="wheel" role="list">
                                <!-- JS Injects Items Here -->
                            </div>
                        </interact-element>
                    </div>
                </div>
            </div>
        </interact-element>
    </nav>

    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.86.0';

        // --- MENU TOGGLE LOGIC ---
        const visualBtn = document.getElementById('visual-btn');
        const openTrigger = document.getElementById('open-trigger');
        const body = document.body;

        function toggleMenu(isOpen) {
            if (isOpen) {
                body.classList.add('menu-open');
                body.style.overflow = 'hidden';
                visualBtn.setAttribute('aria-expanded', 'true');
            } else {
                body.classList.remove('menu-open');
                body.style.overflow = '';
                visualBtn.setAttribute('aria-expanded', 'false');
            }
        }

        // 1. OPEN: Click on Overlay -> Animation runs (via Interact) -> Menu Opens -> Overlay Hides
        openTrigger.addEventListener('click', () => toggleMenu(true));

        // 2. CLOSE: Click on Visual Button -> No Interact Animation -> Menu Closes -> Overlay Returns
        visualBtn.addEventListener('click', () => toggleMenu(false));

        // --- INTERACT CONFIG ---

        const items = [
            "Creative Direction", "Art Direction", "Brand Strategy", "Visual Identity", 
            "Web Design", "UI/UX Design", "Motion Graphics", "3D Modeling", 
            "Typography", "Editorial Design", "Packaging", "Photography",
            "Copywriting", "Content Strategy", "Social Media", "Digital Marketing",
            "Software Engineering", "Frontend Dev", "Backend Dev", "Full Stack",
            "Mobile Development", "AR/VR Experiences", "Game Design", "Sound Design",
            "Project Management", "Product Owner", "Scrum Master", "Agile Coach",
            "Data Analytics", "User Research", "SEO Optimization", "Accessibility"
        ];

        const wheel = document.getElementById('wheel');
        const isMobile = window.matchMedia("(max-width: 768px)").matches;
        const radius = isMobile ? 58.88 : 92;
        const angleStep = 8; 
        const middleIndex = Math.floor(items.length / 2); 
        const startAngle = -(middleIndex * angleStep);

        const itemInteractions = [];
        const entranceEffects = [];

        items.forEach((text, index) => {
            const angle = startAngle + (index * angleStep);
            const num = (index + 1).toString().padStart(2, '0');
            const label = `${num}. ${text}`;

            const wrapper = document.createElement('div');
            wrapper.className = 'wheel-item-wrapper';
            wrapper.style.transform = `rotate(${angle}deg) translateX(${radius}vh)`;
            wrapper.setAttribute('role', 'listitem');

            const key = `item-${index}`;
            
            wrapper.innerHTML = `
                <interact-element data-interact-key="${key}">
                    <a href="#" class="wheel-item-link" tabindex="0">${label}</a>
                </interact-element>
            `;
            
            wheel.appendChild(wrapper);

            // 1. ENTRANCE EFFECTS
            entranceEffects.push({
                key: key, 
                keyframeEffect: {
                    name: `enter-${index}`,
                    keyframes: [
                        { opacity: 0, transform: 'translateX(-150px)' },
                        { opacity: 1, transform: 'translateX(0px)' }
                    ]
                },
                duration: 600,
                // REDUCED DELAY BY 50%:
                // Base delay: 300 -> 150
                // Stagger: 30 -> 15
                delay: 150 + (index * 15), 
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)', 
                fill: 'backwards', 
                composite: 'add'
            });

            // 2. HOVER INTERACTION
            itemInteractions.push({
                key: key,
                trigger: 'hover',
                effects: [
                    {
                        transition: {
                            duration: 150,
                            easing: 'cubic-bezier(0.1, 0.9, 0.2, 1)',
                            styleProperties: [
                                { name: 'transform', value: 'translateX(40px)' }, 
                            ]
                        },
                        composite: 'add'
                    }
                ]
            });
        });

        // Scroll Math
        const startKeyframeRot = 178; 
        const endKeyframeRot = -120; 

        const navOverlay = document.getElementById('nav-overlay');
        setTimeout(() => {
             navOverlay.scrollTop = navOverlay.scrollHeight / 2 - window.innerHeight / 2;
        }, 100);

        const config = {
            interactions: [
                {
                    // FIX: Key is now the INVISIBLE OVERLAY
                    // This element is hidden when the menu is open, so it can't be clicked to close.
                    key: 'menu-open-trigger',
                    trigger: 'click',
                    params: { type: 'repeat' }, 
                    effects: entranceEffects 
                },
                {
                    key: 'scroll-source', 
                    trigger: 'viewProgress', 
                    effects: [
                        {
                            key: 'wheel', 
                            fill: 'both', 
                            rangeStart: { name: 'entry', offset: { value: 0, type: 'percentage' } },
                            rangeEnd: { name: 'exit', offset: { value: 0, type: 'percentage' } },
                            keyframeEffect: {
                                name: 'wheel-spin',
                                keyframes: [
                                    { transform: `rotate(${startKeyframeRot}deg)` },
                                    { transform: `rotate(${endKeyframeRot}deg)` } 
                                ]
                            },
                            composite: 'add'
                        }
                    ]
                },
                ...itemInteractions
            ]
        };

        Interact.create(config);

    </script>
</body>
</html>
