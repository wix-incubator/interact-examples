<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Reveal (Image Version) with @wix/interact</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pw: 100;
            --ph: 100;
            --panel-radius: 0px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
        }

        #container-2, #container-3, #container-4, #container-5, #container-6 {
            clip-path: circle(0% at center);
        }

        #container-1 { z-index: 1; }
        #container-2 { z-index: 2; }
        #container-3 { z-index: 3; }
        #container-4 { z-index: 4; }
        #container-5 { z-index: 5; }
        #container-6 { z-index: 6; }

        .trigger-area {
            position: absolute;
            left: 0;
            width: 100%;
            opacity: 0;
            pointer-events: none;
        }

        .animation-section {
            position: relative;
            width: 100%;
            height: 800vh;
        }

        .content-panel {
            position: sticky;
            top: calc((100 - var(--ph)) * 0.5vh);
            width: calc(var(--pw) * 1vw);
            height: calc(var(--ph) * 1vh);
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            border-radius: var(--panel-radius);
        }

        .content-panel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            z-index: 1;
            pointer-events: none;
        }

        .content-panel > div {
            transform: scale(calc(min(var(--pw), var(--ph)) / 100));
            transform-origin: center bottom;
            background: none !important;
        }
    </style>
</head>
<body>

    <!-- Instructions for the user -->
    <div class="fixed top-5 left-5 bg-black bg-opacity-50 p-3 rounded-lg z-50 text-sm">
        <p>Scroll down to experience the animation.</p>
    </div>

    <!-- The main section containing the animation -->
    <main class="animation-section">
        
        <!-- Invisible trigger elements for @wix/interact -->
        <wix-interact-element data-wix-path="#trigger-2">
            <div id="trigger-2" class="trigger-area" style="top: 25%; height: 6.25%;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-3">
             <div id="trigger-3" class="trigger-area" style="top: 37.5%; height: 6.25%;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-4">
             <div id="trigger-4" class="trigger-area" style="top: 50%; height: 6.25%;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-5">
            <div id="trigger-5" class="trigger-area" style="top: 62.5%; height: 6.25%;"></div>
        </wix-interact-element>
        <wix-interact-element data-wix-path="#trigger-6">
            <div id="trigger-6" class="trigger-area" style="top: 75%; height: 6.25%;"></div>
        </wix-interact-element>

        <!-- The six content containers, wrapped for @wix/interact -->
        <wix-interact-element data-wix-path="#container-1">
            <!-- MODIFIED: Removed gradient classes, added background-image style -->
            <div id="container-1" class="content-panel" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop');">
                <!-- MODIFIED: Added gradient overlay and padding to this wrapper -->
                <div class="text-center w-full pt-32 pb-20 bg-gradient-to-t from-black/70 to-transparent z-10">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-white">Container 1</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-200">This is the starting point.</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-2">
            <!-- MODIFIED: Removed gradient classes, added background-image style -->
            <div id="container-2" class="content-panel" style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2070&auto=format&fit=crop');">
                 <!-- MODIFIED: Added gradient overlay and padding to this wrapper -->
                 <div class="text-center w-full pt-32 pb-20 bg-gradient-to-t from-black/70 to-transparent z-10">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-white">Container 2</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-200">Revealed by scrolling.</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-3">
            <!-- MODIFIED: Removed gradient classes, added background-image style -->
            <div id="container-3" class="content-panel" style="background-image: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=2070&auto=format&fit=crop');">
                 <!-- MODIFIED: Added gradient overlay and padding to this wrapper -->
                 <div class="text-center w-full pt-32 pb-20 bg-gradient-to-t from-black/70 to-transparent z-10">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-white">Container 3</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-200">And another one.</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-4">
            <!-- MODIFIED: Removed gradient classes, added background-image style -->
            <div id="container-4" class="content-panel" style="background-image: url('https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?q=80&w=2070&auto=format&fit=crop');">
                 <!-- MODIFIED: Added gradient overlay and padding to this wrapper -->
                 <div class="text-center w-full pt-32 pb-20 bg-gradient-to-t from-black/70 to-transparent z-10">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-white">Container 4</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-200">Keep scrolling...</p>
                </div>
            </div>
        </wix-interact-element>

        <wix-interact-element data-wix-path="#container-5">
            <!-- MODIFIED: Removed gradient classes, added background-image style -->
            <div id="container-5" class="content-panel" style="background-image: url('https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=2070&auto=format&fit=crop');">
                 <!-- MODIFIED: Added gradient overlay and padding to this wrapper -->
                 <div class="text-center w-full pt-32 pb-20 bg-gradient-to-t from-black/70 to-transparent z-10">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-white">Container 5</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-200">Almost there.</p>
                </div>
            </div>
        </wix-interact-element>
            
        <wix-interact-element data-wix-path="#container-6">
            <!-- MODIFIED: Removed gradient classes, added background-image style -->
            <div id="container-6" class="content-panel" style="background-image: url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=2073&auto=format&fit=crop');">
                 <!-- MODIFIED: Added gradient overlay and padding to this wrapper -->
                 <div class="text-center w-full pt-32 pb-20 bg-gradient-to-t from-black/70 to-transparent z-10">
                    <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-white">Container 6</h1>
                    <p class="mt-2 text-lg md:text-xl text-gray-200">The final reveal.</p>
                </div>
            </div>
        </wix-interact-element>
    </main>

    <!-- Import and configure @wix/interact -->
    <!-- NO CHANGES WERE MADE TO THIS SCRIPT BLOCK -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        const interactConfig = {
            interactions: [
                // Interaction to reveal Container 2
                {
                    key: '#trigger-2',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-2',
                        keyframeEffect: {
                            name: 'reveal-circle-2',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 3
                {
                    key: '#trigger-3',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-3',
                        keyframeEffect: {
                            name: 'reveal-circle-3',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 4
                {
                    key: '#trigger-4',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-4',
                        keyframeEffect: {
                            name: 'reveal-circle-4',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 5
                {
                    key: '#trigger-5',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-5',
                        keyframeEffect: {
                            name: 'reveal-circle-5',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                },
                // Interaction to reveal Container 6
                {
                    key: '#trigger-6',
                    trigger: 'viewProgress',
                    effects: [{
                        key: '#container-6',
                        keyframeEffect: {
                            name: 'reveal-circle-6',
                            keyframes: [
                                { clipPath: 'circle(0% at center)' },
                                { clipPath: 'circle(80% at center)' }
                            ]
                        },
                        rangeStart: { name: 'cover', offset: { type: 'percentage', value: 0 } },
                        rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 100 } },
                        easing: 'linear',
                        fill: 'both'
                    }]
                }
            ]
        };

        // Initialize @wix/interact with the configuration
        Interact.create(interactConfig);
    </script>
</body>
</html>
