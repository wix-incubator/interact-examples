<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Burst Animation</title>
    <style>
        :root {
            --particle-lifespan: 80;
            --base-particle-width: 180;
            --size-variation: 0.2;
            --particle-spacing: 100;
            --hop-height: 100;
            --hop-width: 40;
            --density: 1;
            --particle-radius: 0;
        }

        /* Basic styling for the page */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hide scrollbars */
            background-color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            cursor: crosshair; /* Change cursor for better visibility */
        }

        /* This wrapper will be our interact trigger */
        #page-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Styling for the info text */
        .info-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-size: 1.5rem;
            text-align: center;
            pointer-events: none; /* Make sure text doesn't interfere with mouse events */
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        /* This is the MASK container for the particle */
        .particle {
            position: absolute;
            /* width: 200px; */ /* REMOVED: Width will be set dynamically */
            /* height: 325px; */ /* REMOVED: Height will be set dynamically */
            will-change: transform;
            pointer-events: none;
            overflow: hidden; /* This is the crucial property that creates the mask effect */
            border-radius: calc(var(--particle-radius, 0) * 1px);
            /* box-shadow alpha is set dynamically in the animation loop to match image reveal */
            /* The transform origin is adjusted to be the bottom center for a more natural pop-up effect */
            transform-origin: bottom center;
        }

        /* This is the actual image element that moves inside the mask */
        .particle-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: calc(var(--particle-radius, 0) * 1px);
            will-change: transform;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 
      This wix-interact-element wraps our entire page.
      We will use it as the trigger for the 'pageVisible' event 
      to kick off our custom animation script.
    -->
    <wix-interact-element data-wix-path="page-container">
        <div id="page-container">
            <div class="info-text" id="infoText">Move your cursor to start the animation.</div>
        </div>
    </wix-interact-element>

    <script type="module">
        // Import the Interact library
        import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

        // Define the configuration for @wix/interact
        const interactConfig = {
            interactions: [
                {
                    key: 'page-container', // The data-wix-path of our wrapper
                    trigger: 'pageVisible', // Trigger once when the element is visible
                    params: {
                        type: 'once'
                    },
                    effects: [
                        {
                            key: 'page-container', // The effect targets the same element
                            
                            // We use a customEffect because this animation is generative
                            // (creates new elements) and runs its own animation loop,
                            // which doesn't fit the standard effect types.
                            customEffect: (element) => {
                                // --- All of the original JavaScript logic is now placed inside this customEffect ---

                                // --- Configuration ---
                                function getCssVarNumber(name, fallback) {
                                    const raw = getComputedStyle(document.documentElement).getPropertyValue(name);
                                    const parsed = parseFloat(raw);
                                    return Number.isFinite(parsed) ? parsed : fallback;
                                }

                                function getParticleLifespan() {
                                    return Math.max(10, getCssVarNumber('--particle-lifespan', 80));
                                }

                                function getBaseParticleWidth() {
                                    return Math.max(20, getCssVarNumber('--base-particle-width', 180));
                                }

                                function getSizeVariation() {
                                    return Math.max(0, getCssVarNumber('--size-variation', 0.2));
                                }

                                function getParticleSpacing() {
                                    const spacing = Math.max(5, getCssVarNumber('--particle-spacing', 100));
                                    const density = Math.max(0.1, getCssVarNumber('--density', 1));
                                    return spacing / density;
                                }

                                function getHopHeight() {
                                    return getCssVarNumber('--hop-height', 100);
                                }

                                function getHopWidth() {
                                    return getCssVarNumber('--hop-width', 40);
                                }

                                const IMAGE_SOURCES = [
                                    'https://static.wixstatic.com/media/9eca39_2fa2f1a0c40e452d8daa09d09459e275~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_ebda7ab78f9c4009af3bba3ed53ff151~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_efb67cf117ae4ddea9f2b0bc134c26d0~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_37834a42d48547658ca5d3ca0046250a~mv2.webp',
                                    'https://static.wixstatic.com/media/9eca39_565eb438708548da92653669027017a8~mv2.webp',
                                    'https://static.wixstatic.com/media/9eca39_5a41dd4ed9284d6dacf0d2ec84697472~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_7395272be5204349a59118f73926f266~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_76de18515def47789ddab891e3ce12fa~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_099bae5648814dce8bb05379af044ecc~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_6b14cf5bce1044db9a807dd3c5cc9028~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_e6d98be6268347e48cff39f5c20fb0f8~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_f4bbbb8da30b4951b24924aad5dbfed2~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_cb4b664a75934f89ac680625002ab076~mv2.jpg',
                                    'https://static.wixstatic.com/media/9eca39_fcb77553ba6842bc80afe7b8cae070a6~mv2.jpg',
                                     'https://static.wixstatic.com/media/9eca39_bc8b7813d7474b8db690847acd574ebc~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_e0af56b91bf64fbc9611afab61b96d96~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_e824a437f7744180929afdd797603004~mv2.webp',
                'https://static.wixstatic.com/media/9eca39_4834077538244734befe8dfdafb2bf52~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_3f6aea6c9b914664b028f84f10b8c3d6~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_f2559369489a42659e862b8d2cbf0789~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_f3130cc17ba8447b8f803d846563f9f6~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_8923188b5c0046709dada3d38f6e3dcf~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_2057483f44894c84a447b85f900f4cde~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_618bfeb93fcf4f5ca7a9f42733b3b61e~mv2.webp',
                'https://static.wixstatic.com/media/9eca39_f2f224dca1fc48e3898fc9256e214502~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_118b28ee9fcf4f83aff362a0f60e1ed8~mv2.jpg'
                                ];

                                // --- Global State ---
                                const particles = [];
                                let currentMousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
                                let lastDrawnMousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
                                let hasMoved = false;
                                const infoText = document.getElementById('infoText');
                                
                                // --- Easing Function ---
                                function easeOutCubic(t) {
                                    return 1 - Math.pow(1 - t, 3);
                                }

                                /**
                                 * Creates a single new particle with a choreographed hop animation.
                                 * @param {number} x The starting horizontal position.
                                 * @param {number} y The starting vertical position.
                                 */
                                function createParticle(x, y) {
                                    const particleLifespan = getParticleLifespan();
                                    const baseParticleWidth = getBaseParticleWidth();
                                    const sizeVariation = getSizeVariation();
                                    const particleContainer = document.createElement('div');
                                    particleContainer.classList.add('particle');
                                    // Note: CSS size is removed, will be set in JS

                                    const particleImage = document.createElement('div');
                                    particleImage.classList.add('particle-image');
                                    
                                    const randomImageSrc = IMAGE_SOURCES[Math.floor(Math.random() * IMAGE_SOURCES.length)];
                                    
                                    // Create an in-memory image to get dimensions
                                    const img = new Image();
                                    
                                    const hopDirection = (Math.random() - 0.5) * 2;
                                    
                                    // Create particle object with default vals, will be updated on load
                                    const particle = {
                                        container: particleContainer,
                                        image: particleImage,
                                        startX: x,
                                        startY: y,
                                        hopWidth: getHopWidth() * hopDirection,
                                        angle: hopDirection * 10,
                                        life: particleLifespan,
                                        initialLife: particleLifespan,
                                        width: baseParticleWidth, // default width
                                        height: baseParticleWidth * 1.625 // default ratio (325/200)
                                    };

                                    img.onload = () => {
                                        // --- New Logic: Calculate size based on aspect ratio and variation ---
                                        const ratio = img.naturalHeight / img.naturalWidth;
                                        const variation = (Math.random() - 0.5) * sizeVariation + 1.0; // 0.8 to 1.2
                                        const finalWidth = baseParticleWidth * variation;
                                        const finalHeight = finalWidth * ratio;

                                        // Set dimensions on the particle object for animation logic
                                        particle.width = finalWidth;
                                        particle.height = finalHeight;

                                        // Set dimensions on the DOM element (the mask)
                                        particleContainer.style.width = finalWidth + 'px';
                                        particleContainer.style.height = finalHeight + 'px';
                                        // --- End New Logic ---

                                        particleImage.style.backgroundImage = `url(${randomImageSrc})`;
                                        particleContainer.appendChild(particleImage);
                                        
                                        // FIX: Append to the 'element' (page-container) which has position: relative
                                        // This aligns the particle's coordinate system with the mouse's coordinate system.
                                        element.appendChild(particleContainer);
                                        
                                        particles.push(particle);
                                    };
                                    
                                    img.onerror = () => {
                                        // Handle error, e.g., skip this particle
                                        console.warn("Could not load image for particle, skipping.");
                                    };

                                    // Start loading the image
                                    img.src = randomImageSrc;
                                }

                                /**
                                 * The main animation loop.
                                 */
                                function animate() {
                                    const particleSpacing = getParticleSpacing();
                                    const hopHeight = getHopHeight();
                                    // --- Particle creation logic ---
                                    const dx = currentMousePos.x - lastDrawnMousePos.x;
                                    const dy = currentMousePos.y - lastDrawnMousePos.y;
                                    const distance = Math.sqrt(dx * dx + dy * dy);

                                    if (distance >= particleSpacing) {
                                        const numParticles = Math.floor(distance / particleSpacing);
                                        const angle = Math.atan2(dy, dx);

                                        for (let i = 1; i <= numParticles; i++) {
                                            const newX = lastDrawnMousePos.x + Math.cos(angle) * particleSpacing * i;
                                            const newY = lastDrawnMousePos.y + Math.sin(angle) * particleSpacing * i;
                                            createParticle(newX, newY);
                                        }
                                        
                                        lastDrawnMousePos = {
                                            x: lastDrawnMousePos.x + Math.cos(angle) * particleSpacing * numParticles,
                                            y: lastDrawnMousePos.y + Math.sin(angle) * particleSpacing * numParticles
                                        };
                                    }

                                    // --- Animate existing particles ---
                                    for (let i = particles.length - 1; i >= 0; i--) {
                                        const p = particles[i];
                                        p.life--;

                                        const lifeProgress = (p.initialLife - p.life) / p.initialLife;
                                        const sinProgress = Math.sin(lifeProgress * Math.PI);
                                        const hopArc = easeOutCubic(sinProgress);

                                        const targetX = p.startX + lifeProgress * p.hopWidth;
                                        const targetY = p.startY - hopArc * hopHeight;
                                        
                                        // --- MODIFIED: Use dynamic particle width/height ---
                                        const translateX = targetX - (p.width / 2);
                                        const translateY = targetY - p.height;
                                        const imageTranslateY = p.height * (1 - hopArc);
                                        // --- END MODIFIED ---

                                        if (p.life <= 0) {
                                            p.container.remove();
                                            particles.splice(i, 1);
                                            continue;
                                        }

                                        p.container.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${p.angle}deg)`;
                                        p.container.style.boxShadow = `0 8px 25px rgba(0,0,0,${(0.15 * hopArc * hopArc).toFixed(3)})`;
                                        p.image.style.transform = `translateY(${imageTranslateY}px)`;
                                    }

                                    // Keep the loop running
                                    requestAnimationFrame(animate);
                                }
                                
                                /**
                                 * Updates the current mouse position.
                                 */
                                function handleMovement(x, y) {
                                    if (!hasMoved) {
                                        hasMoved = true;
                                        if (infoText) {
                                          infoText.style.opacity = '0';
                                        }
                                        // On first move, sync both positions
                                        lastDrawnMousePos = { x, y };
                                    }
                                    currentMousePos = { x, y };
                                }

                                // --- Attach event listeners ---
                                // We attach to the document to capture movement anywhere on the page
                                document.addEventListener('mousemove', (e) => handleMovement(e.clientX, e.clientY));
                                document.addEventListener('touchmove', (e) => {
                                    if (e.touches.length > 0) handleMovement(e.touches[0].clientX, e.touches[0].clientY);
                                });

                                // --- Start the main animation loop ---
                                animate();

                                // No return value is needed; the customEffect just kicks off the loop.
                            }
                        }
                    ]
                }
            ]
        };

        // Initialize the @wix/interact library with our configuration
        Interact.create(interactConfig);

    </script>
</body>
</html>
