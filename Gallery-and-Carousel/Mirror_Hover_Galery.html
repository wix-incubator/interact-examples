<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Nature Gallery with @wix/interact</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module" src="https://esm.sh/@wix/interact@1.79.0"></script>
<style>
:root {
  --stagger-delay: 0;
}
body {
  margin:0;
  padding:40px;
  background:#111;
  font-family:'Inter', sans-serif;
  color:white;
  overflow-x:hidden;
}

/* GRID */
.grid-container {
  display:grid;
  grid-template-columns: repeat(8, 1fr);
  grid-auto-rows:180px;
  gap:40px;
  width:100%;
}

/* CARD BASE */
wix-interact-element {
  display:block;
  position:relative;
  overflow:hidden;
  width:100%;
  height:100%;
  border-radius:5px;
  cursor:pointer;
}

/* inner wrapper */
.card-inner {
  width:100%;
  height:100%;
  position:relative;
  border-radius:5px;
}

/* card background */
.card-bg {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  /* This transition helps the global background effect feel smoother */
  transition: background-image 0.3s ease;
}

/* overlay */
.card-overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.2);
  z-index:1;
  border-radius:5px;
}

/* text */
.card-content {
  position:absolute;
  bottom:12px;
  left:12px;
  right:12px;
  opacity:0;
  transform:translateY(10px);
  z-index:2;
  line-height:1.2;
  text-shadow:0 2px 6px rgba(0,0,0,0.5);
  pointer-events:none;
  /* CSS transitions and hover effects are now fully handled by @wix/interact */
}

.card-content h3 {margin:0 0 3px 0; font-size:1rem;}
.card-content p {margin:0; font-size:0.85rem;}

@media(max-width:1200px){
  .grid-container{grid-template-columns: repeat(4,1fr);}
}
@media(max-width:800px){
  .grid-container{grid-template-columns: repeat(2,1fr);}
}
</style>
</head>
<body>

<section class="grid-container"></section>

<script type="module">
import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

const container = document.querySelector('.grid-container');
const ROWS = 4;
const COLS = 8;
const CARD_COUNT = ROWS*COLS;
const originalImages = [];
const natureSeeds = [
  'forest', 'mountain', 'river', 'wild', 'jungle', 'desert', 'waterfall', 'canyon', 'prairie', 'lake',
  'volcano', 'ice', 'valley', 'rainforest', 'beach', 'cliff', 'glacier', 'savanna', 'woods', 'stream',
  'sunset', 'meadow', 'ocean', 'hills', 'swamp', 'rocks', 'pond', 'flowers', 'trees', 'night',
  'fog', 'autumn', 'spring', 'winter', 'summer', 'mist', 'cave', 'sky', 'riverbank', 'island'
];

// Create cards
for(let i=1;i<=CARD_COUNT;i++){
  const card=document.createElement('wix-interact-element');
  card.dataset.wixPath='card-'+i;
  card.innerHTML = `
    <div class="card-inner" id="card-inner-${i}">
      <div class="card-bg" id="card-bg-${i}"></div>
      <div class="card-overlay" id="card-overlay-${i}"></div>
      <div class="card-content" id="card-content-${i}">
        <h3>Title ${i}</h3>
        <p>Subtitle for card ${i}</p>
      </div>
    </div>
  `;

  const bg=card.querySelector('.card-bg');
  const seedIndex = (i - 1) % natureSeeds.length;
  const seed = natureSeeds[seedIndex];
  const imgUrl=`https://picsum.photos/seed/${seed}/600/400`;
  bg.style.backgroundImage=`url('${imgUrl}')`;
  originalImages.push(imgUrl);

  container.appendChild(card);
}

// --- @wix/interact Configuration ---
const interactions = [];

for (let i = 1; i <= CARD_COUNT; i++) {
  interactions.push({
    key: `card-${i}`,
    trigger: 'hover',
    params: { type: 'alternate' },
    effects: [
      // 1. Card inner content zoom effect
      {
        key: `#card-inner-${i}`,
        keyframeEffect: {
            name: `card-zoom-${i}`,
            keyframes: [{ transform: 'scale(1.05)' }]
        },
        duration: 300,
        easing: 'ease-out',
        fill: 'both'
      },
      // 2. Card overlay darken effect
      {
        key: `#card-overlay-${i}`,
        transition: {
            duration: 300,
            easing: 'ease-out',
            styleProperties: [{ name: 'background', value: 'rgba(0,0,0,0.45)' }]
        },
        fill: 'both'
      },
      // 3. Text content reveal animation (replaces CSS :hover)
      {
        key: `#card-content-${i}`,
        keyframeEffect: {
            name: `text-reveal-${i}`,
            keyframes: [{ opacity: 1, transform: 'translateY(0)' }]
        },
        duration: 300,
        easing: 'ease-out',
        fill: 'both'
      },
      // 4. z-index change to bring card to front
      {
        key: `card-${i}`,
        transition: {
            duration: 0, // z-index is not animatable, so duration is 0
            styleProperties: [{ name: 'z-index', value: '10' }]
        },
        fill: 'both'
      }
    ]
  });
}

Interact.create({ interactions });

// Global background effect with stagger support
const allCards = document.querySelectorAll('wix-interact-element');
const allBgs = document.querySelectorAll('.card-bg');
let lastHoveredIndex = 0;

allCards.forEach((el, elIndex) => {
  el.addEventListener('mouseenter', () => {
    lastHoveredIndex = elIndex;
    const hoverImage = el.querySelector('.card-bg').style.backgroundImage;
    const hoveredRow = Math.floor(elIndex / COLS);
    const hoveredCol = elIndex % COLS;
    const stagger = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--stagger-delay')) || 0;

    // Hovered card swaps instantly — bypass any residual transition/delay
    const hoveredBg = allBgs[elIndex];
    hoveredBg.style.transition = 'none';
    hoveredBg.style.transitionDelay = '0ms';
    hoveredBg.style.backgroundImage = hoverImage;
    hoveredBg.offsetHeight;
    hoveredBg.style.transition = '';

    allBgs.forEach((cardBg, index) => {
      if (index === elIndex) return;
      const row = Math.floor(index / COLS);
      const col = index % COLS;
      const dist = Math.max(Math.abs(row - hoveredRow), Math.abs(col - hoveredCol));
      cardBg.style.transitionDelay = `${dist * stagger}ms`;
      cardBg.style.backgroundImage = hoverImage;
    });
  });

  el.addEventListener('mouseleave', () => {
    const hoveredRow = Math.floor(lastHoveredIndex / COLS);
    const hoveredCol = lastHoveredIndex % COLS;
    const stagger = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--stagger-delay')) || 0;

    allCards.forEach((cardEl, index) => {
      const cardBg = cardEl.querySelector('.card-bg');
      if (cardBg) {
        const row = Math.floor(index / COLS);
        const col = index % COLS;
        const dist = Math.max(Math.abs(row - hoveredRow), Math.abs(col - hoveredCol));
        cardBg.style.transitionDelay = `${dist * stagger}ms`;
        cardBg.style.backgroundImage = `url('${originalImages[index]}')`;
      }
    });
  });
});
</script>

</body>
</html>
