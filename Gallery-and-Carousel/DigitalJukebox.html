<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll-Driven 3D Totem with @wix/interact</title>
    <style>
        /* --- CSS Custom Properties for Explorer Sliders --- */
        :root {
            --item-width: 800px;
            --item-height: 512px;
            --item-radius: 12px;
            --item-gap: 32px;
        }

        /* --- Basic Setup and Resets --- */
        body {
            margin: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent the main body from scrolling */
        }

        /* --- Main Screen Container --- */
        .screen {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* --- Scrollable 3D Viewport --- */
        .scroll-view {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            perspective: 500px; /* Crucial for the 3D effect */
            position: relative;
            /* Modern CSS for snap-scrolling */
            scroll-snap-type: y proximity;
        }

        /* --- Cross-Browser Scrollbar Hiding --- */
        .scroll-view::-webkit-scrollbar {
            display: none; /* For Chrome, Safari and Opera */
        }
        .scroll-view {
            -ms-overflow-style: none;  /* For IE and Edge */
            scrollbar-width: none;  /* For Firefox */
        }

        /* --- List that contains the 3D items --- */
        .item-list {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d; /* Enables 3D positioning for child elements */
            /* Padding allows the first and last items to be centered.
               Uses CSS var so explorer sliders can change height and keep snap working. */
            padding: calc(50vh - var(--item-height) / 2) 0;
        }

        /* --- Individual Card Styling --- */
        .list-item {
            width: var(--item-width);
            max-width: 90vw; /* Ensure it fits on smaller screens */
            height: var(--item-height);
            background-color: #f0f0f0;
            border-radius: var(--item-radius);
            background-size: cover;
            background-position: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            margin: 0 auto var(--item-gap); /* Vertically space out items */
            /* Snap alignment for each item */
            scroll-snap-align: center;
            /* GPU-promote items so 3D transforms composite on their own layer */
            will-change: transform, opacity;
        }

        /* --- Information Panel at the Bottom --- */
        .info-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 20px 30px;
            text-align: center;
            color: #333;
            background: linear-gradient(to top, rgba(255, 255, 255, 1) 50%, rgba(255, 255, 255, 0));
            pointer-events: none;
            z-index: 10;
        }

        .info-panel h2 {
            margin: 0 0 6px 0;
            font-size: 32px;
            font-weight: 600;
        }

        .info-panel p {
            margin: 0;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="screen">
        <wix-interact-element data-wix-path="scroll-container">
            <div class="scroll-view" id="scroll-view">
                <div class="item-list" id="item-list">
                    <!-- Items are now statically rendered -->
                    <wix-interact-element data-wix-path="item-0">
                         <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_5a41dd4ed9284d6dacf0d2ec84697472~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-1">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_fcb77553ba6842bc80afe7b8cae070a6~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-2">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_46273f3267014f7c800436bbc8b3ad83~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-3">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_ff88830ded7e417cae47c905e83d7722~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-4">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_e6d98be6268347e48cff39f5c20fb0f8~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-5">
                       <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_55aad4d241374a2b827d4b00554b24ae~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-6">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_f4bbbb8da30b4951b24924aad5dbfed2~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-7">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_099bae5648814dce8bb05379af044ecc~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-8">
                       <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_6b14cf5bce1044db9a807dd3c5cc9028~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-9">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_565eb438708548da92653669027017a8~mv2.webp)"></div>
                    </wix-interact-element>
                     <wix-interact-element data-wix-path="item-10">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_cb4b664a75934f89ac680625002ab076~mv2.jpg)"></div>
                    </wix-interact-element>
                    <wix-interact-element data-wix-path="item-11">
                        <div class="list-item" style="background-image: url(https://static.wixstatic.com/media/9eca39_76de18515def47789ddab891e3ce12fa~mv2.jpg)"></div>
                    </wix-interact-element>
                </div>
            </div>
        </wix-interact-element>

        <div class="info-panel">
            <h2 id="artist-name">Teebs</h2>
            <p id="song-title">The Tropics</p>
        </div>
    </div>

    <!-- Keep centered item stable when explorer sliders change CSS variables -->
    <script>
    (function() {
        var scrollView = document.getElementById('scroll-view');
        var totalItems = document.querySelectorAll('.list-item').length;
        var centeredIndex = 0;
        var adjusting = false;
        var snapTimer;

        function getDims() {
            var s = getComputedStyle(document.documentElement);
            return {
                h: parseFloat(s.getPropertyValue('--item-height')) || 512,
                g: parseFloat(s.getPropertyValue('--item-gap'))    || 32
            };
        }

        function updateIndex() {
            var d = getDims();
            var stride = d.h + d.g;
            if (stride <= 0) return;
            centeredIndex = Math.round(scrollView.scrollTop / stride);
            centeredIndex = Math.max(0, Math.min(totalItems - 1, centeredIndex));
        }

        var idxTimer;
        var lastLogTime = 0;
        scrollView.addEventListener('scroll', function() {
            if (adjusting) return;
            clearTimeout(idxTimer);
            idxTimer = setTimeout(updateIndex, 100);
            // #region agent log
            var now = Date.now();
            if (now - lastLogTime > 200) {
                lastLogTime = now;
                try { window.parent.postMessage({ __debugLog: true, scrollTop: scrollView.scrollTop, centeredIndex: centeredIndex, snapType: 'proximity' }, '*'); } catch(e) {}
            }
            // #endregion
        }, { passive: true });

        // When CSS variables change: disable snap, set scrollTop, re-enable snap
        new MutationObserver(function() {
            if (!adjusting) {
                scrollView.style.scrollSnapType = 'none';
                adjusting = true;
            }
            clearTimeout(snapTimer);
            var d = getDims();
            scrollView.scrollTop = centeredIndex * (d.h + d.g);
            snapTimer = setTimeout(function() {
                adjusting = false;
                scrollView.style.scrollSnapType = '';
            }, 200);
        }).observe(document.documentElement, { attributes: true, attributeFilter: ['style'] });
    })();
    </script>

    <!-- Import @wix/interact -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        // Data source for the info panel.
        const itemsData = [
            { artist: "Teebs", title: "The Tropics" },
            { artist: "Astrid Sonne", title: "Boost" },
            { artist: "ML Buch", title: "Boarding" },
            { artist: "Burial", title: "Archangel" },
            { artist: "Aphex Twin", title: "Avril 14th" },
            { artist: "Four Tet", title: "Two Thousand and Seventeen" },
            { artist: "Bonobo", title: "Cirrus" },
            { artist: "Tycho", title: "Awake" },
            { artist: "Floating Points", title: "Nespole" },
            { artist: "Caribou", title: "Odessa" },
            { artist: "Jon Hopkins", title: "Emerald Rush" },
            { artist: "Boards of Canada", title: "Roygbiv" },
        ];
        
        // This keyframe effect is applied to each item.
        // It animates from a distant, rotated state to a centered, flat state, and back again.
        const scroll3DEffect = {
            name: 'scroll-3d-transform',
            keyframes: [
                { offset: 0, opacity: 0.2, transform: 'perspective(500px) rotateX(25deg) translateZ(-350px)' },
                { offset: 0.5, opacity: 1, transform: 'perspective(500px) rotateX(0deg) translateZ(0px)' },
                { offset: 1, opacity: 0.2, transform: 'perspective(500px) rotateX(-25deg) translateZ(-350px)' }
            ]
        };

        // We generate an interaction for each list item.
        const itemInteractions = itemsData.map((_, index) => ({
            key: `item-${index}`,
            trigger: 'viewProgress',
            effects: [
                {
                    key: `item-${index}`,
                    keyframeEffect: scroll3DEffect,
                    // The default 'cover' range is perfect here, as it maps the animation
                    // to the item's journey across the entire viewport.
                    easing: 'linear',
                    fill: 'both'
                }
            ]
        }));
        
        // This interaction uses a custom effect to update the info panel text.
        const infoPanelInteraction = {
            key: 'scroll-container',
            trigger: 'viewProgress',
            effects: [
                {
                    key: 'scroll-container', // Could be any element, we don't use it.
                    customEffect: (element, progress) => {
                        const artistEl = document.getElementById('artist-name');
                        const songEl = document.getElementById('song-title');
                        
                        // Calculate which item is currently closest to the center based on scroll progress.
                        const totalItems = itemsData.length;
                        let closestIndex = Math.round(progress * (totalItems - 1));
                        closestIndex = Math.max(0, Math.min(totalItems - 1, closestIndex));

                        const currentData = itemsData[closestIndex];

                        // Update text only if it has changed to avoid unnecessary DOM manipulation.
                        if (artistEl.textContent !== currentData.artist) {
                            artistEl.textContent = currentData.artist;
                        }
                        if (songEl.textContent !== currentData.title) {
                            songEl.textContent = currentData.title;
                        }
                    },
                    // The range 'contain' maps the progress to the scrollable height of the content.
                    rangeStart: { name: 'contain', offset: { type: 'percentage', value: 0 } },
                    rangeEnd: { name: 'contain', offset: { type: 'percentage', value: 100 } }
                }
            ]
        };

        // Combine all interactions and initialize the library.
        Interact.create({
            interactions: [
                ...itemInteractions,
                infoPanelInteraction
            ]
        });
    </script>
</body>
</html>
