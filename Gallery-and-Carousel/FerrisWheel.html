<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Showcase with @wix/interact</title>
    <script type="module" src="https://esm.sh/@wix/interact@1.78.0"></script>
    <style>
        :root {
            --r: 20;
            --ts: 17;
        }

        /* General body styling */
        body {
            margin: 0;
            background-color: #f4f4f4;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }

        /* Content container for text and animation */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 4vh;
        }

        /* Main title styling */
        .main-title {
            font-size: 3rem;
            margin: 0.4em 0 0.1em;
        }

        /* Subtitle styling */
        .sub-title {
            font-size: 1.4rem;
            margin-bottom: 3em;
            font-weight: 400;
            color: #444;
        }

        /* Container for the rotating tiles — fixed layout size, tiles overflow visually */
        .tile-ring {
            position: relative;
            width:  69vmin;
            height: 69vmin;
            transform-origin: center center;
        }

        /* Individual tile styling — placed at container center, then offset per tile */
        .tile {
            position: absolute;
            width:  calc(var(--ts) * 1vmin);
            height: calc(var(--ts) * 1vmin);
            left: 50%;
            top: 50%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            transform-origin: center center;
        }

        /* 8 tiles at 45° intervals — cos/sin precomputed */
        #tile-1 { margin-left: calc((var(--r) * 1       - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * 0       - var(--ts) / 2) * 1vmin); z-index: 100; }
        #tile-2 { margin-left: calc((var(--r) * 0.7071  - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * 0.7071  - var(--ts) / 2) * 1vmin); z-index: 171; }
        #tile-3 { margin-left: calc((var(--r) * 0       - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * 1       - var(--ts) / 2) * 1vmin); z-index: 200; }
        #tile-4 { margin-left: calc((var(--r) * -0.7071 - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * 0.7071  - var(--ts) / 2) * 1vmin); z-index: 171; }
        #tile-5 { margin-left: calc((var(--r) * -1      - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * 0       - var(--ts) / 2) * 1vmin); z-index: 100; }
        #tile-6 { margin-left: calc((var(--r) * -0.7071 - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * -0.7071 - var(--ts) / 2) * 1vmin); z-index: 29;  }
        #tile-7 { margin-left: calc((var(--r) * 0       - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * -1      - var(--ts) / 2) * 1vmin); z-index: 0;   }
        #tile-8 { margin-left: calc((var(--r) * 0.7071  - var(--ts) / 2) * 1vmin); margin-top: calc((var(--r) * -0.7071 - var(--ts) / 2) * 1vmin); z-index: 29;  }

        /* Styling for images within tiles */
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* wix-interact-element should not interfere with layout */
        wix-interact-element {
            display: contents;
        }
    </style>
</head>
<body>
    <!-- Main content area -->
    <div class="content">
        <h1 class="main-title">Brand Showcase</h1>
        <h2 class="sub-title">Dynamic Circular Tile Animation</h2>
        
        <!-- The container for all tiles, wrapped for @wix/interact -->
        <wix-interact-element data-wix-path="#tile-ring">
            <div id="tile-ring" class="tile-ring">
                <!-- Each tile is wrapped for @wix/interact and positioned via inline style -->
                <!-- Positions are pre-calculated based on the original JS logic -->

                <wix-interact-element data-wix-path="#tile-1">
                    <div id="tile-1" class="tile">
                        <img src="https://placehold.co/300x300/007aff/FFFFFF?text=1" alt="Brand 1">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-2">
                    <div id="tile-2" class="tile">
                        <img src="https://placehold.co/300x300/34c759/FFFFFF?text=2" alt="Brand 2">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-3">
                    <div id="tile-3" class="tile">
                        <img src="https://placehold.co/300x300/5856d6/FFFFFF?text=3" alt="Brand 3">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-4">
                    <div id="tile-4" class="tile">
                        <img src="https://placehold.co/300x300/ff9500/FFFFFF?text=4" alt="Brand 4">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-5">
                    <div id="tile-5" class="tile">
                        <img src="https://placehold.co/300x300/ff2d55/FFFFFF?text=5" alt="Brand 5">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-6">
                    <div id="tile-6" class="tile">
                        <img src="https://placehold.co/300x300/af52de/FFFFFF?text=6" alt="Brand 6">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-7">
                    <div id="tile-7" class="tile">
                        <img src="https://placehold.co/300x300/5ac8fa/FFFFFF?text=7" alt="Brand 7">
                    </div>
                </wix-interact-element>

                <wix-interact-element data-wix-path="#tile-8">
                    <div id="tile-8" class="tile">
                        <img src="https://placehold.co/300x300/ffcc00/FFFFFF?text=8" alt="Brand 8">
                    </div>
                </wix-interact-element>
            </div>
        </wix-interact-element>
    </div>

    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.78.0';

        // Configuration for the ferris wheel animation
        const config = {
            // Define reusable effects to keep the interactions block clean
            effects: {
                'ring-rotation': {
                    keyframeEffect: {
                        name: 'ring-rotation-kf',
                        keyframes: [
                            { transform: 'rotate(0deg)' },
                            { transform: 'rotate(360deg)' }
                        ]
                    },
                    duration: 25000,
                    iterations: Infinity,
                    easing: 'linear'
                },
                'tile-counter-rotation': {
                    keyframeEffect: {
                        name: 'tile-counter-rotation-kf',
                        keyframes: [
                            { transform: 'rotate(0deg)' },
                            { transform: 'rotate(-360deg)' }
                        ]
                    },
                    duration: 25000,
                    iterations: Infinity,
                    easing: 'linear'
                }
            },
            // Define the interaction that triggers the animations
            interactions: [
                {
                    // The #tile-ring container itself is the source trigger
                    key: '#tile-ring',
                    // The 'pageVisible' trigger starts the animation as soon as the page is visible
                    trigger: 'pageVisible',
                    params: { type: 'once' },
                    // The list of animations to play
                    effects: [
                        // 1. Animate the main ring container
                        {
                            key: '#tile-ring',
                            effectId: 'ring-rotation'
                        },
                        // 2. Animate each tile individually to counter the ring's rotation
                        { key: '#tile-1', effectId: 'tile-counter-rotation' },
                        { key: '#tile-2', effectId: 'tile-counter-rotation' },
                        { key: '#tile-3', effectId: 'tile-counter-rotation' },
                        { key: '#tile-4', effectId: 'tile-counter-rotation' },
                        { key: '#tile-5', effectId: 'tile-counter-rotation' },
                        { key: '#tile-6', effectId: 'tile-counter-rotation' },
                        { key: '#tile-7', effectId: 'tile-counter-rotation' },
                        { key: '#tile-8', effectId: 'tile-counter-rotation' }
                    ]
                }
            ]
        };

        // Initialize the interactions
        Interact.create(config);
    </script>
</body>
</html>
