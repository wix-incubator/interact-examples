<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagonal Shuffle Card Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://esm.sh/@wix/interact@1.79.0"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fffff; /* Dark blue-gray */
            color: #000;
            overflow-x: hidden;
        }

        /* The main container that provides the scrollable height */
        #scroll-section {
            position: relative;
            height: 450vh; /* Provides plenty of room for the scroll animation */
        }

        /* This container sticks to the viewport and acts as the "stage" for the animation */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            perspective: 1200px; /* Adds depth for 3D transforms */
        }

        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            
            /* Responsive Sizing */
            width: 90vw; /* Use 90% of the viewport width */
            max-width: 400px; /* Set a max-width for desktop */
            
            /* MOBILE-FIRST: Default to vertical aspect ratio */
            aspect-ratio: 3 / 4; 
            
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            /* Set initial state for animations: off-screen and invisible */
            opacity: 0;
            will-change: transform, opacity;
            transform-style: preserve-3d;
            overflow: hidden; /* Ensure inner image respects border-radius */
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem; /* Smaller padding for mobile */
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
        }

        .card-title {
            font-size: 1.25rem; /* Smaller font for mobile */
            font-weight: 700;
        }

        .card-description {
            font-size: 0.875rem; /* Smaller font for mobile */
            opacity: 0.8;
            margin-top: 0.25rem;
        }

        /* Media query for medium screens and up (Tailwind 'md' breakpoint) */
        @media (min-width: 768px) {
            .card {
                /* Switch to landscape aspect ratio on desktop */
                aspect-ratio: 4 / 3;
            }
            .card-content {
                padding: 1.5rem; /* Restore original padding */
            }
            .card-title {
                font-size: 1.5rem; /* Restore original font size */
            }
            .card-description {
                font-size: 0.9rem; /* Restore original font size */
            }
        }

    </style>
</head>
<body>

    <!-- 
      Blank 100vh intro section added back.
    -->
    <div class="h-[100vh]"></div>

    <wix-interact-element data-wix-path="#scroll-section">
        <div id="scroll-section">
            <div class="sticky-wrapper">
                <!-- Card 1 -->
                <wix-interact-element data-wix-path="#card-1">
                    <div id="card-1" class="card">
                        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500" 
                             alt="Misty Mountains" 
                             class="absolute inset-0 w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/920x680/555/fff?text=Image+Failed+To+Load'">
                        <div class="card-content z-10">
                            <h2 class="card-title">Misty Mountains</h2>
                            <p class="card-description">A journey through ethereal landscapes.</p>
                        </div>
                    </div>
                </wix-interact-element>

                <!-- Card 2 -->
                <wix-interact-element data-wix-path="#card-2">
                    <div id="card-2" class="card">
                        <img src="https://images.unsplash.com/photo-1511884642898-4c92249e20b6?w=500" 
                             alt="Forest Canopy" 
                             class="absolute inset-0 w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/920x680/555/fff?text=Image+Failed+To+Load'">
                         <div class="card-content z-10">
                            <h2 class="card-title">Forest Canopy</h2>
                            <p class="card-description">Overhead view of a dense, green forest.</p>
                        </div>
                    </div>
                </wix-interact-element>

                <!-- Card 3 -->
                <wix-interact-element data-wix-path="#card-3">
                    <div id="card-3" class="card">
                        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=500" 
                             alt="Alpine Lake" 
                             class="absolute inset-0 w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/920x680/555/fff?text=Image+Failed+To+Load'">
                         <div class="card-content z-10">
                            <h2 class="card-title">Alpine Lake</h2>
                            <p class="card-description">Crystal clear water reflecting the peaks.</p>
                        </div>
                    </div>
                </wix-interact-element>

                <!-- Card 4 -->
                <wix-interact-element data-wix-path="#card-4">
                    <div id="card-4" class="card">
                        <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=500" 
                             alt="Hidden Waterfall" 
                             class="absolute inset-0 w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/920x680/555/fff?text=Image+Failed+To+Load'">
                         <div class="card-content z-10">
                            <h2 class="card-title">Hidden Waterfall</h2>
                            <p class="card-description">Nature's raw and untamed power.</p>
                        </div>
                    </div>
                </wix-interact-element>

                <!-- Card 5 -->
                <wix-interact-element data-wix-path="#card-5">
                    <div id="card-5" class="card">
                        <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=500" 
                             alt="Rolling Hills" 
                             class="absolute inset-0 w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/920x680/555/fff?text=Image+Failed+To+Load'">
                         <div class="card-content z-10">
                            <h2 class="card-title">Rolling Hills</h2>
                            <p class="card-description">Endless green fields under a summer sky.</p>
                        </div>
                    </div>
                </wix-interact-element>

            </div>
        </div>
    </wix-interact-element>

    <!-- 
      The Outro section has been removed.
    -->


    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

        // The interaction configuration remains the same, as it uses
        // viewport-relative units (vw/vh) for its transforms.
        const interactions = [
            // Card 1: Flies in from bottom-left
            {
                key: '#scroll-section',
                trigger: 'viewProgress',
                effects: [{
                    key: '#card-1',
                    keyframeEffect: {
                        name: 'card-1-fly-in',
                        keyframes: [
                            { transform: 'translate(-50%, -50%) translate(-80vw, 50vh) rotate(-45deg) scale(0.7)', opacity: 1 },
                            { transform: 'translate(-50%, -50%) translate(0, 0) rotate(-4deg) scale(1)', opacity: 1 }
                        ]
                    },
                    rangeStart: { name: 'cover', offset: { type: 'percentage', value: 5 } },
                    rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 25 } },
                    easing: 'ease-out',
                    fill: 'both'
                }]
            },
            // Card 2: Flies in from bottom-right
            {
                key: '#scroll-section',
                trigger: 'viewProgress',
                effects: [{
                    key: '#card-2',
                    keyframeEffect: {
                        name: 'card-2-fly-in',
                        keyframes: [
                            { transform: 'translate(-50%, -50%) translate(80vw, 50vh) rotate(45deg) scale(0.7)', opacity: 1 },
                            { transform: 'translate(-50%, -50%) translate(0, 0) rotate(3deg) scale(1)', opacity: 1 }
                        ]
                    },
                    rangeStart: { name: 'cover', offset: { type: 'percentage', value: 20 } },
                    rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 40 } },
                    easing: 'ease-out',
                    fill: 'both'
                }]
            },
            // Card 3: Flies in from bottom-left
            {
                key: '#scroll-section',
                trigger: 'viewProgress',
                effects: [{
                    key: '#card-3',
                    keyframeEffect: {
                        name: 'card-3-fly-in',
                        keyframes: [
                            { transform: 'translate(-50%, -50%) translate(-80vw, 50vh) rotate(-45deg) scale(0.7)', opacity: 1 },
                            { transform: 'translate(-50%, -50%) translate(0, 0) rotate(-2deg) scale(1)', opacity: 1 }
                        ]
                    },
                    rangeStart: { name: 'cover', offset: { type: 'percentage', value: 35 } },
                    rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 55 } },
                    easing: 'ease-out',
                    fill: 'both'
                }]
            },
            // Card 4: Flies in from bottom-right
            {
                key: '#scroll-section',
                trigger: 'viewProgress',
                effects: [{
                    key: '#card-4',
                    keyframeEffect: {
                        name: 'card-4-fly-in',
                        keyframes: [
                            { transform: 'translate(-50%, -50%) translate(80vw, 50vh) rotate(45deg) scale(0.7)', opacity: 1 },
                            { transform: 'translate(-50%, -50%) translate(0, 0) rotate(1deg) scale(1)', opacity: 1 }
                        ]
                    },
                    rangeStart: { name: 'cover', offset: { type: 'percentage', value: 50 } },
                    rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 70 } },
                    easing: 'ease-out',
                    fill: 'both'
                }]
            },
            // Card 5: Flies in from bottom-left
            {
                key: '#scroll-section',
                trigger: 'viewProgress',
                effects: [{
                    key: '#card-5',
                    keyframeEffect: {
                        name: 'card-5-fly-in',
                        keyframes: [
                            { transform: 'translate(-50%, -50%) translate(-80vw, 50vh) rotate(-45deg) scale(0.7)', opacity: 1 },
                            { transform: 'translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1)', opacity: 1 }
                        ]
                    },
                    rangeStart: { name: 'cover', offset: { type: 'percentage', value: 65 } },
                    rangeEnd: { name: 'cover', offset: { type: 'percentage', value: 85 } },
                    easing: 'ease-out',
                    fill: 'both'
                }]
            }
        ];

        Interact.create({ interactions });
    </script>

</body>
</html>
