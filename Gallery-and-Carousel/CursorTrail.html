<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Pop-up Effect</title>
    <!-- Load Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load @wix/interact -->
    <script src="https://esm.sh/@wix/interact@1.79.0" type="module"></script>
    <style>
        /* CSS custom properties (controllable via explorer sliders) */
        :root {
            --trigger-distance: 85;
            --spawn-count: 1;
            --base-size: 210;
            --border-radius: 0;
        }

        /* Set the Inter font as the default */
        html, body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrollbars from appearing */
        }

        /* This is now the main WRAPPER class for the image + title */
        .popup-wrapper {
            position: absolute;
            /* Center the wrapper on the cursor */
            transform: translate(-50%, -50%);
            /* Prevent images from capturing mouse events */
            pointer-events: none;
            /* Apply the animation - new duration */
            animation: popAndFade 0.55s ease-out forwards;
            will-change: transform, opacity;
        }

        /* Styling for the image itself, inside the wrapper */
        .popup-wrapper img {
            display: block;
            /* max-width and max-height will be set by JS */
            width: auto;
            height: auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Removed the styling for the title */

        /* * Animation keyframes:
         * Total duration: 0.75s (was 0.84s)
         * 0% - 32%: Fast expand (0.24s)
         * 32% - 80%: Shorter hold (0.36s)
         * 80% - 100%: Faster fade (0.15s)
         */
        @keyframes popAndFade {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            32% { /* Was 29% */
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            80% { /* Was 71% */
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        /* The 'gentleFadeOut' animation has been removed.
          It is now handled by @wix/interact.
        */
    </style>
</head>
<body class="bg-gray-50">

    <!-- This is the main container that listens for mouse movement -->
    <div id="effect-container" class="relative w-full h-full">
        <!-- Helper text to guide the user -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <!-- 
              Wrapped the helper text in wix-interact-element
              to apply the @wix/interact animation.
            -->
            <wix-interact-element data-wix-path="helper-text">
                <p class="text-gray-400 text-lg">
                    Move your mouse around the screen
                </p>
            </wix-interact-element>
        </div>
    </div>

    <!-- This script module configures @wix/interact -->
    <script type="module">
        import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

        // Configuration for the helper text fade-out animation
        const config = {
            interactions: [
                {
                    // Use 'pageVisible' to trigger the animation once on load
                    key: 'helper-text',
                    trigger: 'pageVisible',
                    params: {
                        type: 'once'
                    },
                    effects: [
                        {
                            key: 'helper-text',
                            // Use keyframeEffect to replicate the CSS animation
                            keyframeEffect: {
                                name: 'gentleFadeOut',
                                // Keyframes now use offsets (0 to 1)
                                keyframes: [
                                    { opacity: 1, offset: 0 },
                                    { opacity: 1, offset: 0.8 }, // 80%
                                    { opacity: 0, offset: 1.0 }  // 100%
                                ]
                            },
                            duration: 4000, // 4 seconds
                            fill: 'forwards' // Keep the final state (opacity: 0)
                        }
                    ]
                }
            ]
        };

        // Initialize @wix/interact
        Interact.create(config);
    </script>

    <!-- Original imperative JS for the image pop-up effect -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('effect-container');
            if (!container) return;

            // Array of image URLs
            const images = [
                'https://static.wixstatic.com/media/9eca39_bc8b7813d7474b8db690847acd574ebc~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_e0af56b91bf64fbc9611afab61b96d96~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_e824a437f7744180929afdd797603004~mv2.webp',
                'https://static.wixstatic.com/media/9eca39_4834077538244734befe8dfdafb2bf52~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_3f6aea6c9b914664b028f84f10b8c3d6~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_f2559369489a42659e862b8d2cbf0789~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_f3130cc17ba8447b8f803d846563f9f6~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_8923188b5c0046709dada3d38f6e3dcf~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_2057483f44894c84a447b85f900f4cde~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_618bfeb93fcf4f5ca7a9f42733b3b61e~mv2.webp',
                'https://static.wixstatic.com/media/9eca39_f2f224dca1fc48e3898fc9256e214502~mv2.jpg',
                'https://static.wixstatic.com/media/9eca39_118b28ee9fcf4f83aff362a0f60e1ed8~mv2.jpg'
            ];

            // Helper: read a CSS custom property as a number
            function getCssVar(name, fallback) {
                const v = getComputedStyle(document.documentElement).getPropertyValue(name);
                const n = parseFloat(v);
                return isNaN(n) ? fallback : n;
            }

            // Store the last position where an image was created
            let lastPosition = { x: 0, y: 0 };

            // Function to calculate distance between two points
            function getDistance(pos1, pos2) {
                const dx = pos1.x - pos2.x;
                const dy = pos1.y - pos2.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            // Function to create and display an image
            function showImage(x, y) {
                // Pick a random image URL
                const randomUrl = images[Math.floor(Math.random() * images.length)];

                // Create wrapper element
                const wrapper = document.createElement('div');
                wrapper.className = 'popup-wrapper';
                wrapper.style.left = `${x}px`;
                wrapper.style.top = `${y}px`;

                // Create image element
                const img = document.createElement('img');
                img.src = randomUrl;

                // --- Size Calculation ---
                // Read base size from CSS variable (controllable via explorer slider)
                const baseSize = getCssVar('--base-size', 210);
                // Randomization factor (e.g., 0.8 to 1.2, for 80% to 120% of base size)
                const randomFactor = 0.8 + Math.random() * 0.4;
                const finalSize = baseSize * randomFactor;

                // Apply the randomized size
                img.style.maxWidth = `${finalSize}px`;
                img.style.maxHeight = `${finalSize}px`;
                // --- End Size Calculation ---

                // Apply border radius from CSS variable
                const borderRadius = getCssVar('--border-radius', 0);
                if (borderRadius > 0) {
                    img.style.borderRadius = `${borderRadius}px`;
                }

                // Add a fallback placeholder in case an image fails to load
                img.onerror = () => {
                    img.src = `https://placehold.co/210x210/e0e0e0/707070?text=Error`;
                    img.style.width = `${baseSize}px`;
                    img.style.height = `${baseSize}px`;
                };

                // Append image to the wrapper
                wrapper.appendChild(img);

                // When the animation finishes, remove the wrapper from the DOM
                wrapper.addEventListener('animationend', () => {
                    wrapper.remove();
                });

                container.appendChild(wrapper);
            }

            // Spawn multiple images with slight random offsets (density > 1)
            function spawnImages(x, y) {
                const count = Math.round(getCssVar('--spawn-count', 1));
                for (let i = 0; i < count; i++) {
                    // First image at exact position, extras offset randomly ±30px
                    const ox = i === 0 ? 0 : (Math.random() - 0.5) * 60;
                    const oy = i === 0 ? 0 : (Math.random() - 0.5) * 60;
                    showImage(x + ox, y + oy);
                }
            }

            // Listen for mouse movement on the container
            container.addEventListener('mousemove', (e) => {
                const currentPosition = { x: e.clientX, y: e.clientY };
                // Read trigger distance from CSS variable (controllable via explorer slider)
                const triggerDistance = getCssVar('--trigger-distance', 85);

                // Check if the mouse has moved far enough
                if (getDistance(currentPosition, lastPosition) > triggerDistance) {
                    // Update the last position
                    lastPosition = currentPosition;
                    // Spawn image(s) at the current cursor position
                    spawnImages(currentPosition.x, currentPosition.y);
                }
            });

            // Also handle touch events for mobile devices
            container.addEventListener('touchmove', (e) => {
                // Get the first touch point
                const touch = e.touches[0];
                if (!touch) return;
                
                const currentPosition = { x: touch.clientX, y: touch.clientY };
                const triggerDistance = getCssVar('--trigger-distance', 85);

                if (getDistance(currentPosition, lastPosition) > triggerDistance) {
                    lastPosition = currentPosition;
                    spawnImages(currentPosition.x, currentPosition.y);
                }
            }, { passive: true }); // Use passive listener for performance
        });
    </script>
</body>
</html>
