<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Arc Wheel Carousel</title>
    <script type="module" src="https://esm.sh/@wix/interact@1.79.0"></script>
    <style>
        :root {
            --r: 65;
            --cs: 20;
            --cr: 16px;
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            background: #0a0a0f;
            color: #f0f0f5;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .arc-viewport {
            position: relative;
            width: 100%;
            height: 68vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .arc-viewport::before,
        .arc-viewport::after {
            content: '';
            position: absolute;
            top: 0;
            width: 14%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .arc-viewport::before {
            left: 0;
            background: linear-gradient(to right, #0a0a0f, transparent);
        }
        .arc-viewport::after {
            right: 0;
            background: linear-gradient(to left, #0a0a0f, transparent);
        }

        .fade-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(to top, #0a0a0f 8%, transparent);
            z-index: 10;
            pointer-events: none;
        }

        .wheel {
            position: relative;
            width: calc(var(--r) * 2vmin + var(--cs) * 1vmin);
            height: calc(var(--r) * 2vmin + var(--cs) * 1vmin);
            transform-origin: center center;
            margin-top: 10vh;
            flex-shrink: 0;
        }

        wix-interact-element {
            display: contents;
        }

        .card {
            position: absolute;
            width: calc(var(--cs) * 1vmin);
            height: calc(var(--cs) * 1vmin);
            left: 50%;
            top: 50%;
            border-radius: var(--cr);
            overflow: hidden;
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.4),
                0 12px 40px rgba(0, 0, 0, 0.25);
            transform-origin: center center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 12 cards at 30° intervals — cos/sin precomputed */
        #card-1  { margin-left: calc((var(--r) *  1.0000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  0.0000 - var(--cs) / 2) * 1vmin); z-index: 100; }
        #card-2  { margin-left: calc((var(--r) *  0.8660 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  0.5000 - var(--cs) / 2) * 1vmin); z-index: 150; }
        #card-3  { margin-left: calc((var(--r) *  0.5000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  0.8660 - var(--cs) / 2) * 1vmin); z-index: 187; }
        #card-4  { margin-left: calc((var(--r) *  0.0000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  1.0000 - var(--cs) / 2) * 1vmin); z-index: 200; }
        #card-5  { margin-left: calc((var(--r) * -0.5000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  0.8660 - var(--cs) / 2) * 1vmin); z-index: 187; }
        #card-6  { margin-left: calc((var(--r) * -0.8660 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  0.5000 - var(--cs) / 2) * 1vmin); z-index: 150; }
        #card-7  { margin-left: calc((var(--r) * -1.0000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) *  0.0000 - var(--cs) / 2) * 1vmin); z-index: 100; }
        #card-8  { margin-left: calc((var(--r) * -0.8660 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) * -0.5000 - var(--cs) / 2) * 1vmin); z-index: 50;  }
        #card-9  { margin-left: calc((var(--r) * -0.5000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) * -0.8660 - var(--cs) / 2) * 1vmin); z-index: 13;  }
        #card-10 { margin-left: calc((var(--r) *  0.0000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) * -1.0000 - var(--cs) / 2) * 1vmin); z-index: 0;   }
        #card-11 { margin-left: calc((var(--r) *  0.5000 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) * -0.8660 - var(--cs) / 2) * 1vmin); z-index: 13;  }
        #card-12 { margin-left: calc((var(--r) *  0.8660 - var(--cs) / 2) * 1vmin); margin-top: calc((var(--r) * -0.5000 - var(--cs) / 2) * 1vmin); z-index: 50;  }

        .copy {
            text-align: center;
            padding: 0 1.5rem 5rem;
            position: relative;
            z-index: 20;
            margin-top: -10vh;
        }

        .headline {
            font-size: clamp(26px, 4.5vw, 56px);
            font-weight: 300;
            letter-spacing: -0.01em;
            line-height: 1.15;
        }

        .sub {
            opacity: 0.55;
            margin-top: 12px;
            font-size: clamp(13px, 1.6vw, 17px);
            font-weight: 400;
        }

        .cta {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 26px;
            background: #34d399;
            color: #042;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(52, 211, 153, 0.3);
        }
        .cta:active { transform: translateY(1px); }

        @media (max-width: 768px) {
            :root { --r: 22; --cs: 12; }
            .arc-viewport { height: 58vh; }
            .wheel { margin-top: 8vh; }
            .copy { margin-top: -8vh; }
        }

        @media (max-width: 480px) {
            :root { --r: 18; --cs: 10; }
            .arc-viewport { height: 50vh; }
            .wheel { margin-top: 6vh; }
            .copy { margin-top: -5vh; }
        }
    </style>
</head>
<body>

<section class="arc-viewport">
    <wix-interact-element data-wix-path="#wheel">
        <div id="wheel" class="wheel">

            <wix-interact-element data-wix-path="#card-1">
                <div id="card-1" class="card">
                    <wix-interact-element data-wix-path="#card-1-img">
                        <img id="card-1-img" src="https://images.pexels.com/photos/3781523/pexels-photo-3781523.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 1">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-2">
                <div id="card-2" class="card">
                    <wix-interact-element data-wix-path="#card-2-img">
                        <img id="card-2-img" src="https://images.pexels.com/photos/1037992/pexels-photo-1037992.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 2">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-3">
                <div id="card-3" class="card">
                    <wix-interact-element data-wix-path="#card-3-img">
                        <img id="card-3-img" src="https://images.pexels.com/photos/3587478/pexels-photo-3587478.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 3">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-4">
                <div id="card-4" class="card">
                    <wix-interact-element data-wix-path="#card-4-img">
                        <img id="card-4-img" src="https://images.pexels.com/photos/205926/pexels-photo-205926.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 4">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-5">
                <div id="card-5" class="card">
                    <wix-interact-element data-wix-path="#card-5-img">
                        <img id="card-5-img" src="https://images.pexels.com/photos/788946/pexels-photo-788946.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 5">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-6">
                <div id="card-6" class="card">
                    <wix-interact-element data-wix-path="#card-6-img">
                        <img id="card-6-img" src="https://images.pexels.com/photos/3945659/pexels-photo-3945659.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 6">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-7">
                <div id="card-7" class="card">
                    <wix-interact-element data-wix-path="#card-7-img">
                        <img id="card-7-img" src="https://images.pexels.com/photos/4009621/pexels-photo-4009621.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 7">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-8">
                <div id="card-8" class="card">
                    <wix-interact-element data-wix-path="#card-8-img">
                        <img id="card-8-img" src="https://images.pexels.com/photos/5081403/pexels-photo-5081403.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 8">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-9">
                <div id="card-9" class="card">
                    <wix-interact-element data-wix-path="#card-9-img">
                        <img id="card-9-img" src="https://images.pexels.com/photos/1649771/pexels-photo-1649771.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 9">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-10">
                <div id="card-10" class="card">
                    <wix-interact-element data-wix-path="#card-10-img">
                        <img id="card-10-img" src="https://images.pexels.com/photos/1279813/pexels-photo-1279813.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 10">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-11">
                <div id="card-11" class="card">
                    <wix-interact-element data-wix-path="#card-11-img">
                        <img id="card-11-img" src="https://images.pexels.com/photos/1154039/pexels-photo-1154039.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 11">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

            <wix-interact-element data-wix-path="#card-12">
                <div id="card-12" class="card">
                    <wix-interact-element data-wix-path="#card-12-img">
                        <img id="card-12-img" src="https://images.pexels.com/photos/374630/pexels-photo-374630.jpeg?auto=compress&cs=tinysrgb&w=600" alt="carousel image 12">
                    </wix-interact-element>
                </div>
            </wix-interact-element>

        </div>
    </wix-interact-element>
    <div class="fade-bottom"></div>
</section>

<section class="copy">
    <div class="headline">25% Off All<br>Top Rated Headphones</div>
    <div class="sub">Explore Limited Time Offers</div>
    <a class="cta" href="#">Get Started</a>
</section>

<script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact@1.79.0';

    const config = {
        effects: {
            'wheel-spin': {
                keyframeEffect: {
                    name: 'wheel-spin-kf',
                    keyframes: [
                        { transform: 'rotate(0deg)' },
                        { transform: 'rotate(360deg)' }
                    ]
                },
                duration: 30000,
                iterations: Infinity,
                easing: 'linear'
            },
            'card-counter': {
                keyframeEffect: {
                    name: 'card-counter-kf',
                    keyframes: [
                        { transform: 'rotate(0deg)' },
                        { transform: 'rotate(-360deg)' }
                    ]
                },
                duration: 30000,
                iterations: Infinity,
                easing: 'linear'
            },
            'img-hover': {
                keyframeEffect: {
                    name: 'img-hover-kf',
                    keyframes: [
                        { transform: 'scale(1)' },
                        { transform: 'scale(1.1)' }
                    ]
                },
                duration: 250,
                easing: 'ease-out',
                fill: 'both'
            }
        },
        interactions: [
            {
                key: '#wheel',
                trigger: 'pageVisible',
                params: { type: 'once' },
                effects: [
                    { key: '#wheel', effectId: 'wheel-spin' },
                    { key: '#card-1',  effectId: 'card-counter' },
                    { key: '#card-2',  effectId: 'card-counter' },
                    { key: '#card-3',  effectId: 'card-counter' },
                    { key: '#card-4',  effectId: 'card-counter' },
                    { key: '#card-5',  effectId: 'card-counter' },
                    { key: '#card-6',  effectId: 'card-counter' },
                    { key: '#card-7',  effectId: 'card-counter' },
                    { key: '#card-8',  effectId: 'card-counter' },
                    { key: '#card-9',  effectId: 'card-counter' },
                    { key: '#card-10', effectId: 'card-counter' },
                    { key: '#card-11', effectId: 'card-counter' },
                    { key: '#card-12', effectId: 'card-counter' }
                ]
            },
            { key: '#card-1',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-1-img',  effectId: 'img-hover' }] },
            { key: '#card-2',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-2-img',  effectId: 'img-hover' }] },
            { key: '#card-3',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-3-img',  effectId: 'img-hover' }] },
            { key: '#card-4',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-4-img',  effectId: 'img-hover' }] },
            { key: '#card-5',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-5-img',  effectId: 'img-hover' }] },
            { key: '#card-6',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-6-img',  effectId: 'img-hover' }] },
            { key: '#card-7',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-7-img',  effectId: 'img-hover' }] },
            { key: '#card-8',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-8-img',  effectId: 'img-hover' }] },
            { key: '#card-9',  trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-9-img',  effectId: 'img-hover' }] },
            { key: '#card-10', trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-10-img', effectId: 'img-hover' }] },
            { key: '#card-11', trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-11-img', effectId: 'img-hover' }] },
            { key: '#card-12', trigger: 'hover', params: { type: 'alternate' }, effects: [{ key: '#card-12-img', effectId: 'img-hover' }] }
        ]
    };

    Interact.create(config);
</script>
</body>
</html>
