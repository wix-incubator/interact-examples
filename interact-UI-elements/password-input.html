<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Input</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px;
    }

    interact-element { display: contents; }

    .pill {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 300px;
      height: 60px;
      padding: 0 8px 0 24px;
      border-radius: 9999px;
      background: #000;
      border: 0.5px solid #ffd7823f;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      transition:
        box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.3s ease;
    }

    .pill:hover,
    .pill:focus-within {
      border-width: 1.3px;
      border-color: #ffd78255;
      box-shadow: 0 4px 20px rgba(10, 10, 10, 0.5), 0 0px 5px rgba(255,215,130,0.04);
    }

    .input-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-field {
      flex: 1;
      min-width: 0;
      height: 100%;
      border: none;
      background: transparent;
      color: #ffd782;
      font-family: inherit;
      font-size: clamp(14px, 1.5vw + 10px, 16px);
      font-weight: 500;
      outline: none;
      letter-spacing: 0.03em;
      padding: 0;
    }

    .input-field::placeholder { color: #ffd78244; }
    .input-field.masked {
      color: transparent;
      caret-color: #ffd782;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 0;
    }
    .input-field.masked::placeholder { color: transparent; }

    .mask {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      pointer-events: none;
      user-select: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(14px, 1.5vw + 10px, 16px);
      letter-spacing: 0;
    }

    .mask.active { display: flex; }

    .mask .dot {
      width: 1ch;
      height: 1em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mask .dot::after {
      content: '';
      width: 0.45em;
      height: 0.45em;
      border-radius: 50%;
    }

    .dot-filled::after { background: #ffd782; }
    .dot-placeholder::after { background: #ffd78230; }
    .mask .space { display: inline-block; width: 1ch; }

    .eye-btn {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      padding: 4px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .eye-btn:focus-visible { background: #2a2a2a; }

    .eye-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .eye-lid { transform-origin: 18px 20px; }
    .eyelashes { transform-origin: 18px 20px; }
    .eye-curve { opacity: 0; }

    .wrapper {
      position: relative;
    }

    .lang-warning {
      position: absolute;
      top: calc(100% + 14px);
      left: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 400;
      color: #f87171;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 350ms cubic-bezier(0.22, 1, 0.36, 1),
                  transform 350ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .lang-warning.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .lang-warning svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="pill">
    <label for="input" class="sr-only">Password</label>
    <div class="input-wrap">
      <input
        type="text"
        class="input-field"
        id="input"
        placeholder="33D4 07F2 12EW LJ21"
        autocomplete="off"
        maxlength="19"
        spellcheck="false"
      />
      <div class="mask" id="mask" aria-hidden="true"></div>
    </div>
    <interact-element data-interact-key="eye-btn">
      <button type="button" class="eye-btn" id="eye-btn" aria-label="Hide password" aria-pressed="false" aria-controls="input">
        <svg class="eye-svg" viewBox="0 0 36 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <clipPath id="eye-clip">
              <path d="M6 20C6 20 11 13 18 13C25 13 30 20 30 20C30 20 25 27 18 27C11 27 6 20 6 20Z"/>
            </clipPath>
          </defs>
          <path class="eye-lid" d="M6 20C6 20 11 13 18 13C25 13 30 20 30 20C30 20 25 27 18 27C11 27 6 20 6 20Z" fill="#ffd782"/>
          <path class="eye-curve" d="M6 20C6 20 11 27 18 27C25 27 30 20 30 20" stroke="#ffd782" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <g clip-path="url(#eye-clip)">
            <circle class="eye-pupil" cx="18" cy="20" r="5" fill="#0b0b0b" stroke="#ffd782" stroke-width="2" stroke-linejoin="round"/>
          </g>
          <g class="eyelashes">
            <path d="M10 9.5L11 11" stroke="#ffd782" stroke-width="2" stroke-linecap="round"/>
            <path d="M26 9.5L25 11" stroke="#ffd782" stroke-width="2" stroke-linecap="round"/>
            <path d="M18 7V10" stroke="#ffd782" stroke-width="2" stroke-linecap="round"/>
          </g>
        </svg>
      </button>
    </interact-element>
    </div>
    <div class="lang-warning" id="lang-warning">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 4.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8" cy="11.5" r="0.75" fill="currentColor"/>
      </svg>
      <span>Switch to English</span>
    </div>
  </div>

  <script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact@2.1.2/web?bundle';

    Interact.create({
      effects: {
        'eye-scale': {
          transition: {
            duration: 200,
            easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            styleProperties: [
              { name: 'transform', value: 'scale(1.05)' }
            ]
          }
        },
        'lid-close': {
          transition: {
            duration: 200,
            easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
            styleProperties: [
              { name: 'opacity', value: '0' },
              { name: 'transform', value: 'scaleY(0.15)' }
            ]
          }
        },
        'curve-show': {
          transition: {
            duration: 180,
            easing: 'ease-out',
            styleProperties: [
              { name: 'opacity', value: '1' }
            ]
          }
        },
        'pupil-hide': {
          transition: {
            duration: 100,
            easing: 'ease-in-out',
            styleProperties: [
              { name: 'opacity', value: '0' }
            ]
          }
        },
        'lashes-flip': {
          transition: {
            duration: 250,
            easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
            styleProperties: [
              { name: 'transform', value: 'translateY(1px) scaleY(-1)' }
            ]
          }
        }
      },
      interactions: [
        {
          key: 'eye-btn',
          trigger: 'hover',
          params: { method: 'toggle' },
          effects: [{ effectId: 'eye-scale' }]
        },
        {
          key: 'eye-btn',
          trigger: 'click',
          params: { method: 'toggle' },
          effects: [
            { key: 'eye-btn', effectId: 'lid-close', selector: '.eye-lid' },
            { key: 'eye-btn', effectId: 'curve-show', selector: '.eye-curve' },
            { key: 'eye-btn', effectId: 'pupil-hide', selector: '.eye-pupil' },
            { key: 'eye-btn', effectId: 'lashes-flip', selector: '.eyelashes' }
          ]
        },
        {
          key: 'eye-btn',
          trigger: 'pageVisible',
          params: { type: 'once' },
          effects: [{
            key: 'eye-btn',
            selector: '.eye-btn',
            customEffect: (el) => {
              const lid = el.querySelector('.eye-lid');
              const pupil = el.querySelector('.eye-pupil');
              let tX = 0, tY = 0, sX = 0, sY = 0;

              document.addEventListener('mousemove', (e) => {
                const r = el.getBoundingClientRect();
                const dx = e.clientX - (r.left + r.width / 2);
                const dy = e.clientY - (r.top + r.height / 2);
                const angle = Math.atan2(dy, dx);
                const dist = Math.min(Math.hypot(dx, dy) / 120, 1.2);
                tX = Math.cos(angle) * dist;
                tY = Math.sin(angle) * dist;
              });

              (function tick() {
                if (parseFloat(getComputedStyle(lid).opacity) > 0.5) {
                  sX += (tX - sX) * 0.12;
                  sY += (tY - sY) * 0.12;
                  pupil.setAttribute('cx', 18 + sX * 3.5);
                  pupil.setAttribute('cy', 20 + sY * 2.2);
                }
                requestAnimationFrame(tick);
              })();

              setTimeout(function blink() {
                if (parseFloat(getComputedStyle(lid).opacity) > 0.5) {
                  lid.animate([
                    { transform: 'scaleY(1)', offset: 0 },
                    { transform: 'scaleY(0.1)', offset: 0.35 },
                    { transform: 'scaleY(1)', offset: 1 }
                  ], { duration: 150, easing: 'ease-in-out' });
                  pupil.animate([
                    { opacity: 1, offset: 0 },
                    { opacity: 0, offset: 0.3 },
                    { opacity: 1, offset: 1 }
                  ], { duration: 150 });
                }
                setTimeout(blink, Math.random() < 0.22 ? 200 : 2000 + Math.random() * 4000);
              }, 2000);
            }
          }]
        }
      ]
    });

    const input = document.getElementById('input');
    const mask = document.getElementById('mask');
    const eyeBtn = document.getElementById('eye-btn');
    const PLACEHOLDER = '33D4 07F2 12EW LJ21';
    let isHidden = false;

    function formatInput(raw) {
      const chars = raw.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 16);
      return chars.replace(/(.{4})(?=.)/g, '$1 ');
    }

    function updateMask() {
      input.classList.toggle('masked', isHidden);
      if (isHidden) {
        mask.classList.add('active');
        const val = input.value;
        const display = val || PLACEHOLDER;
        const isPlaceholder = !val;
        let html = '';
        for (const ch of display) {
          html += ch === ' '
            ? '<span class="space"></span>'
            : `<span class="dot ${isPlaceholder ? 'dot-placeholder' : 'dot-filled'}"></span>`;
        }
        mask.innerHTML = html;
      } else {
        mask.classList.remove('active');
      }
    }

    input.addEventListener('input', () => {
      const pos = input.selectionStart;
      const rawBefore = input.value.slice(0, pos).replace(/[^a-zA-Z0-9]/g, '').length;

      input.value = formatInput(input.value);

      let newPos = 0;
      let count = 0;
      for (let i = 0; i < input.value.length; i++) {
        if (count >= rawBefore) break;
        if (input.value[i] !== ' ') count++;
        newPos = i + 1;
      }
      input.selectionStart = input.selectionEnd = newPos;

      updateMask();
    });

    eyeBtn.addEventListener('mousedown', (e) => e.preventDefault());

    eyeBtn.addEventListener('click', () => {
      isHidden = !isHidden;
      eyeBtn.setAttribute('aria-pressed', String(isHidden));
      eyeBtn.setAttribute('aria-label', isHidden ? 'Show password' : 'Hide password');
      updateMask();
      input.focus();
    });

    const langWarn = document.getElementById('lang-warning');
    let warnHideTimer = null;

    input.addEventListener('beforeinput', (e) => {
      if (!e.data) return;
      if (/[^\x00-\x7F]/.test(e.data)) {
        clearTimeout(warnHideTimer);
        langWarn.classList.add('visible');
        warnHideTimer = setTimeout(() => langWarn.classList.remove('visible'), 3000);
      } else {
        clearTimeout(warnHideTimer);
        langWarn.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
