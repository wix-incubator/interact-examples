<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Bar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    interact-element { display: contents; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .social-bar {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .social-item {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .social-item:focus-visible .ring-container {
      box-shadow: 0 0 0 3px #0b0b0b, 0 0 0 6px #ffd782;
    }

    .ring-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 9999px;
    }

    .svg-wrapper {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 64px;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .main-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .main-svg * {
      vector-effect: non-scaling-stroke;
    }

    .arc-path {
      fill: none;
      stroke: #ffd78240;
      stroke-width: 1.5;
      stroke-linecap: round;
    }

    .center-content {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .icon-wrapper {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrapper svg {
      width: 28px;
      height: 28px;
      color: #ffd78266;
      stroke-width: 1.5;
    }

    .typewriter-text {
      font-family: 'JetBrains Mono', monospace;
      color: #ffd782;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.01em;
      white-space: nowrap;
      opacity: 0;
    }

    .social-item.expanded .typewriter-text {
      opacity: 1;
    }

    .copied-badge {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      color: #ffd782;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
    }

    .copied-badge.show {
      opacity: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <nav class="social-bar" aria-label="Social connections" id="social-bar"></nav>

  <script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact@2.1.2/web?bundle';

    const ITEMS = [
      { id: 'ig', label: 'Instagram', info: '@alex.motion', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>' },
      { id: 'tw', label: 'Twitter', info: '@alexdesign', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"/><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"/></svg>' },
      { id: 'gh', label: 'GitHub', info: 'github.com/alex', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>' },
      { id: 'li', label: 'LinkedIn', info: 'in/alexjohnson', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>' },
      { id: 'em', label: 'Email', info: 'hello@alex.design', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' }
    ];

    // --- SVG arc helpers ---
    function polar(cx, cy, r, deg) {
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }
    function arc(cx, cy, r, s, e) {
      const a = polar(cx, cy, r, e), b = polar(cx, cy, r, s);
      return `M ${a.x} ${a.y} A ${r} ${r} 0 0 0 ${b.x} ${b.y}`;
    }

    const R = 30, S = 64, C = S / 2, GAP = 12;
    const leftPath = arc(C, C, R, 180 + GAP, 360 - GAP);
    const rightPath = arc(C, C, R, GAP, 180 - GAP);

    // --- Build DOM ---
    const container = document.getElementById('social-bar');
    const interactions = [];

    ITEMS.forEach(item => {
      const key = `${item.id}-menu`;

      const wrap = document.createElement('interact-element');
      wrap.setAttribute('data-interact-key', key);

      const div = document.createElement('div');
      div.className = 'social-item';
      div.tabIndex = 0;
      div.role = 'button';
      div.setAttribute('aria-label', `Show ${item.label} contact`);
      div.setAttribute('aria-expanded', 'false');
      div.dataset.info = item.info;

      div.innerHTML = `
        <div class="ring-container">
          <div class="svg-wrapper">
            <svg class="main-svg" viewBox="0 0 ${S} ${S}">
              <g class="arc-left"><path class="arc-path" d="${leftPath}"/></g>
              <g class="arc-right"><path class="arc-path" d="${rightPath}"/></g>
            </svg>
          </div>
          <div class="center-content">
            <div class="icon-wrapper">${item.icon}</div>
            <span class="sr-only">Contact: </span>
            <span class="typewriter-text" aria-live="polite"></span>
          </div>
        </div>
        <span class="copied-badge">copied</span>
      `;

      wrap.appendChild(div);
      container.appendChild(wrap);

      interactions.push({
        key,
        trigger: 'hover',
        params: { type: 'alternate' },
        effects: [
          { selector: '.ring-container', effectId: 'expand' },
          { selector: '.arc-left', effectId: 'arc-left' },
          { selector: '.arc-right', effectId: 'arc-right' },
          { selector: '.main-svg', effectId: 'rotate-svg' },
          { selector: '.icon-wrapper', effectId: 'icon-out' },
          { selector: '.arc-path', effectId: 'arc-gold' }
        ]
      });
    });

    // --- Interact ---
    const EASE = 'cubic-bezier(0.7, 0, 0.2, 1)';

    Interact.create({
      effects: {
        'expand': {
          keyframeEffect: {
            name: 'expand',
            keyframes: [
              { width: '64px', offset: 0 },
              { width: '264px', offset: 1 }
            ]
          },
          duration: 600, easing: EASE, fill: 'both'
        },
        'arc-left': {
          keyframeEffect: {
            name: 'arc-left',
            keyframes: [
              { transform: 'translateX(0)', offset: 0 },
              { transform: 'translateX(-100px)', offset: 1 }
            ]
          },
          duration: 600, easing: EASE, fill: 'both'
        },
        'arc-right': {
          keyframeEffect: {
            name: 'arc-right',
            keyframes: [
              { transform: 'translateX(0)', offset: 0 },
              { transform: 'translateX(100px)', offset: 1 }
            ]
          },
          duration: 600, easing: EASE, fill: 'both'
        },
        'rotate-svg': {
          keyframeEffect: {
            name: 'rotate-svg',
            keyframes: [
              { transform: 'rotate(0deg)', offset: 0 },
              { transform: 'rotate(180deg)', offset: 1 }
            ]
          },
          duration: 600, easing: EASE, fill: 'both'
        },
        'icon-out': {
          keyframeEffect: {
            name: 'icon-out',
            keyframes: [
              { opacity: 1, transform: 'scale(0.7)', offset: 0 },
              { opacity: 0, transform: 'scale(0.35)', offset: 1 }
            ]
          },
          duration: 600, easing: EASE, fill: 'both'
        },
        'arc-gold': {
          keyframeEffect: {
            name: 'arc-gold',
            keyframes: [
              { stroke: '#ffd78240', filter: 'none', offset: 0 },
              { stroke: '#ffd782', filter: 'drop-shadow(0 0 8px rgba(255,215,130,0.3))', offset: 1 }
            ]
          },
          duration: 400, easing: 'ease', fill: 'both'
        }
      },
      interactions
    });

    // --- Typewriter + click-to-copy (text manipulation, not animation) ---
    container.querySelectorAll('.social-item').forEach(el => {
      const info = el.dataset.info;
      const textEl = el.querySelector('.typewriter-text');
      const badge = el.querySelector('.copied-badge');
      let timeout = null;
      let len = 0;
      let active = false;

      const activate = () => {
        if (active) return;
        active = true;
        el.classList.add('expanded');
        el.setAttribute('aria-expanded', 'true');
        if (timeout) clearTimeout(timeout);
        timeout = setTimeout(() => {
          const type = () => {
            if (len < info.length) {
              len++;
              textEl.textContent = info.slice(0, len);
              timeout = setTimeout(type, 30);
            }
          };
          type();
        }, 500);
      };

      const deactivate = () => {
        if (!active) return;
        active = false;
        el.classList.remove('expanded');
        el.setAttribute('aria-expanded', 'false');
        if (timeout) clearTimeout(timeout);
        const backspace = () => {
          if (len > 0) {
            len--;
            textEl.textContent = info.slice(0, len);
            timeout = setTimeout(backspace, 15);
          }
        };
        backspace();
      };

      el.addEventListener('mouseenter', activate);
      el.addEventListener('mouseleave', deactivate);
      el.addEventListener('focus', activate);
      el.addEventListener('blur', deactivate);

      el.addEventListener('click', () => {
        navigator.clipboard.writeText(info).then(() => {
          badge.classList.add('show');
          setTimeout(() => badge.classList.remove('show'), 1200);
        });
      });

      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          active ? deactivate() : activate();
        }
        if (e.key === 'Escape') deactivate();
      });
    });
  </script>
</body>
</html>
