<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Buttons</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@100;200;300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    interact-element { display: contents; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 300px;
    }

    .radio-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 15px 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .radio-btn:focus-visible {
      box-shadow: 0 0 0 2px #ffd782;
      border-radius: 8px;
    }

    .radio-btn .label {
      font-size: 17px;
      font-weight: 400;
      color: #a3a3a3;
      transition: color 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .radio-btn.selected .label {
      color: #ffd782;
    }

    .radio-indicator {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radio-indicator .ring {
      position: absolute;
      inset: 0;
      border: 1.5px solid #ffd78225;
      border-radius: 50%;
      transition: border-color 0.75s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .radio-btn.selected .radio-indicator .ring {
      border-color: #ffd782;
    }

    .radio-indicator .ring-svg {
      position: absolute;
      inset: -2px;
      width: 26px;
      height: 26px;
      transform: rotate(-90deg);
      pointer-events: none;
    }

    .radio-indicator .ring-svg circle {
      fill: none;
      stroke: #ffd782;
      stroke-width: 1.5;
      stroke-dasharray: 63;
      stroke-dashoffset: 63;
      transition: stroke-dashoffset 0.95s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .radio-btn.selected .radio-indicator .ring-svg circle {
      stroke-dashoffset: 0;
    }

    .radio-indicator .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ffd782;
      transform: scale(0);
      transform-origin: center;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .radio-btn.selected .radio-indicator .dot {
      transform: scale(1);
    }

    @media (prefers-reduced-motion: reduce) {
      .label, .ring, .ring-svg circle, .dot { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="radio-group" role="radiogroup" aria-label="Notification preferences">
    <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:300;color:#ffd78266;letter-spacing:0.08em;text-transform:uppercase;padding:0 4px 10px;">Notifications</span>
    <interact-element data-interact-key="radio-1">
      <button type="button" class="radio-btn selected" role="radio" aria-checked="true" data-value="all">
        <div class="radio-indicator">
          <div class="ring"></div>
          <svg class="ring-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></svg>
          <div class="dot"></div>
        </div>
        <span class="label">All activity</span>
      </button>
    </interact-element>
    <interact-element data-interact-key="radio-2">
      <button type="button" class="radio-btn" role="radio" aria-checked="false" data-value="important">
        <div class="radio-indicator">
          <div class="ring"></div>
          <svg class="ring-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></svg>
          <div class="dot"></div>
        </div>
        <span class="label">Important only</span>
      </button>
    </interact-element>
    <interact-element data-interact-key="radio-3">
      <button type="button" class="radio-btn" role="radio" aria-checked="false" data-value="mentions">
        <div class="radio-indicator">
          <div class="ring"></div>
          <svg class="ring-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></svg>
          <div class="dot"></div>
        </div>
        <span class="label">Mentions & replies</span>
      </button>
    </interact-element>
    <interact-element data-interact-key="radio-4">
      <button type="button" class="radio-btn" role="radio" aria-checked="false" data-value="direct">
        <div class="radio-indicator">
          <div class="ring"></div>
          <svg class="ring-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></svg>
          <div class="dot"></div>
        </div>
        <span class="label">Direct messages only</span>
      </button>
    </interact-element>
    <interact-element data-interact-key="radio-5">
      <button type="button" class="radio-btn" role="radio" aria-checked="false" data-value="none">
        <div class="radio-indicator">
          <div class="ring"></div>
          <svg class="ring-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></svg>
          <div class="dot"></div>
        </div>
        <span class="label">Nothing</span>
      </button>
    </interact-element>
  </div>

  <script type="module">
    import { Interact } from 'https://esm.sh/@wix/interact@2.1.2/web?bundle';

    const keys = ['radio-1', 'radio-2', 'radio-3', 'radio-4', 'radio-5'];

    Interact.create({
      effects: {
        'dot-pop': {
          keyframeEffect: {
            name: 'dot-pop',
            keyframes: [
              { transform: 'scale(0)', offset: 0 },
              { transform: 'scale(1.4)', offset: 0.25 },
              { transform: 'scale(0.88)', offset: 0.55 },
              { transform: 'scale(1.08)', offset: 0.8 },
              { transform: 'scale(1)', offset: 1 }
            ]
          },
          duration: 750,
          easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
          fill: 'none'
        },
        'hover-label': {
          transition: {
            duration: 250,
            easing: 'ease-out',
            styleProperties: [
              { name: 'color', value: '#d4d4d8' }
            ]
          }
        },
        'hover-ring': {
          transition: {
            duration: 250,
            easing: 'ease-out',
            styleProperties: [
              { name: 'border-color', value: '#ffd78250' }
            ]
          }
        },
        'hover-indicator': {
          transition: {
            duration: 250,
            easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            styleProperties: [
              { name: 'transform', value: 'scale(1.15)' }
            ]
          }
        }
      },
      interactions: [
        ...keys.flatMap(key => [
          {
            key,
            trigger: 'hover',
            params: { method: 'toggle' },
            effects: [
              { selector: '.label', effectId: 'hover-label' },
              { selector: '.ring', effectId: 'hover-ring' },
              { selector: '.radio-indicator', effectId: 'hover-indicator' }
            ]
          },
          {
            key,
            trigger: 'click',
            params: { type: 'repeat' },
            effects: [
              { selector: '.dot', effectId: 'dot-pop' }
            ]
          }
        ])
      ]
    });

    // Radio group state management (no animations — interact handles those)
    const buttons = document.querySelectorAll('.radio-btn');

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) return;

        buttons.forEach((b) => {
          b.classList.remove('selected');
          b.setAttribute('aria-checked', 'false');
        });

        btn.classList.add('selected');
        btn.setAttribute('aria-checked', 'true');
      });
    });
  </script>
</body>
</html>
