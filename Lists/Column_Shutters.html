<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recent Work — Forma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f2f0ed;
      color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    interact-element { display: block; }

    .page {
      max-width: 1700px;
      margin: 0 auto;
      padding: 40px 8px 120px;
      min-height: 100vh;
    }

    /* Navigation */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 80px;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .nav-group { display: flex; gap: 40px; }
    .nav a {
      color: #000;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .nav a:hover { opacity: 1; }
    .nav-brand { font-weight: 600; opacity: 1 !important; }
    .nav-location { font-size: 11px; opacity: 0.5; }

    /* H1 Section */
    .clip-mask {
      overflow: clip;
    }
    h1 {
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.03em;
    }
    .h1-section { margin-bottom: 100px; }

    /* List Header */
    .list-header {
      display: grid;
      grid-template-columns: 120px 1.5fr 2.5fr 80px;
      padding: 0 16px 14px;
      font-size: 11px;
      color: #999;
      letter-spacing: 0.04em;
    }

    /* Line Dividers */
    .line-divider {
      height: 1px;
      background: #d4d0cc;
      transform: scaleX(0);
      transform-origin: left center;
    }

    /* List Items */
    .list-item {
      cursor: pointer;
      user-select: none;
    }

    .list-item-cols {
      display: grid;
      grid-template-columns: 120px 1.5fr 2.5fr 80px;
    }

    .col {
      position: relative;
      padding: 20px 16px;
      overflow: clip;
    }
    .col:nth-child(4) { text-align: right; }
    .list-header span:nth-child(4) { text-align: right; }
    .col-text {
      position: relative;
      z-index: 2;
      font-size: 15px;
      font-weight: 500;
      display: block;
      white-space: nowrap;
      transition: color 350ms cubic-bezier(0.4, 0, 0.2, 1) 250ms;
    }
    .marker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      transform: scaleX(0);
      transform-origin: left center;
      z-index: 1;
      will-change: transform;
      transition: transform 350ms cubic-bezier(0.4, 0, 0.2, 1) 250ms;
    }

    /* Hover enter: fast GPU-accelerated fill with tight stagger */
    .list-item:hover .marker {
      transform: scaleX(1);
      transition: transform 180ms cubic-bezier(0.16, 1, 0.3, 1) 0ms;
    }
    .list-item:hover .col-text {
      color: #fff;
      transition: color 180ms cubic-bezier(0.16, 1, 0.3, 1) 0ms;
    }
    .list-item:hover .col:nth-child(2) .marker,
    .list-item:hover .col:nth-child(2) .col-text { transition-delay: 18ms; }
    .list-item:hover .col:nth-child(3) .marker,
    .list-item:hover .col:nth-child(3) .col-text { transition-delay: 36ms; }
    .list-item:hover .col:nth-child(4) .marker,
    .list-item:hover .col:nth-child(4) .col-text { transition-delay: 54ms; }

    /* Expand Area */
    .item-expand {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      overflow: hidden;
    }
    .expand-inner { overflow: hidden; }
    .expand-grid {
      display: grid;
      grid-template-columns: 120px 1.5fr 2.5fr 80px;
      padding: 8px 0 28px;
    }
    .expand-image {
      grid-column: 1 / 3;
      padding: 0 16px;
    }
    .expand-image img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 3px;
    }
    .expand-text {
      grid-column: 3;
      padding: 0 16px;
      display: flex;
      align-items: flex-start;
    }
    .expand-text p {
      font-size: 14px;
      line-height: 1.7;
      color: #555;
      max-width: 480px;
      font-weight: 400;
    }
    .expand-meta {
      display: none;
      padding: 0 16px;
      font-size: 13px;
      color: #777;
      gap: 24px;
    }
    .expand-meta span { font-weight: 500; }

    @media (max-width: 768px) {
      .page { padding: 24px 12px 80px; }
      .nav { padding-bottom: 48px; flex-wrap: wrap; gap: 12px; }
      .nav-group { gap: 20px; }
      .h1-section { margin-bottom: 60px; }

      .list-header {
        grid-template-columns: 1fr 1fr;
      }
      .list-header span:nth-child(3),
      .list-header span:nth-child(4) { display: none; }

      .list-item-cols {
        grid-template-columns: 1fr 1fr;
      }
      .col:nth-child(3),
      .col:nth-child(4) { display: none; }
      .col { padding: 16px 12px; }

      .expand-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .expand-image { grid-column: 1; padding: 0 12px; }
      .expand-meta { display: flex; padding: 0 12px; }
      .expand-text { grid-column: 1; padding: 0 12px; }
      .expand-text p { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <div class="nav-group">
        <a href="#" class="nav-brand">forma°</a>
        <a href="#">design collective</a>
      </div>
      <div></div>
      <div class="nav-group">
        <a href="#">threads</a>
        <a href="#">behance</a>
      </div>
      <div>
        <span class="nav-location">brooklyn, ny</span>
      </div>
    </nav>

    <div class="h1-section">
      <div class="clip-mask">
        <interact-element data-interact-key="h1-line1" data-interact-initial="true">
          <div class="h1-line">
            <h1>Recent work</h1>
          </div>
        </interact-element>
      </div>
      <div class="clip-mask">
        <interact-element data-interact-key="h1-line2" data-interact-initial="true">
          <div class="h1-line">
            <h1>2018/present</h1>
          </div>
        </interact-element>
      </div>
    </div>

    <div class="list-header">
      <span>index</span>
      <span>brand</span>
      <span>discipline</span>
      <span>date</span>
    </div>

    <div id="list"></div>
  </div>

  <script type="module">
    let Interact;
    try {
      const mod = await import('https://esm.sh/@wix/interact@2.0.0-rc.4/web');
      Interact = mod.Interact;
    } catch (e) {
      console.error('Wix Interact failed to load:', e);
    }

    const items = [
      { num: 'N°001', client: 'Verdant', type: 'Sustainability campaign series', year: '2024', img: 'https://picsum.photos/seed/verdant/600/360', desc: 'A multi-channel sustainability campaign weaving environmental narratives through bold visual design and responsive interactive modules.' },
      { num: 'N°002', client: 'Kinetic', type: 'Motion branding identity suite', year: '2024', img: 'https://picsum.photos/seed/kinetic/600/360', desc: 'A kinetic brand identity system merging typography with motion design to establish a distinctive and evolving visual language.' },
      { num: 'N°003', client: 'AR/K', type: 'Digital commerce platform', year: '2024', img: 'https://picsum.photos/seed/arkcom/600/360', desc: 'A refined commerce platform built around intuitive navigation and expressive product imagery for a contemporary retail brand.' },
      { num: 'N°004', client: 'Passage', type: 'Immersive editorial design', year: '2023', img: 'https://picsum.photos/seed/passage/600/360', desc: 'A long-form editorial experience leading readers through curated visual chapters with parallax-driven layouts and rich media.' },
      { num: 'N°005', client: 'Novacell', type: 'Healthtech product showcase', year: '2023', img: 'https://picsum.photos/seed/novacel/600/360', desc: 'A clinical product showcase for a health technology startup, balancing technical depth with approachable and human-centered design.' },
      { num: 'N°006', client: '3Capital', type: 'Fintech launch experience', year: '2023', img: 'https://picsum.photos/seed/capital/600/360', desc: 'A high-energy launch site for a financial technology platform, pairing kinetic interfaces with clear transactional data flows.' }
    ];

    const listEl = document.getElementById('list');

    function addLine(parent, index) {
      const lineEl = document.createElement('interact-element');
      lineEl.setAttribute('data-interact-key', `line-${index}`);
      lineEl.innerHTML = '<div class="line-divider"></div>';
      parent.appendChild(lineEl);
    }

    addLine(listEl, 0);

    items.forEach((item, i) => {
      const clipMask = document.createElement('div');
      clipMask.className = 'clip-mask';

      const interactEl = document.createElement('interact-element');
      interactEl.setAttribute('data-interact-key', `item-${i}`);
      interactEl.setAttribute('data-interact-initial', 'true');
      interactEl.innerHTML = `
        <div class="list-item">
          <div class="list-item-cols">
            <div class="col"><span class="col-text">${item.num}</span><div class="marker"></div></div>
            <div class="col"><span class="col-text">${item.client}</span><div class="marker"></div></div>
            <div class="col"><span class="col-text">${item.type}</span><div class="marker"></div></div>
            <div class="col"><span class="col-text">${item.year}</span><div class="marker"></div></div>
          </div>
          <div class="item-expand">
            <div class="expand-inner">
              <div class="expand-grid">
                <div class="expand-image"><img src="${item.img}" alt="${item.client}" loading="lazy"></div>
                <div class="expand-meta"><span>${item.type}</span><span>${item.year}</span></div>
                <div class="expand-text"><p>${item.desc}</p></div>
              </div>
            </div>
          </div>
        </div>
      `;
      clipMask.appendChild(interactEl);
      listEl.appendChild(clipMask);

      addLine(listEl, i + 1);
    });

    if (!Interact) {
      console.error('Interact not available, showing content without animations');
      document.querySelectorAll('.clip-mask').forEach(el => {
        el.style.overflow = 'visible';
      });
    } else {
      const interactions = [];

      // H1 line 1 entrance
      interactions.push({
        key: 'h1-line1',
        trigger: 'viewEnter',
        params: { type: 'once' },
        effects: [{
          keyframeEffect: {
            name: 'h1Line1',
            keyframes: [
              { transform: 'translateY(100%)', offset: 0 },
              { transform: 'translateY(0%)', offset: 1 }
            ]
          },
          duration: 900,
          easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
          fill: 'both'
        }]
      });

      // H1 line 2 entrance
      interactions.push({
        key: 'h1-line2',
        trigger: 'viewEnter',
        params: { type: 'once' },
        effects: [{
          keyframeEffect: {
            name: 'h1Line2',
            keyframes: [
              { transform: 'translateY(100%)', offset: 0 },
              { transform: 'translateY(0%)', offset: 1 }
            ]
          },
          duration: 900,
          delay: 100,
          easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
          fill: 'both'
        }]
      });

      // Line divider entrances (scaleX 0→1, no opacity change)
      for (let l = 0; l <= items.length; l++) {
        interactions.push({
          key: `line-${l}`,
          trigger: 'viewEnter',
          params: { type: 'once' },
          effects: [{
            keyframeEffect: {
              name: `lineEntrance${l}`,
              keyframes: [
                { transform: 'scaleX(0)', offset: 0 },
                { transform: 'scaleX(1)', offset: 1 }
              ]
            },
            duration: 600,
            delay: 280 + l * 100,
            easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
            fill: 'both'
          }]
        });
      }

      // Per-item interactions
      items.forEach((_, i) => {
        const key = `item-${i}`;

        // Entrance
        interactions.push({
          key,
          trigger: 'viewEnter',
          params: { type: 'once' },
          effects: [{
            keyframeEffect: {
              name: `itemEntrance${i}`,
              keyframes: [
                { transform: 'translateY(100%)', offset: 0 },
                { transform: 'translateY(0%)', offset: 1 }
              ]
            },
            duration: 700,
            delay: 350 + i * 100,
            easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
            fill: 'both'
          }]
        });

        // Click: marker + text lock + expand toggle
        interactions.push({
          key,
          trigger: 'click',
          effects: [
            {
              selector: '.marker',
              transition: {
                duration: 450,
                easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
                styleProperties: [
                  { name: 'transform', value: 'scaleX(1)' }
                ]
              }
            },
            {
              selector: '.col-text',
              transition: {
                duration: 450,
                easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
                styleProperties: [
                  { name: 'color', value: '#ffffff' }
                ]
              }
            },
            {
              selector: '.item-expand',
              transition: {
                duration: 500,
                easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
                styleProperties: [
                  { name: 'grid-template-rows', value: '1fr' },
                  { name: 'opacity', value: '1' }
                ]
              }
            }
          ]
        });
      });

      Interact.create({ interactions });
    }
  </script>
</body>
</html>
